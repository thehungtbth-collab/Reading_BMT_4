>Làm lại</button>\n          <div class=\"small\" id=\"fillScore\" style=\"align-self:center; color:var(--muted); font-size:13px\">Điểm: 0 / 0</div>\n        </div>\n      </div>\n    </section>\n  </div>\n</div>\n\n<div id=\"mif-view\">\n  <div class=\"mif-header\">\n    <h2 id=\"mif-title\" style=\"margin:0;color:#4338ca;font-size:18px\">Luyện Mif: Đoạn ...</h2>\n    <button class=\"mif-nav-btn\" style=\"background:#ef4444\" onclick=\"toggleMifMode()\">Đóng</button>\n  </div>\n  <div class=\"mif-body\">\n    <div class=\"mif-left\">\n      <div class=\"mif-col-container\">\n        <div class=\"mif-col\" id=\"mif-en-col\"></div>\n        <div class=\"mif-col\" id=\"mif-vi-col\"></div>\n      </div>\n    </div>\n    <div class=\"mif-right\">\n      <div id=\"mif-qs-container\" style=\"flex:1; overflow-y:auto; padding-bottom:20px;\"></div>\n      <div style=\"display:flex; justify-content:space-between; border-top:2px solid #cbd5e1; padding-top:15px; margin-top:10px;\">\n        <button class=\"mif-nav-btn\" id=\"mif-prev\" onclick=\"navMif(-1)\">⬅ Back</button>\n        <button class=\"mif-nav-btn\" id=\"mif-next\" onclick=\"navMif(1)\">Next ➡</button>\n      </div>\n    </div>\n  </div>\n</div>\n\n<div id=\"popup\"></div>\n<div class=\"confetti\" id=\"confetti\"></div>\n\n<script>\n// --- MULTI-LESSON DATA INJECTION ---\nconst lessonsData = [{\"name\":\"Passage 1\",\"articleHtml\":\"\\u003cdiv class=\\\"reading-content\\\">\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph A\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s0\\\">We are all explores. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s1\\\">Our \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v0\\\">desire\\u003c/span> to discover, and then share that new-found knowledge, is part of what makes us human – indeed, this has played an important part in our success as a \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v1\\\">species\\u003c/span>. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s2\\\">Long before the first \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v2\\\">caveman\\u003c/span> slumped down beside the fire and grunted news that there were plenty of \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v3\\\">wildebeest\\u003c/span> over \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v4\\\">yonder\\u003c/span>, our ancestors had learnt the value of sending out \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v5\\\">scouts\\u003c/span> to investigate the unknown. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s3\\\">This questing nature of ours \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v6\\\">undoubtedly\\u003c/span> helped our \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v1\\\">species\\u003c/span> spread around the globe, just as it nowadays no doubt helps the last nomadic Penan maintain their \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v7\\\">existence\\u003c/span> in the \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v8\\\">depleted\\u003c/span> forests of Borneo, and a visitor \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v9\\\">negotiate\\u003c/span> the subways of New York. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t0')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t0\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p0s0\\\" class=\\\"vi-sent\\\">Tất cả chúng ta đều là những người khám phá. \\u003c/span>\\u003cspan id=\\\"p0s1\\\" class=\\\"vi-sent\\\">Mong muốn khám phá và sau đó chia sẻ kiến ​​thức mới tìm thấy của chúng ta là một phần tạo nên con người chúng ta - thực sự, điều này đã đóng một vai trò quan trọng trong sự thành công của loài người chúng ta. \\u003c/span>\\u003cspan id=\\\"p0s2\\\" class=\\\"vi-sent\\\">Rất lâu trước khi người thượng cổ đầu tiên ngồi sụp xuống bên đống lửa và càu nhàu khi biết rằng có rất nhiều linh dương đầu bò ở đằng kia, tổ tiên của chúng ta đã học được giá trị của việc cử các trinh sát đi điều tra những điều chưa biết. \\u003c/span>\\u003cspan id=\\\"p0s3\\\" class=\\\"vi-sent\\\">Bản chất tìm kiếm này của chúng ta chắc chắn đã giúp loài người chúng ta lan rộng khắp thế giới, cũng như ngày nay chắc chắn nó đã giúp người Penan du mục cuối cùng duy trì sự tồn tại của họ trong những khu rừng cạn kiệt ở Borneo, và một du khách di chuyển bằng tàu điện ngầm ở New York. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph B\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s0\\\">Over the years, we’ve come to think of explorers as a \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v10\\\">peculiar breed\\u003c/span> – different from the rest of us, different from those of us who are merely ‘well travelled’, even; and perhaps there is a type of person more suited to \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v11\\\">seeking out\\u003c/span> the new, a type of \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v2\\\">caveman\\u003c/span> more \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v12\\\">inclined to\\u003c/span> risk \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v13\\\">venturing\\u003c/span> out. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s1\\\">That, however, doesn’t take away from the fact that we all have this \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v14\\\">enquiring instinct\\u003c/span>, even today; and that in all sorts of professions – whether artist, marine biologist or astronomer – borders of the unknown are being tested each day. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t1')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t1\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p1s0\\\" class=\\\"vi-sent\\\">Qua nhiều năm, chúng ta đã dần coi những nhà thám hiểm là một giống loài đặc biệt - khác với phần còn lại của chúng ta, khác với những người trong chúng ta, những người chỉ đơn thuần là những người 'đi du lịch nhiều', thậm chí; và có lẽ có một kiểu người phù hợp hơn với việc tìm kiếm cái mới, một kiểu người thượng cổ có xu hướng mạo hiểm mạo hiểm hơn. \\u003c/span>\\u003cspan id=\\\"p1s1\\\" class=\\\"vi-sent\\\">Tuy nhiên, điều đó không làm mất đi sự thật rằng tất cả chúng ta đều có bản năng tìm hiểu này, kể cả ngày nay; và rằng trong mọi ngành nghề – dù là nghệ sĩ, nhà sinh vật biển hay nhà thiên văn học – những ranh giới của những điều chưa biết đang bị thử thách mỗi ngày. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph C\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s0\\\">Thomas Hardy set some of his novels in Egdon Heath, a \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v15\\\">fictional area\\u003c/span> of \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v16\\\">uncultivated land\\u003c/span>, and used the landscape to suggest the desires and fears of his characters. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s1\\\">He is delving into matters we all recognise because they are common to humanity. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s2\\\">This is surely an act of exploration, and into a world as remote as the author chooses. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s3\\\">Explorer and travel writer Peter Fleming talks of the moment when the explorer returns to the \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v7\\\">existence\\u003c/span> he has left behind with his loved ones. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s4\\\">The traveller ‘who has for weeks or months seen himself only as a \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v17\\\">puny\\u003c/span> and \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v18\\\">irrelevant\\u003c/span> alien crawling laboriously over a country in which he has no roots and no background, suddenly encounters his other self, a relatively solid figure, with a place in the minds of certain people’. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t2')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t2\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p2s0\\\" class=\\\"vi-sent\\\">Thomas Hardy lấy bối cảnh một số cuốn tiểu thuyết của mình ở Egdon Heath, một khu vực hư cấu trên vùng đất hoang hóa và sử dụng phong cảnh để gợi lên những mong muốn và nỗi sợ hãi của các nhân vật của mình. \\u003c/span>\\u003cspan id=\\\"p2s1\\\" class=\\\"vi-sent\\\">Anh ấy đang đi sâu vào những vấn đề mà tất cả chúng ta đều nhận ra vì chúng là những vấn đề chung của nhân loại. \\u003c/span>\\u003cspan id=\\\"p2s2\\\" class=\\\"vi-sent\\\">Đây chắc chắn là một hành động khám phá và đi vào một thế giới xa xôi như tác giả đã chọn. \\u003c/span>\\u003cspan id=\\\"p2s3\\\" class=\\\"vi-sent\\\">Nhà thám hiểm và nhà văn du lịch Peter Fleming nói về khoảnh khắc nhà thám hiểm quay trở lại cuộc sống mà anh ta đã bỏ lại phía sau cùng những người thân yêu của mình. \\u003c/span>\\u003cspan id=\\\"p2s4\\\" class=\\\"vi-sent\\\">Người du hành ‘trong nhiều tuần hoặc nhiều tháng chỉ coi mình là một người ngoài hành tinh nhỏ bé và không liên quan đang vất vả bò trên một đất nước mà anh ta không có nguồn gốc và không có lai lịch, đột nhiên gặp phải cái tôi khác của mình, một nhân vật tương đối vững chắc, có một vị trí trong tâm trí của một số người’. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph D\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p3s0\\\">In this book about the exploration of the earth’s surface, I have \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v19\\\">confined\\u003c/span> myself to those whose travels were real and who also aimed at more than personal discovery. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p3s1\\\">But that still left me with another problem: the word ‘explorer’ has become associated with a past era. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p3s2\\\">We think back to a \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v20\\\">golden age\\u003c/span>, as if exploration peaked somehow in the 19th century – as if the process of discovery is now on the decline, though the truth is that we have named only one and a half million of this planet’s \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v1\\\">species\\u003c/span>, and there may be more than 10 million – and that’s not including bacteria. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p3s3\\\">We have studied only 5 per cent of the \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v1\\\">species\\u003c/span> we know. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p3s4\\\">We have \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v21\\\">scarcely\\u003c/span> mapped the ocean floors, and know even less about ourselves; we fully understand the workings of only 10 per cent of our brains. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t3')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t3\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p3s0\\\" class=\\\"vi-sent\\\">Trong cuốn sách về hành trình khám phá bề mặt trái đất này, tôi đã giới hạn bản thân mình với những người có chuyến đi thực sự và những người cũng nhắm đến nhiều mục đích hơn là khám phá cá nhân. \\u003c/span>\\u003cspan id=\\\"p3s1\\\" class=\\\"vi-sent\\\">Nhưng điều đó vẫn để lại cho tôi một vấn đề khác: từ 'nhà thám hiểm' đã trở nên gắn liền với thời đại đã qua. \\u003c/span>\\u003cspan id=\\\"p3s2\\\" class=\\\"vi-sent\\\">Chúng ta nghĩ lại thời kỳ hoàng kim, như thể việc khám phá đã đạt đến đỉnh điểm bằng cách nào đó vào thế kỷ 19 - như thể quá trình khám phá hiện đang suy giảm, mặc dù sự thật là chúng ta chỉ đặt tên cho một triệu rưỡi loài trên hành tinh này và có thể có hơn 10 triệu - và đó là chưa bao gồm vi khuẩn. \\u003c/span>\\u003cspan id=\\\"p3s3\\\" class=\\\"vi-sent\\\">Chúng tôi chỉ nghiên cứu 5% số loài mà chúng tôi biết. \\u003c/span>\\u003cspan id=\\\"p3s4\\\" class=\\\"vi-sent\\\">Chúng ta hiếm khi lập bản đồ đáy đại dương và thậm chí còn biết ít hơn về bản thân mình; chúng ta chỉ hiểu đầy đủ hoạt động của 10% bộ não. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph E\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p4s0\\\">Here is how some of today’s ‘explorers’ define the word. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p4s1\\\">Ran Fiennes, dubbed the ‘greatest living explorer’, said, ‘An explorer is someone who has done something that no human has done before – and also done something scientifically useful.’ Chris Bonington, a leading \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v22\\\">mountaineer\\u003c/span>, felt exploration was to be found in the act of physically touching the unknown: ‘You have to have gone somewhere new.’ Then Robin Hanbury-Tenison, a \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v23\\\">campaigner\\u003c/span> on behalf of remote so-called ‘tribal’ peoples, said, ‘A traveller simply records information about some far-off world, and reports back; but an explorer changes the world.’ Wilfred Thesiger, who crossed Arabia’s Empty Quarter in 1946, and belongs to an era of \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v24\\\">unmechanised\\u003c/span> travel now lost to the rest of us, told me, ‘If I’d gone across by \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v25\\\">camel\\u003c/span> when I could have gone by car, it would have been a stunt.’ To him, exploration meant bringing back information from a \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v26\\\">remote place\\u003c/span> regardless of any great \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v27\\\">self-discovery\\u003c/span>. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t4')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t4\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p4s0\\\" class=\\\"vi-sent\\\">Đây là cách một số 'nhà thám hiểm' ngày nay định nghĩa từ này. \\u003c/span>\\u003cspan id=\\\"p4s1\\\" class=\\\"vi-sent\\\">Ran Fiennes, được mệnh danh là 'nhà thám hiểm vĩ đại nhất còn sống', đã nói: 'Nhà thám hiểm là người đã làm điều gì đó mà trước đây chưa có con người nào làm - và cũng làm được điều gì đó hữu ích về mặt khoa học.' Chris Bonington, một nhà leo núi hàng đầu, cảm thấy sự khám phá được thể hiện qua hành động chạm vào vật thể chưa biết: 'Bạn hẳn phải đã đến một nơi nào đó mới mẻ.' Sau đó, Robin Hanbury-Tenison, một nhà vận động thay mặt cho những người ở xa được gọi là 'bộ lạc', nói: 'Một du khách chỉ cần ghi lại thông tin về một thế giới xa xôi nào đó, và báo cáo lại; nhưng một nhà thám hiểm đã thay đổi thế giới.’ Wilfred Thesiger, người đã vượt qua Khu phố trống của Ả Rập vào năm 1946, và thuộc về thời đại du hành không có máy móc mà giờ đây chúng ta đã lạc mất, đã nói với tôi, ‘Nếu tôi đi bằng lạc đà trong khi lẽ ra tôi có thể đi bằng ô tô thì đó sẽ là một trò mạo hiểm.’ Đối với anh ấy, thám hiểm có nghĩa là mang về thông tin từ một nơi xa xôi bất kể sự khám phá bản thân vĩ đại nào. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph F\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p5s0\\\">Each definition is slightly different – and tends to reflect the field of \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v28\\\">endeavour\\u003c/span> of each \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v29\\\">pioneer\\u003c/span>. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p5s1\\\">It was the same whoever I asked: the \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v30\\\">prominent\\u003c/span> historian would say exploration was a thing of the past, the cutting-edge scientist would say it was of the present. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p5s2\\\">And so on. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p5s3\\\">They each set their own particular \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v31\\\">criteria\\u003c/span>; the common factor in their approach being that they all had, unlike many of us who simply enjoy travel or discovering new things, both a very \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v32\\\">definite objective\\u003c/span> from the outset and also a \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v0\\\">desire\\u003c/span> to record their findings. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t5')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t5\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p5s0\\\" class=\\\"vi-sent\\\">Mỗi định nghĩa hơi khác nhau – và có xu hướng phản ánh lĩnh vực nỗ lực của mỗi người tiên phong. \\u003c/span>\\u003cspan id=\\\"p5s1\\\" class=\\\"vi-sent\\\">Bất cứ ai tôi hỏi cũng đều như vậy: nhà sử học nổi tiếng sẽ nói việc thám hiểm đã là chuyện quá khứ, nhà khoa học tiên tiến sẽ nói rằng đó là chuyện của hiện tại. \\u003c/span>\\u003cspan id=\\\"p5s2\\\" class=\\\"vi-sent\\\">Và vân vân. \\u003c/span>\\u003cspan id=\\\"p5s3\\\" class=\\\"vi-sent\\\">Mỗi người đều đặt ra tiêu chí cụ thể của riêng mình; Yếu tố chung trong cách tiếp cận của họ là tất cả họ đều có, không giống như nhiều người trong chúng ta, những người chỉ đơn giản thích đi du lịch hoặc khám phá những điều mới, cả hai đều có mục tiêu rất rõ ràng ngay từ đầu và cũng có mong muốn ghi lại những phát hiện của mình. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph G\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p6s0\\\">I’d best declare my own \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v33\\\">bias\\u003c/span>. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p6s1\\\">As a writer, I’m interested in the exploration of ideas. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p6s2\\\">I’ve done a great many \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v34\\\">expeditions\\u003c/span> and each one was \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v35\\\">unique\\u003c/span>. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p6s3\\\">I’ve lived for months alone with isolated groups of people all around the world, even two ‘uncontacted tribes’. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p6s4\\\">But none of these things is of the slightest interest to anyone unless, through my books, I’ve found a new slant, explored a new idea. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p6s5\\\">Why? \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p6s6\\\">Because the world has moved on. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p6s7\\\">The time has long passed for the great \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v36\\\">continental voyages\\u003c/span> – another walk to the poles, another crossing of the Empty Quarter. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p6s8\\\">We know how the land surface of our planet lies; exploration of it is now down to the details – the habits of microbes, say, or the grazing behaviour of buffalo. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p6s9\\\">Aside from the deep sea and deep underground, it’s the era of \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v37\\\">specialists\\u003c/span>. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p6s10\\\">However, this is to \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v38\\\">disregard\\u003c/span> the role the human mind has in conveying remote places; and this is what interests me: how a fresh \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v39\\\">interpretation\\u003c/span>, even of a well-travelled route, can give its readers new \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v40\\\">insights\\u003c/span>. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t6')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t6\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p6s0\\\" class=\\\"vi-sent\\\">Tốt nhất tôi nên tuyên bố thành kiến ​​của riêng mình. \\u003c/span>\\u003cspan id=\\\"p6s1\\\" class=\\\"vi-sent\\\">Là một nhà văn, tôi quan tâm đến việc khám phá các ý tưởng. \\u003c/span>\\u003cspan id=\\\"p6s2\\\" class=\\\"vi-sent\\\">Tôi đã thực hiện rất nhiều chuyến thám hiểm và mỗi chuyến đều là duy nhất. \\u003c/span>\\u003cspan id=\\\"p6s3\\\" class=\\\"vi-sent\\\">Tôi đã sống một mình nhiều tháng với những nhóm người biệt lập trên khắp thế giới, thậm chí cả hai 'bộ tộc không liên lạc'. \\u003c/span>\\u003cspan id=\\\"p6s4\\\" class=\\\"vi-sent\\\">Nhưng không điều nào trong số này được bất kỳ ai quan tâm dù là nhỏ nhất trừ khi, thông qua những cuốn sách của mình, tôi đã tìm ra một quan điểm mới, khám phá một ý tưởng mới. \\u003c/span>\\u003cspan id=\\\"p6s5\\\" class=\\\"vi-sent\\\">Tại sao? \\u003c/span>\\u003cspan id=\\\"p6s6\\\" class=\\\"vi-sent\\\">Bởi vì thế giới đã chuyển động. \\u003c/span>\\u003cspan id=\\\"p6s7\\\" class=\\\"vi-sent\\\">Thời gian đã trôi qua từ lâu đối với những chuyến đi xuyên lục địa vĩ đại – một chuyến đi bộ khác đến các cực, một chuyến băng qua Khu phố trống. \\u003c/span>\\u003cspan id=\\\"p6s8\\\" class=\\\"vi-sent\\\">Chúng ta biết bề mặt đất của hành tinh chúng ta nằm như thế nào; việc khám phá nó bây giờ tập trung vào các chi tiết - chẳng hạn như thói quen của vi khuẩn hoặc hành vi gặm cỏ của trâu. \\u003c/span>\\u003cspan id=\\\"p6s9\\\" class=\\\"vi-sent\\\">Ngoài biển sâu và lòng đất sâu, đó là thời đại của các chuyên gia. \\u003c/span>\\u003cspan id=\\\"p6s10\\\" class=\\\"vi-sent\\\">Tuy nhiên, điều này là coi thường vai trò của trí óc con người trong việc truyền tải những nơi xa xôi; và đây là điều khiến tôi quan tâm: làm thế nào một cách diễn giải mới mẻ, thậm chí về một tuyến đường được nhiều người đi lại, có thể mang đến cho độc giả những hiểu biết mới. \\u003c/span>\\u003c/div>\\u003c/div>\\u003c/div>\",\"headingsHtml\":\"\",\"qs\":[{\"id\":27,\"type\":\"mcq\",\"text\":\"The writer refers to visitors to New York to illustrate the point that\",\"options\":[\"A   exploration is an intrinsic element of being human.\",\"B   most people are enthusiastic about exploring.\",\"C   exploration can lead to surprising results.\",\"D   most people find exploration daunting.\"],\"correctAnswer\":\"A\",\"location\":\"Our desire to discover, and then share that new-found knowledge\",\"_orderId\":27},{\"id\":28,\"type\":\"mcq\",\"text\":\"According to the second paragraph, what is the writer’s view of explorers?\",\"options\":[\"A   Their discoveries have brought both benefits and disadvantages.\",\"B   Their main value is in teaching others.\",\"C   They act on an urge that is common to everyone.\",\"D   They tend to be more attracted to certain professions than to others.\"],\"correctAnswer\":\"C\",\"location\":\"come to think of explorers as a peculiar breed\",\"_orderId\":28},{\"id\":29,\"type\":\"mcq\",\"text\":\"The writer refers to a description of Egdon Heath to suggest that\",\"options\":[\"A   Hardy was writing about his own experience of exploration.\",\"B   Hardy was mistaken about the nature of exploration.\",\"C   Hardy’s aim was to investigate people’s emotional states.\",\"D   Hardy’s aim was to show the attraction of isolation.\"],\"correctAnswer\":\"C\",\"location\":\"set some of his novels in Egdon Heath, a fictional area of uncultivated land\",\"_orderId\":29},{\"id\":30,\"type\":\"mcq\",\"text\":\"In the fourth paragraph, the writer refers to ‘a golden age’ to suggest that\",\"options\":[\"A   the amount of useful information produced by exploration has decreased.\",\"B   fewer people are interested in exploring than in the 19th century.\",\"C   recent developments have made exploration less exciting.\",\"D   we are wrong to think that exploration is no longer necessary.\"],\"correctAnswer\":\"D\",\"location\":\"We think back to a golden age, as if exploration peaked somehow\",\"_orderId\":30},{\"id\":31,\"type\":\"mcq\",\"text\":\"In the sixth paragraph, when discussing the definition of exploration, the writer argues that\",\"options\":[\"A   people tend to relate exploration to their own professional interests.\",\"B   certain people are likely to misunderstand the nature of exploration.\",\"C   the generally accepted definition has changed over time.\",\"D   historians and scientists have more valid definitions than the general public.\"],\"correctAnswer\":\"A\",\"location\":\"the prominent historian would say exploration was\",\"_orderId\":31},{\"id\":32,\"type\":\"mcq\",\"text\":\"In the last paragraph, the writer explains that he is interested in\",\"options\":[\"A   how someone’s personality is reflected in their choice of places to visit.\",\"B   the human ability to cast new light on places that may be familiar.\",\"C   how travel writing has evolved to meet changing demands.\",\"D   the feelings that writers develop about the places that they explore.\"],\"correctAnswer\":\"B\",\"location\":\"this is to disregard the role the human mind has in conveying remote places\",\"_orderId\":32}],\"vocab\":[{\"id\":\"v0\",\"word\":\"desire\",\"meaning\":\"khát vọng, mong muốn (wish, longing)\",\"synonym\":\"He has a strong desire to succeed. (Anh ấy có khát vọng mạnh mẽ để thành công.)\",\"example\":\"\"},{\"id\":\"v1\",\"word\":\"species\",\"meaning\":\"loài (type, kind)\",\"synonym\":\"Many species are endangered. (Nhiều loài đang bị đe dọa.)\",\"example\":\"\"},{\"id\":\"v2\",\"word\":\"caveman\",\"meaning\":\"người tiền sử (prehistoric man)\",\"synonym\":\"A caveman lived in caves. (Người tiền sử sống trong hang động.)\",\"example\":\"\"},{\"id\":\"v3\",\"word\":\"wildebeest\",\"meaning\":\"linh dương đầu bò (antelope species)\",\"synonym\":\"Wildebeests migrate across Africa. (Linh dương đầu bò di cư khắp châu Phi.)\",\"example\":\"\"},{\"id\":\"v4\",\"word\":\"yonder\",\"meaning\":\"ở đằng kia (over there, distant)\",\"synonym\":\"Look at the mountain yonder. (Hãy nhìn ngọn núi ở đằng kia.)\",\"example\":\"\"},{\"id\":\"v5\",\"word\":\"scouts\",\"meaning\":\"người trinh sát, hướng đạo (explorers, observers)\",\"synonym\":\"The scouts reported enemy movement. (Trinh sát báo cáo sự di chuyển của kẻ thù.)\",\"example\":\"\"},{\"id\":\"v6\",\"word\":\"undoubtedly\",\"meaning\":\"chắc chắn, không nghi ngờ (certainly, surely)\",\"synonym\":\"He will undoubtedly win. (Anh ấy chắc chắn sẽ thắng.)\",\"example\":\"\"},{\"id\":\"v7\",\"word\":\"existence\",\"meaning\":\"sự tồn tại (being, presence)\",\"synonym\":\"Human existence depends on nature. (Sự tồn tại của con người phụ thuộc vào thiên nhiên.)\",\"example\":\"\"},{\"id\":\"v8\",\"word\":\"depleted\",\"meaning\":\"cạn kiệt (exhausted, reduced)\",\"synonym\":\"The resources are depleted. (Nguồn tài nguyên đã cạn kiệt.)\",\"example\":\"\"},{\"id\":\"v9\",\"word\":\"negotiate\",\"meaning\":\"đàm phán (discuss, bargain)\",\"synonym\":\"They tried to negotiate a peace treaty. (Họ cố gắng đàm phán hiệp ước hòa bình.)\",\"example\":\"\"},{\"id\":\"v10\",\"word\":\"peculiar breed\",\"meaning\":\"giống loài đặc biệt (unique type)\",\"synonym\":\"This is a peculiar breed of dog. (Đây là giống chó đặc biệt.)\",\"example\":\"\"},{\"id\":\"v11\",\"word\":\"seeking out\",\"meaning\":\"tìm kiếm (searching for, looking for)\",\"synonym\":\"He is seeking out new opportunities. (Anh ấy đang tìm kiếm cơ hội mới.)\",\"example\":\"\"},{\"id\":\"v12\",\"word\":\"inclined to\",\"meaning\":\"có xu hướng (likely to, prone to)\",\"synonym\":\"She is inclined to help others. (Cô ấy có xu hướng giúp đỡ người khác.)\",\"example\":\"\"},{\"id\":\"v13\",\"word\":\"venturing\",\"meaning\":\"mạo hiểm, dấn thân (risking, exploring)\",\"synonym\":\"He is venturing into business. (Anh ấy đang mạo hiểm bước vào kinh doanh.)\",\"example\":\"\"},{\"id\":\"v14\",\"word\":\"enquiring instinct\",\"meaning\":\"bản năng tò mò, tìm hiểu (curious nature)\",\"synonym\":\"Children have an enquiring instinct. (Trẻ em có bản năng tò mò.)\",\"example\":\"\"},{\"id\":\"v15\",\"word\":\"fictional area\",\"meaning\":\"khu vực hư cấu (imaginary place)\",\"synonym\":\"The story is set in a fictional area. (Câu chuyện diễn ra ở một khu vực hư cấu.)\",\"example\":\"\"},{\"id\":\"v16\",\"word\":\"uncultivated land\",\"meaning\":\"đất chưa canh tác (unused land)\",\"synonym\":\"The farmer owns uncultivated land. (Người nông dân sở hữu đất chưa canh tác.)\",\"example\":\"\"},{\"id\":\"v17\",\"word\":\"puny\",\"meaning\":\"nhỏ bé, yếu ớt (tiny, weak)\",\"synonym\":\"He looked puny compared to others. (Anh ấy trông nhỏ bé so với người khác.)\",\"example\":\"\"},{\"id\":\"v18\",\"word\":\"irrelevant\",\"meaning\":\"không liên quan (unrelated, insignificant)\",\"synonym\":\"His comment was irrelevant to the topic. (Lời bình luận của anh ấy không liên quan đến chủ đề.)\",\"example\":\"\"},{\"id\":\"v19\",\"word\":\"confined\",\"meaning\":\"bị giới hạn, giam giữ (restricted, imprisoned)\",\"synonym\":\"The prisoner was confined to his cell. (Tù nhân bị giam giữ trong phòng giam.)\",\"example\":\"\"},{\"id\":\"v20\",\"word\":\"golden age\",\"meaning\":\"thời kỳ hoàng kim (prosperous era)\",\"synonym\":\"The 19th century was a golden age of literature. (Thế kỷ 19 là thời kỳ hoàng kim của văn học.)\",\"example\":\"\"},{\"id\":\"v21\",\"word\":\"scarcely\",\"meaning\":\"hiếm khi, hầu như không (barely, hardly)\",\"synonym\":\"He could scarcely believe his eyes. (Anh ấy hầu như không tin vào mắt mình.)\",\"example\":\"\"},{\"id\":\"v22\",\"word\":\"mountaineer\",\"meaning\":\"người leo núi (climber, adventurer)\",\"synonym\":\"The mountaineer reached the summit. (Người leo núi đã lên đến đỉnh.)\",\"example\":\"\"},{\"id\":\"v23\",\"word\":\"campaigner\",\"meaning\":\"nhà vận động (activist, advocate)\",\"synonym\":\"She is a campaigner for human rights. (Cô ấy là nhà vận động nhân quyền.)\",\"example\":\"\"},{\"id\":\"v24\",\"word\":\"unmechanised\",\"meaning\":\"chưa cơ giới hóa (manual, traditional)\",\"synonym\":\"Farming was unmechanised in the past. (Nông nghiệp chưa cơ giới hóa trong quá khứ.)\",\"example\":\"\"},{\"id\":\"v25\",\"word\":\"camel\",\"meaning\":\"lạc đà (desert animal)\",\"synonym\":\"The camel carries loads across the desert. (Lạc đà chở hàng qua sa mạc.)\",\"example\":\"\"},{\"id\":\"v26\",\"word\":\"remote place\",\"meaning\":\"nơi xa xôi (distant location)\",\"synonym\":\"He lives in a remote place. (Anh ấy sống ở một nơi xa xôi.)\",\"example\":\"\"},{\"id\":\"v27\",\"word\":\"self-discovery\",\"meaning\":\"sự tự khám phá bản thân (personal exploration)\",\"synonym\":\"Travel can lead to self-discovery. (Du lịch có thể dẫn đến sự tự khám phá bản thân.)\",\"example\":\"\"},{\"id\":\"v28\",\"word\":\"endeavour\",\"meaning\":\"nỗ lực, cố gắng (attempt, effort)\",\"synonym\":\"She made an endeavour to finish the project. (Cô ấy nỗ lực hoàn thành dự án.)\",\"example\":\"\"},{\"id\":\"v29\",\"word\":\"pioneer\",\"meaning\":\"người tiên phong (trailblazer, innovator)\",\"synonym\":\"He was a pioneer in medicine. (Ông ấy là người tiên phong trong y học.)\",\"example\":\"\"},{\"id\":\"v30\",\"word\":\"prominent\",\"meaning\":\"nổi bật, quan trọng (notable, distinguished)\",\"synonym\":\"She is a prominent figure in politics. (Cô ấy là nhân vật nổi bật trong chính trị.)\",\"example\":\"\"},{\"id\":\"v31\",\"word\":\"criteria\",\"meaning\":\"tiêu chí (standards, requirements)\",\"synonym\":\"The job has strict criteria. (Công việc có tiêu chí nghiêm ngặt.)\",\"example\":\"\"},{\"id\":\"v32\",\"word\":\"definite objective\",\"meaning\":\"mục tiêu rõ ràng (clear goal)\",\"synonym\":\"The team set a definite objective. (Nhóm đặt ra mục tiêu rõ ràng.)\",\"example\":\"\"},{\"id\":\"v33\",\"word\":\"bias\",\"meaning\":\"sự thiên vị, định kiến (prejudice, favoritism)\",\"synonym\":\"The judge showed bias in the case. (Thẩm phán thể hiện sự thiên vị trong vụ án.)\",\"example\":\"\"},{\"id\":\"v34\",\"word\":\"expeditions\",\"meaning\":\"các cuộc thám hiểm (journeys, explorations)\",\"synonym\":\"They went on several expeditions. (Họ tham gia nhiều cuộc thám hiểm.)\",\"example\":\"\"},{\"id\":\"v35\",\"word\":\"unique\",\"meaning\":\"độc đáo (special, one-of-a-kind)\",\"synonym\":\"This painting is truly unique. (Bức tranh này thực sự độc đáo.)\",\"example\":\"\"},{\"id\":\"v36\",\"word\":\"continental voyages\",\"meaning\":\"các chuyến đi xuyên lục địa (long journeys)\",\"synonym\":\"Explorers made continental voyages across oceans. (Các nhà thám hiểm thực hiện chuyến đi xuyên lục địa qua đại dương.)\",\"example\":\"\"},{\"id\":\"v37\",\"word\":\"specialists\",\"meaning\":\"chuyên gia (experts, professionals)\",\"synonym\":\"The project requires specialists in engineering. (Dự án cần chuyên gia trong ngành kỹ thuật.)\",\"example\":\"\"},{\"id\":\"v38\",\"word\":\"disregard\",\"meaning\":\"coi thường, bỏ qua (ignore, neglect)\",\"synonym\":\"He showed disregard for the rules. (Anh ấy coi thường quy tắc.)\",\"example\":\"\"},{\"id\":\"v39\",\"word\":\"interpretation\",\"meaning\":\"sự diễn giải, giải thích (explanation, analysis)\",\"synonym\":\"The poem allows different interpretations. (Bài thơ cho phép nhiều cách diễn giải.)\",\"example\":\"\"},{\"id\":\"v40\",\"word\":\"insights\",\"meaning\":\"hiểu biết sâu sắc (understanding, wisdom)\",\"synonym\":\"The book provides valuable insights. (Cuốn sách mang lại hiểu biết sâu sắc.)\",\"example\":\"\"}],\"headings\":[],\"headingKey\":{},\"mifRange\":\"\",\"removeOpt\":false,\"removeFeatureOpt\":false,\"pairs\":[{\"eng\":\"desire\",\"vie\":\"khát vọng, mong muốn (wish, longing)\"},{\"eng\":\"species\",\"vie\":\"loài (type, kind)\"},{\"eng\":\"caveman\",\"vie\":\"người tiền sử (prehistoric man)\"},{\"eng\":\"wildebeest\",\"vie\":\"linh dương đầu bò (antelope species)\"},{\"eng\":\"yonder\",\"vie\":\"ở đằng kia (over there, distant)\"},{\"eng\":\"scouts\",\"vie\":\"người trinh sát, hướng đạo (explorers, observers)\"},{\"eng\":\"undoubtedly\",\"vie\":\"chắc chắn, không nghi ngờ (certainly, surely)\"},{\"eng\":\"existence\",\"vie\":\"sự tồn tại (being, presence)\"},{\"eng\":\"depleted\",\"vie\":\"cạn kiệt (exhausted, reduced)\"},{\"eng\":\"negotiate\",\"vie\":\"đàm phán (discuss, bargain)\"},{\"eng\":\"peculiar breed\",\"vie\":\"giống loài đặc biệt (unique type)\"},{\"eng\":\"seeking out\",\"vie\":\"tìm kiếm (searching for, looking for)\"},{\"eng\":\"inclined to\",\"vie\":\"có xu hướng (likely to, prone to)\"},{\"eng\":\"venturing\",\"vie\":\"mạo hiểm, dấn thân (risking, exploring)\"},{\"eng\":\"enquiring instinct\",\"vie\":\"bản năng tò mò, tìm hiểu (curious nature)\"},{\"eng\":\"fictional area\",\"vie\":\"khu vực hư cấu (imaginary place)\"},{\"eng\":\"uncultivated land\",\"vie\":\"đất chưa canh tác (unused land)\"},{\"eng\":\"puny\",\"vie\":\"nhỏ bé, yếu ớt (tiny, weak)\"},{\"eng\":\"irrelevant\",\"vie\":\"không liên quan (unrelated, insignificant)\"},{\"eng\":\"confined\",\"vie\":\"bị giới hạn, giam giữ (restricted, imprisoned)\"},{\"eng\":\"golden age\",\"vie\":\"thời kỳ hoàng kim (prosperous era)\"},{\"eng\":\"scarcely\",\"vie\":\"hiếm khi, hầu như không (barely, hardly)\"},{\"eng\":\"mountaineer\",\"vie\":\"người leo núi (climber, adventurer)\"},{\"eng\":\"campaigner\",\"vie\":\"nhà vận động (activist, advocate)\"},{\"eng\":\"unmechanised\",\"vie\":\"chưa cơ giới hóa (manual, traditional)\"},{\"eng\":\"camel\",\"vie\":\"lạc đà (desert animal)\"},{\"eng\":\"remote place\",\"vie\":\"nơi xa xôi (distant location)\"},{\"eng\":\"self-discovery\",\"vie\":\"sự tự khám phá bản thân (personal exploration)\"},{\"eng\":\"endeavour\",\"vie\":\"nỗ lực, cố gắng (attempt, effort)\"},{\"eng\":\"pioneer\",\"vie\":\"người tiên phong (trailblazer, innovator)\"},{\"eng\":\"prominent\",\"vie\":\"nổi bật, quan trọng (notable, distinguished)\"},{\"eng\":\"criteria\",\"vie\":\"tiêu chí (standards, requirements)\"},{\"eng\":\"definite objective\",\"vie\":\"mục tiêu rõ ràng (clear goal)\"},{\"eng\":\"bias\",\"vie\":\"sự thiên vị, định kiến (prejudice, favoritism)\"},{\"eng\":\"expeditions\",\"vie\":\"các cuộc thám hiểm (journeys, explorations)\"},{\"eng\":\"unique\",\"vie\":\"độc đáo (special, one-of-a-kind)\"},{\"eng\":\"continental voyages\",\"vie\":\"các chuyến đi xuyên lục địa (long journeys)\"},{\"eng\":\"specialists\",\"vie\":\"chuyên gia (experts, professionals)\"},{\"eng\":\"disregard\",\"vie\":\"coi thường, bỏ qua (ignore, neglect)\"},{\"eng\":\"interpretation\",\"vie\":\"sự diễn giải, giải thích (explanation, analysis)\"},{\"eng\":\"insights\",\"vie\":\"hiểu biết sâu sắc (understanding, wisdom)\"}],\"pData\":[{\"en\":[\"We are all explores.\",\"Our desire to discover, and then share that new-found knowledge, is part of what makes us human – indeed, this has played an important part in our success as a species.\",\"Long before the first caveman slumped down beside the fire and grunted news that there were plenty of wildebeest over yonder, our ancestors had learnt the value of sending out scouts to investigate the unknown.\",\"This questing nature of ours undoubtedly helped our species spread around the globe, just as it nowadays no doubt helps the last nomadic Penan maintain their existence in the depleted forests of Borneo, and a visitor negotiate the subways of New York.\"],\"vi\":[\"Tất cả chúng ta đều là những người khám phá.\",\"Mong muốn khám phá và sau đó chia sẻ kiến ​​thức mới tìm thấy của chúng ta là một phần tạo nên con người chúng ta - thực sự, điều này đã đóng một vai trò quan trọng trong sự thành công của loài người chúng ta.\",\"Rất lâu trước khi người thượng cổ đầu tiên ngồi sụp xuống bên đống lửa và càu nhàu khi biết rằng có rất nhiều linh dương đầu bò ở đằng kia, tổ tiên của chúng ta đã học được giá trị của việc cử các trinh sát đi điều tra những điều chưa biết.\",\"Bản chất tìm kiếm này của chúng ta chắc chắn đã giúp loài người chúng ta lan rộng khắp thế giới, cũng như ngày nay chắc chắn nó đã giúp người Penan du mục cuối cùng duy trì sự tồn tại của họ trong những khu rừng cạn kiệt ở Borneo, và một du khách di chuyển bằng tàu điện ngầm ở New York.\"]},{\"en\":[\"Over the years, we’ve come to think of explorers as a peculiar breed – different from the rest of us, different from those of us who are merely ‘well travelled’, even; and perhaps there is a type of person more suited to seeking out the new, a type of caveman more inclined to risk venturing out.\",\"That, however, doesn’t take away from the fact that we all have this enquiring instinct, even today; and that in all sorts of professions – whether artist, marine biologist or astronomer – borders of the unknown are being tested each day.\"],\"vi\":[\"Qua nhiều năm, chúng ta đã dần coi những nhà thám hiểm là một giống loài đặc biệt - khác với phần còn lại của chúng ta, khác với những người trong chúng ta, những người chỉ đơn thuần là những người 'đi du lịch nhiều', thậm chí; và có lẽ có một kiểu người phù hợp hơn với việc tìm kiếm cái mới, một kiểu người thượng cổ có xu hướng mạo hiểm mạo hiểm hơn.\",\"Tuy nhiên, điều đó không làm mất đi sự thật rằng tất cả chúng ta đều có bản năng tìm hiểu này, kể cả ngày nay; và rằng trong mọi ngành nghề – dù là nghệ sĩ, nhà sinh vật biển hay nhà thiên văn học – những ranh giới của những điều chưa biết đang bị thử thách mỗi ngày.\"]},{\"en\":[\"Thomas Hardy set some of his novels in Egdon Heath, a fictional area of uncultivated land, and used the landscape to suggest the desires and fears of his characters.\",\"He is delving into matters we all recognise because they are common to humanity.\",\"This is surely an act of exploration, and into a world as remote as the author chooses.\",\"Explorer and travel writer Peter Fleming talks of the moment when the explorer returns to the existence he has left behind with his loved ones.\",\"The traveller ‘who has for weeks or months seen himself only as a puny and irrelevant alien crawling laboriously over a country in which he has no roots and no background, suddenly encounters his other self, a relatively solid figure, with a place in the minds of certain people’.\"],\"vi\":[\"Thomas Hardy lấy bối cảnh một số cuốn tiểu thuyết của mình ở Egdon Heath, một khu vực hư cấu trên vùng đất hoang hóa và sử dụng phong cảnh để gợi lên những mong muốn và nỗi sợ hãi của các nhân vật của mình.\",\"Anh ấy đang đi sâu vào những vấn đề mà tất cả chúng ta đều nhận ra vì chúng là những vấn đề chung của nhân loại.\",\"Đây chắc chắn là một hành động khám phá và đi vào một thế giới xa xôi như tác giả đã chọn.\",\"Nhà thám hiểm và nhà văn du lịch Peter Fleming nói về khoảnh khắc nhà thám hiểm quay trở lại cuộc sống mà anh ta đã bỏ lại phía sau cùng những người thân yêu của mình.\",\"Người du hành ‘trong nhiều tuần hoặc nhiều tháng chỉ coi mình là một người ngoài hành tinh nhỏ bé và không liên quan đang vất vả bò trên một đất nước mà anh ta không có nguồn gốc và không có lai lịch, đột nhiên gặp phải cái tôi khác của mình, một nhân vật tương đối vững chắc, có một vị trí trong tâm trí của một số người’.\"]},{\"en\":[\"In this book about the exploration of the earth’s surface, I have confined myself to those whose travels were real and who also aimed at more than personal discovery.\",\"But that still left me with another problem: the word ‘explorer’ has become associated with a past era.\",\"We think back to a golden age, as if exploration peaked somehow in the 19th century – as if the process of discovery is now on the decline, though the truth is that we have named only one and a half million of this planet’s species, and there may be more than 10 million – and that’s not including bacteria.\",\"We have studied only 5 per cent of the species we know.\",\"We have scarcely mapped the ocean floors, and know even less about ourselves; we fully understand the workings of only 10 per cent of our brains.\"],\"vi\":[\"Trong cuốn sách về hành trình khám phá bề mặt trái đất này, tôi đã giới hạn bản thân mình với những người có chuyến đi thực sự và những người cũng nhắm đến nhiều mục đích hơn là khám phá cá nhân.\",\"Nhưng điều đó vẫn để lại cho tôi một vấn đề khác: từ 'nhà thám hiểm' đã trở nên gắn liền với thời đại đã qua.\",\"Chúng ta nghĩ lại thời kỳ hoàng kim, như thể việc khám phá đã đạt đến đỉnh điểm bằng cách nào đó vào thế kỷ 19 - như thể quá trình khám phá hiện đang suy giảm, mặc dù sự thật là chúng ta chỉ đặt tên cho một triệu rưỡi loài trên hành tinh này và có thể có hơn 10 triệu - và đó là chưa bao gồm vi khuẩn.\",\"Chúng tôi chỉ nghiên cứu 5% số loài mà chúng tôi biết.\",\"Chúng ta hiếm khi lập bản đồ đáy đại dương và thậm chí còn biết ít hơn về bản thân mình; chúng ta chỉ hiểu đầy đủ hoạt động của 10% bộ não.\"]},{\"en\":[\"Here is how some of today’s ‘explorers’ define the word.\",\"Ran Fiennes, dubbed the ‘greatest living explorer’, said, ‘An explorer is someone who has done something that no human has done before – and also done something scientifically useful.’ Chris Bonington, a leading mountaineer, felt exploration was to be found in the act of physically touching the unknown: ‘You have to have gone somewhere new.’ Then Robin Hanbury-Tenison, a campaigner on behalf of remote so-called ‘tribal’ peoples, said, ‘A traveller simply records information about some far-off world, and reports back; but an explorer changes the world.’ Wilfred Thesiger, who crossed Arabia’s Empty Quarter in 1946, and belongs to an era of unmechanised travel now lost to the rest of us, told me, ‘If I’d gone across by camel when I could have gone by car, it would have been a stunt.’ To him, exploration meant bringing back information from a remote place regardless of any great self-discovery.\"],\"vi\":[\"Đây là cách một số 'nhà thám hiểm' ngày nay định nghĩa từ này.\",\"Ran Fiennes, được mệnh danh là 'nhà thám hiểm vĩ đại nhất còn sống', đã nói: 'Nhà thám hiểm là người đã làm điều gì đó mà trước đây chưa có con người nào làm - và cũng làm được điều gì đó hữu ích về mặt khoa học.' Chris Bonington, một nhà leo núi hàng đầu, cảm thấy sự khám phá được thể hiện qua hành động chạm vào vật thể chưa biết: 'Bạn hẳn phải đã đến một nơi nào đó mới mẻ.' Sau đó, Robin Hanbury-Tenison, một nhà vận động thay mặt cho những người ở xa được gọi là 'bộ lạc', nói: 'Một du khách chỉ cần ghi lại thông tin về một thế giới xa xôi nào đó, và báo cáo lại; nhưng một nhà thám hiểm đã thay đổi thế giới.’ Wilfred Thesiger, người đã vượt qua Khu phố trống của Ả Rập vào năm 1946, và thuộc về thời đại du hành không có máy móc mà giờ đây chúng ta đã lạc mất, đã nói với tôi, ‘Nếu tôi đi bằng lạc đà trong khi lẽ ra tôi có thể đi bằng ô tô thì đó sẽ là một trò mạo hiểm.’ Đối với anh ấy, thám hiểm có nghĩa là mang về thông tin từ một nơi xa xôi bất kể sự khám phá bản thân vĩ đại nào.\"]},{\"en\":[\"Each definition is slightly different – and tends to reflect the field of endeavour of each pioneer.\",\"It was the same whoever I asked: the prominent historian would say exploration was a thing of the past, the cutting-edge scientist would say it was of the present.\",\"And so on.\",\"They each set their own particular criteria; the common factor in their approach being that they all had, unlike many of us who simply enjoy travel or discovering new things, both a very definite objective from the outset and also a desire to record their findings.\"],\"vi\":[\"Mỗi định nghĩa hơi khác nhau – và có xu hướng phản ánh lĩnh vực nỗ lực của mỗi người tiên phong.\",\"Bất cứ ai tôi hỏi cũng đều như vậy: nhà sử học nổi tiếng sẽ nói việc thám hiểm đã là chuyện quá khứ, nhà khoa học tiên tiến sẽ nói rằng đó là chuyện của hiện tại.\",\"Và vân vân.\",\"Mỗi người đều đặt ra tiêu chí cụ thể của riêng mình; Yếu tố chung trong cách tiếp cận của họ là tất cả họ đều có, không giống như nhiều người trong chúng ta, những người chỉ đơn giản thích đi du lịch hoặc khám phá những điều mới, cả hai đều có mục tiêu rất rõ ràng ngay từ đầu và cũng có mong muốn ghi lại những phát hiện của mình.\"]},{\"en\":[\"I’d best declare my own bias.\",\"As a writer, I’m interested in the exploration of ideas.\",\"I’ve done a great many expeditions and each one was unique.\",\"I’ve lived for months alone with isolated groups of people all around the world, even two ‘uncontacted tribes’.\",\"But none of these things is of the slightest interest to anyone unless, through my books, I’ve found a new slant, explored a new idea.\",\"Why?\",\"Because the world has moved on.\",\"The time has long passed for the great continental voyages – another walk to the poles, another crossing of the Empty Quarter.\",\"We know how the land surface of our planet lies; exploration of it is now down to the details – the habits of microbes, say, or the grazing behaviour of buffalo.\",\"Aside from the deep sea and deep underground, it’s the era of specialists.\",\"However, this is to disregard the role the human mind has in conveying remote places; and this is what interests me: how a fresh interpretation, even of a well-travelled route, can give its readers new insights.\"],\"vi\":[\"Tốt nhất tôi nên tuyên bố thành kiến ​​của riêng mình.\",\"Là một nhà văn, tôi quan tâm đến việc khám phá các ý tưởng.\",\"Tôi đã thực hiện rất nhiều chuyến thám hiểm và mỗi chuyến đều là duy nhất.\",\"Tôi đã sống một mình nhiều tháng với những nhóm người biệt lập trên khắp thế giới, thậm chí cả hai 'bộ tộc không liên lạc'.\",\"Nhưng không điều nào trong số này được bất kỳ ai quan tâm dù là nhỏ nhất trừ khi, thông qua những cuốn sách của mình, tôi đã tìm ra một quan điểm mới, khám phá một ý tưởng mới.\",\"Tại sao?\",\"Bởi vì thế giới đã chuyển động.\",\"Thời gian đã trôi qua từ lâu đối với những chuyến đi xuyên lục địa vĩ đại – một chuyến đi bộ khác đến các cực, một chuyến băng qua Khu phố trống.\",\"Chúng ta biết bề mặt đất của hành tinh chúng ta nằm như thế nào; việc khám phá nó bây giờ tập trung vào các chi tiết - chẳng hạn như thói quen của vi khuẩn hoặc hành vi gặm cỏ của trâu.\",\"Ngoài biển sâu và lòng đất sâu, đó là thời đại của các chuyên gia.\",\"Tuy nhiên, điều này là coi thường vai trò của trí óc con người trong việc truyền tải những nơi xa xôi; và đây là điều khiến tôi quan tâm: làm thế nào một cách diễn giải mới mẻ, thậm chí về một tuyến đường được nhiều người đi lại, có thể mang đến cho độc giả những hiểu biết mới.\"]}],\"timeLimit\":30}];\n\nlet currentLessonIndex = 0;\nlet qs, vocab, headings, headingKey, mifRange, removeOpt, removeFeatureOpt, pairs, pData;\n\nlet timeLeft = 0;\nlet timerInterval;\nconst timerEl = document.getElementById('timer');\n\nfunction startTimer() {\n    timerInterval = setInterval(() => {\n        if(timeLeft <= 0) {\n            clearInterval(timerInterval);\n            timerEl.innerText = \"00:00\";\n            alert(\"Time is up!\");\n            return;\n        }\n        timeLeft--;\n        const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');\n        const s = (timeLeft % 60).toString().padStart(2, '0');\n        timerEl.innerText = `${m}:${s}`;\n    }, 1000);\n}\n\nfunction switchLesson(idx) {\n    currentLessonIndex = parseInt(idx);\n    const l = lessonsData[currentLessonIndex];\n    qs = l.qs; vocab = l.vocab; headings = l.headings; headingKey = l.headingKey;\n    mifRange = l.mifRange; removeOpt = l.removeOpt; removeFeatureOpt = l.removeFeatureOpt;\n    pairs = l.pairs; pData = l.pData;\n\n    // Reset UI\n    document.getElementById('articleArea').innerHTML = l.articleHtml;\n    document.getElementById('headingsArea').innerHTML = l.headingsHtml;\n    document.getElementById('qs').innerHTML = '';\n    document.getElementById('progressBar').innerHTML = '';\n    document.getElementById('saveBtn').style.display = 'none';\n    \n    // Reset Timer\n    clearInterval(timerInterval);\n    timeLeft = l.timeLimit * 60;\n    timerEl.innerText = \"--:--\";\n    startTimer();\n\n    // Render Questions & Attach Events\n    renderStudentQuestions();\n    attachEvents();\n\n    // Manage Views\n    if(document.getElementById('game-view').style.display === 'block') initGame();\n    if(document.getElementById('mif-view').style.display === 'flex') {\n        document.getElementById('mif-view').style.display = 'none';\n    }\n}\n\n// --- RENDERING QUESTIONS ---\nfunction renderStudentQuestions() {\n    const qDiv=document.getElementById('qs');\n    qDiv.innerHTML = '';\n    \n    qs.forEach(q=>{\n      if(q.type==='text-only'){ qDiv.innerHTML+=`<div class=\"text-only\">${q.text}</div>`; }\n      else if(q.type==='summary') { \n          let h = `<div class=\"q-block\" id=\"q-card-${q.id}\">`;\n          let txt = q.text.replace(/\\n/g, '<br>');\n          q.gapIds.forEach(gid => {\n              const isFeat = q.isFeature ? 'true' : 'false';\n              const dz = `<span class=\"drop-zone\" id=\"dz-${gid}\" data-gid=\"${gid}\" data-isfeat=\"${isFeat}\" ondragover=\"allowDrop(event)\" ondrop=\"drop(event)\" onclick=\"clearDrop(${gid})\"></span><span class=\"q-num\" style=\"vertical-align:super;font-size:10px\">${gid}</span>&nbsp;`;\n              let replaced = txt.replace(new RegExp(`${gid}\\\\s*([._…-]{2,}|_{2,}|…+)`), dz);\n              if(replaced === txt) replaced = txt.replace(new RegExp(`${gid}[.]\\\\s+`), dz + ' ');\n              txt = replaced;\n              const d=document.createElement('div'); d.className='progress-circle'; d.id='prog-'+gid; d.innerText=gid;\n              d.onclick=()=>document.getElementById('q-card-'+q.id).scrollIntoView({behavior:'smooth',block:'center'});\n              document.getElementById('progressBar').appendChild(d);\n          });\n          h += `<div style=\"line-height:2;font-size:15px\">${txt}</div><div style=\"margin-top:15px;display:flex;flex-wrap:wrap;gap:8px;padding-top:10px;border-top:1px dashed #e2e8f0\">`;\n          q.options.forEach(optLine => {\n              const m = optLine.match(/^([A-Z])\\s*[.)]?\\s*(.+)/);\n              if(m) h += `<div class=\"heading-item\" id=\"opt-${q.id}-${m[1]}\" style=\"display:inline-flex;width:auto;margin:0\" draggable=\"true\" ondragstart=\"drag(event)\" data-val=\"${m[1]}\"><span style=\"font-weight:bold;color:#2563eb\">${m[1]}</span> ${m[2]}</div>`;\n          });\n          h += `</div><div id=\"fb-${q.id}\" style=\"margin-top:10px; font-size:13px\"></div></div>`;\n          qDiv.innerHTML += h;\n      } \n      else if(q.type==='gap-fill-block') { \n          let h = `<div class=\"q-block\" id=\"q-card-${q.id}\">`;\n          let txt = q.text.replace(/\\n/g, '<br>'); \n          q.gapIds.forEach(gid => {\n              const loc = (q.locations && q.locations[gid]) ? q.locations[gid] : \"\";\n              const locBtn = loc ? `<button class=\"loc-btn\" onclick=\"showLoc(${q.id}, ${gid})\">📍</button>` : \"\";\n              const inp = `<span class=\"q-num\">${gid}</span><input type=\"text\" class=\"gap-input\" data-gid=\"${gid}\" oninput=\"upd(${gid})\">${locBtn}&nbsp;`;\t\n              txt = txt.replace(new RegExp(`${gid}[\\\\s:.)]*(?:[_….\\\\-]\\\\s*){2,}`), inp);\n              const d=document.createElement('div'); d.className='progress-circle'; d.id='prog-'+gid; d.innerText=gid;\n              d.onclick=()=>document.getElementById('q-card-'+q.id).scrollIntoView({behavior:'smooth',block:'center'});\n              document.getElementById('progressBar').appendChild(d);\n          });\n          h += `<div style=\"line-height:2.2;font-size:16px\">${txt}</div><div id=\"fb-${q.id}\" style=\"margin-top:10px; font-size:13px\"></div></div>`;\n          qDiv.innerHTML += h;\n      }\n      else if(q.type==='mcq-multi') {\n          let h = `<div class=\"q-block\" id=\"q-card-${q.id}\">`;\n          const locBtn1 = (q.locations && q.locations[q.gapIds[0]]) ? `<button class=\"loc-btn\" onclick=\"showLoc(${q.id}, ${q.gapIds[0]})\">📍</button>` : \"\";\n          h += `<div style=\"display:flex;align-items:baseline;margin-bottom:8px;\"><span class=\"q-num\">${q.gapIds[0]}-${q.gapIds[q.gapIds.length-1]}</span> <span>${q.text}</span> ${locBtn1}</div>`;\n          q.options.forEach((o, i) => {\n              const optLetterMatch = o.match(/^([A-Z])/i);\n              const optLetter = optLetterMatch ? optLetterMatch[1].toUpperCase() : o.trim()[0].toUpperCase();\n              h += `<label style=\"display:block;margin:5px 0;cursor:pointer;transition:all 0.2s;\">\n                      <input type=\"checkbox\" name=\"mcq_${q.id}\" value=\"${optLetter}\" onchange=\"updMcqMulti(${q.id}, '${q.gapIds.join(',')}', event)\"> ${o} <span id=\"mcq-mark-${q.id}-${i}\" class=\"mcq-mark\"></span>\n                    </label>`;\n          });\n          h += `<div id=\"fb-${q.id}\" class=\"feedback\" style=\"margin-top:8px;font-size:13px\"></div></div>`;\n          qDiv.innerHTML += h;\n          q.gapIds.forEach(gid => {\n              const d=document.createElement('div'); d.className='progress-circle'; d.id='prog-'+gid; d.innerText=gid;\n              d.onclick=()=>document.getElementById('q-card-'+q.id).scrollIntoView({behavior:'smooth',block:'center'});\n              document.getElementById('progressBar').appendChild(d);\n          });\n      }\n      else { \n        let h=`<div class=\"q-block\" id=\"q-card-${q.id}\">`;\n        const loc = q.location || \"\";\n        const locBtn = loc ? `<button class=\"loc-btn\" onclick=\"showLoc(${q.id})\">📍</button>` : \"\";\n        \n        if(q.type==='gap-fill'){\n           let t=q.text.replace(/(\\d+)[\\s:.)]*(?:[_….\\-]\\s*){2,}/g, '<span class=\"q-num\">$1</span><input type=\"text\" class=\"gap-input\" data-id=\"'+q.id+'\" oninput=\"upd('+q.id+')\">'+locBtn+'&nbsp;');\n           h+=`<div>${t}</div>`;\n        } else {\n           h+=`<div style=\"display:flex;align-items:baseline\"><span class=\"q-num\">${q.id}.</span> <span>${q.text}</span> ${locBtn}</div>`;\n           if(q.type==='mcq') q.options.forEach((o, i) => { h += `<label class=\"mcq-label\" style=\"display:block;margin:5px 0;cursor:pointer\"><input type=\"radio\" name=\"q${q.id}\" value=\"${o.trim()[0]}\" onchange=\"upd(${q.id})\"> ${o} <span id=\"mcq-mark-${q.id}-${i}\" class=\"mcq-mark\"></span></label>`; });\n           if(q.type==='tfng') {\n               h+='<div class=\"tfng-container\">';\n               ['TRUE', 'FALSE', 'NOT GIVEN'].forEach(opt => {\n                   h+=`<label class=\"tfng-label\"><input type=\"radio\" name=\"tfng${q.id}\" value=\"${opt}\" onchange=\"upd(${q.id})\"><span class=\"tfng-btn\">${opt}</span></label>`;\n               });\n               h+='</div>';\n           }\n           if(q.type==='ynng') {\n               h+='<div class=\"tfng-container\">';\n               ['YES', 'NO', 'NOT GIVEN'].forEach(opt => {\n                   h+=`<label class=\"tfng-label\"><input type=\"radio\" name=\"ynng${q.id}\" value=\"${opt}\" onchange=\"upd(${q.id})\"><span class=\"tfng-btn\">${opt}</span></label>`;\n               });\n               h+='</div>';\n           }\n           if(q.type==='mif') {\n               h+='<div class=\"mif-container\">';\n               mifRange.split('').forEach(char => {\n                   h+=`<label class=\"mif-label\"><input type=\"radio\" name=\"mif${q.id}\" value=\"${char}\" onchange=\"upd(${q.id})\"><span class=\"mif-circle\">${char}</span></label>`;\n               });\n               h+='</div>';\n           }\n        }\n        h+=`<div id=\"fb-${q.id}\" class=\"feedback\" style=\"margin-top:8px;font-size:13px\"></div></div>`;\n        qDiv.innerHTML+=h;\n        const d=document.createElement('div'); d.className='progress-circle'; d.id='prog-'+q.id; d.innerText=q.id;\n        d.onclick=()=>document.getElementById('q-card-'+q.id).scrollIntoView({behavior:'smooth',block:'center'});\n        document.getElementById('progressBar').appendChild(d);\n      }\n    });\n\n    document.querySelectorAll('input[type=\"radio\"][name^=\"mif\"]').forEach(radio => {\n        radio.addEventListener('change', (e) => {\n            const qId = radio.name.replace('mif', '');\n            const pChar = radio.value;\n            document.querySelectorAll(`.mif-inline-btn[data-qid=\"${qId}\"]`).forEach(btn => {\n                const btnPara = btn.closest('.mif-inline-box').dataset.para;\n                if(btnPara === pChar) {\n                    btn.classList.remove('hidden-by-other');\n                    btn.classList.add('selected');\n                } else {\n                    btn.classList.remove('selected');\n                    btn.classList.add('hidden-by-other');\n                }\n            });\n        });\n    });\n}\n\nfunction attachEvents() {\n    const pp = document.getElementById('popup');\n    document.querySelectorAll('.vocab').forEach(s => {\n      s.onclick = e => {\n        const v = vocab.find(x => x.id === s.dataset.vid); if(!v) return;\n        pp.innerHTML = `<div style=\"background:#1e293b;color:#fff;padding:12px;font-weight:700;display:flex;justify-content:space-between;align-items:center\"><span>${v.word}</span><span onclick=\"speak('${v.word}')\" style=\"cursor:pointer;background:#334155;padding:4px;border-radius:50%\">🔊</span></div><div style=\"padding:16px;font-size:14px;color:#334155\"><p style=\"margin-bottom:8px\"><b style=\"color:#0f172a\">Meaning:</b> ${v.meaning}</p><p style=\"margin-bottom:8px\"><b style=\"color:#0f172a\">Synonyms:</b> ${v.synonym}</p><div style=\"background:#f1f5f9;padding:8px;border-radius:6px;margin-top  p.remove(), 2000);\n  }\n}\n\ndocument.getElementById('shuffleBtn').addEventListener('click', () => { state.engOrder = shuffleArray(pairs.map((_,i)=>i)); state.shuffledVie = shuffleArray(pairs.map(p => p.vie)); renderEng(); renderVie(); attachSlotEvents(); state.matches = {}; state.score = 0; updateScore(); });\ndocument.getElementById('resetBtn').addEventListener('click', () => initGame());\n\nfunction clearPicked(){ if(currentPicked && currentPicked.el) currentPicked.el.style.outline = ''; currentPicked = null; }\ndocument.addEventListener('click', (e) => { if(!e.target.closest('.g-vie-item') && !e.target.closest('.g-slot')) clearPicked(); });\n\nlet flashIndex = 0; let flashAuto = null;\nfunction initFlashcards(){ flashIndex = 0; renderFlash(); }\nfunction renderFlash(){\n  const flashFront = document.getElementById('flashFront'); const flashBack = document.getElementById('flashBack'); const flashcardEl = document.getElementById('flashcard');\n  if(pairs.length === 0){ flashFront.textContent = 'Không có từ nào'; flashBack.textContent = ''; return; }\n  const p = pairs[flashIndex]; flashFront.textContent = p.eng; flashBack.textContent = p.vie; flashcardEl.classList.remove('flipped'); flashcardEl.setAttribute('aria-pressed','false');\n}\ndocument.getElementById('nextCard').addEventListener('click', () => { if(pairs.length) { flashIndex = (flashIndex + 1) % pairs.length; renderFlash(); } });\ndocument.getElementById('prevCard').addEventListener('click', () => { if(pairs.length) { flashIndex = (flashIndex - 1 + pairs.length) % pairs.length; renderFlash(); } });\ndocument.getElementById('flipCard').addEventListener('click', () => { const f = document.getElementById('flashcard'); f.classList.toggle('flipped'); f.setAttribute('aria-pressed', f.classList.contains('flipped')); });\ndocument.getElementById('flashcard').addEventListener('click', function() { this.classList.toggle('flipped'); this.setAttribute('aria-pressed', this.classList.contains('flipped')); });\ndocument.getElementById('autoPlay').addEventListener('click', (e) => {\n  if(flashAuto){ clearInterval(flashAuto); flashAuto = null; e.target.textContent = 'Auto'; }\n  else { flashAuto = setInterval(()=>{ flashIndex = (flashIndex+1)%pairs.length; renderFlash(); }, 2000); e.target.textContent = 'Stop'; }\n});\ndocument.getElementById('showBoth').addEventListener('click', () => { const f = document.getElementById('flashcard'); f.classList.add('flipped'); setTimeout(()=> f.classList.remove('flipped'), 1600); });\n\nfunction renderFillList(){\n  const fillListEl = document.getElementById('fillList'); const fillScoreEl = document.getElementById('fillScore');\n  fillListEl.innerHTML = '';\n  pairs.forEach((p, idx) => {\n    const row = document.createElement('div'); row.className = 'fill-row';\n    row.innerHTML = `<div class=\"vie\">${p.vie}</div><input type=\"text\" data-index=\"${idx}\" placeholder=\"Nhập tiếng Anh...\" /><div class=\"small\" style=\"min-width:120px\" id=\"hint-${idx}\"></div>`;\n    fillListEl.appendChild(row);\n    const input = row.querySelector('input'); input.addEventListener('focus', () => input.classList.remove('wrong')); input.addEventListener('blur', () => {});\n  });\n  fillScoreEl.textContent = `Điểm: 0 / ${pairs.length}`;\n}\n\ndocument.getElementById('checkFill').addEventListener('click', () => {\n  const fillListEl = document.getElementById('fillList'); let correct = 0;\n  pairs.forEach((p, idx) => {\n    const input = fillListEl.querySelector(`input[data-index=\"${idx}\"]`); const hint = document.getElementById(`hint-${idx}`);\n    const val = (input.value || '').trim().toLowerCase(); const target = p.eng.trim().toLowerCase();\n    if(val === target){\n      correct++; input.classList.add('correct'); input.classList.remove('wrong'); input.style.borderColor = 'rgba(16,185,129,0.9)'; hint.innerHTML = `<span class=\"correct-answer\">Đúng</span>`;\n    } else {\n      input.classList.remove('correct'); input.classList.add('wrong'); input.style.borderColor = 'rgba(244,63,94,0.9)'; hint.innerHTML = `<span class=\"wrong-answer\">Sai</span>`;\n    }\n  });\n  document.getElementById('fillScore').textContent = `Điểm: ${correct} / ${pairs.length}`;\n});\n\ndocument.getElementById('showAnswers').addEventListener('click', () => {\n  const fillListEl = document.getElementById('fillList');\n  pairs.forEach((p, idx) => {\n    const input = fillListEl.querySelector(`input[data-index=\"${idx}\"]`);\n    input.value = p.eng; input.classList.add('correct'); input.style.borderColor = 'rgba(6,182,212,0.6)';\n    const hint = document.getElementById(`hint-${idx}`); hint.innerHTML = `<span class=\"correct-answer\">Đáp án</span>`;\n  });\n  document.getElementById('fillScore').textContent = `Điểm: ${pairs.length} / ${pairs.length}`;\n});\n\ndocument.getElementById('resetFill').addEventListener('click', () => renderFillList());\n\nwindow.onload = () => {\n    if (document.body.getAttribute('data-is-graded') === 'true') {\n        document.getElementById('lesson-selector').disabled = true;\n        const submitBtn = document.getElementById('submitBtn');\n        if(submitBtn) submitBtn.style.display = 'none';\n        const saveBtn = document.getElementById('saveBtn');\n        if(saveBtn) saveBtn.style.display = 'none';\n        clearInterval(timerInterval);\n        document.getElementById('timer').style.display = 'none';\n        return;\n    }\n\n    const sel = document.getElementById('lesson-selector');\n    sel.innerHTML = '';\n    lessonsData.forEach((l, i) => {\n        const opt = document.createElement('option');\n        opt.value = i; opt.innerText = l.name;\n        sel.appendChild(opt);\n    });\n    switchLesson(0);\n};\n<\/script>\n\n<script type=\"text/javascript\">var lbplugin_event_opt={\"extension_enable\":true,\"dict_type\":1,\"dbclk_event\":{\"trigger\":\"none\",\"enable\":true,\"display\":1},\"select_event\":{\"trigger\":\"none\",\"enable\":true,\"display\":1}};function loadScript(t,e){var n=document.crea     const select = document.getElementById('selectBai');

    const frame = document.getElementById('frame');

      if (btn) btn.remove();

      frame.srcdoc = it.content;

    clearBtn.onclick = () => {
