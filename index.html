     <button class=\"check-btn\" onclick=\"check()\" id=\"submitBtn\">SUBMIT</button>\n    </div>\n</div>\n\n<div id=\"reading-view\" class=\"container\">\n  <div class=\"pane left\" id=\"lp\"><h2 style=\"font-size:18px; font-weight:700; color:#334155; margin-bottom:15px\">Reading Passage</h2><div id=\"articleArea\"></div></div>\n  <div class=\"resizer\" id=\"rs\"></div>\n  <div class=\"pane right\"><h2 style=\"font-size:18px; font-weight:700; color:#334155; margin-bottom:15px\">Questions</h2><div id=\"headingsArea\"></div><div id=\"qs\"></div></div>\n</div>\n\n<div id=\"game-view\">\n  <div class=\"g-container\">\n    <header class=\"g-header\">\n      <h1 class=\"g-h1\">Vocabulary Matching Game</h1>\n      <div class=\"g-controls\">\n        <div class=\"g-badge\" id=\"score\">Đúng: 0 / 0</div>\n        <button class=\"g-btn\" id=\"shuffleBtn\">Trộn</button>\n        <button class=\"g-btn\" id=\"resetBtn\">Làm lại</button>\n        <button class=\"g-btn\" style=\"background:linear-gradient(90deg,#ef4444,#dc2626);color:#fff\" onclick=\"toggleGame()\">Close Game</button>\n      </div>\n    </header>\n\n    <section class=\"g-card\" style=\"margin-bottom:12px;\">\n      <h3 style=\"margin-top:0; color:var(--accent)\">Flashcards Ôn Tập</h3>\n      <div style=\"display:flex; gap:12px; align-items:center; flex-wrap:wrap;\">\n        <div class=\"flash-wrap\">\n          <div id=\"flashcard\" class=\"flashcard\" tabindex=\"0\" role=\"button\" aria-pressed=\"false\">\n            <div class=\"flash-face front\" id=\"flashFront\">Nhấn Next để bắt đầu</div>\n            <div class=\"flash-face back\" id=\"flashBack\">Back</div>\n          </div>\n        </div>\n        <div style=\"display:flex; flex-direction:column; gap:8px;\">\n          <div style=\"display:flex; gap:8px;\">\n            <button class=\"g-btn\" id=\"prevCard\">Prev</button>\n            <button class=\"g-btn\" id=\"flipCard\">Flip</button>\n            <button class=\"g-btn\" id=\"nextCard\">Next</button>\n          </div>\n          <div style=\"display:flex; gap:8px;\">\n            <button class=\"g-btn\" id=\"autoPlay\">Auto</button>\n            <button class=\"g-btn\" id=\"showBoth\">Show Both</button>\n          </div>\n        </div>\n      </div>\n      <div class=\"small\" style=\"margin-top:8px; color:var(--muted); font-size:13px\">Nhấn flashcard để lật. Auto sẽ tự chuyển sau 2s. Show Both hiển thị cả 2 mặt tạm thời.</div>\n    </section>\n\n    <section class=\"g-layout\">\n      <div class=\"g-card\">\n        <h3 style=\"margin-top:0; color:var(--accent)\">Phần 1 Matching</h3>\n        <div class=\"small\" style=\"color:var(--muted); font-size:13px\">Kéo nghĩa vào ô tương ứng. Hoặc chạm để chọn rồi chạm vào ô.</div>\n        <div class=\"g-list\" id=\"engList\" style=\"margin-top:12px;\"></div>\n      </div>\n      <div class=\"g-card\">\n        <h3 style=\"margin-top:0; color:var(--accent)\">Phần 2 Vietnamese</h3>\n        <div class=\"g-vie-list\" id=\"vieList\" style=\"margin-top:12px;\"></div>\n      </div>\n    </section>\n\n    <section class=\"g-card\" style=\"margin-top:12px; margin-bottom: 50px;\">\n      <h3 style=\"margin-top:0; color:var(--accent)\">Bài Điền Chữ</h3>\n      <div class=\"small\" style=\"color:var(--muted); font-size:13px\">Bên trái là tiếng Việt, bên phải học sinh điền tiếng Anh. Nhấn Kiểm tra để chấm.</div>\n      <div style=\"margin-top:10px;\">\n        <div class=\"fill-list\" id=\"fillList\"></div>\n        <div style=\"margin-top:10px; display:flex; gap:8px; align-items:center;\">\n          <button class=\"g-btn\" id=\"checkFill\">Kiểm tra</button>\n          <button class=\"g-btn\" id=\"showAnswers\">Hiện đáp án</button>\n          <button class=\"g-btn\" id=\"resetFill\">Làm lại</button>\n          <div class=\"small\" id=\"fillScore\" style=\"align-self:center; color:var(--muted); font-size:13px\">Điểm: 0 / 0</div>\n        </div>\n      </div>\n    </section>\n  </div>\n</div>\n\n<div id=\"mif-view\">\n  <div class=\"mif-header\">\n    <h2 id=\"mif-title\" style=\"margin:0;color:#4338ca;font-size:18px\">Luyện Mif: Đoạn ...</h2>\n    <button class=\"mif-nav-btn\" style=\"background:#ef4444\" onclick=\"toggleMifMode()\">Đóng</button>\n  </div>\n  <div class=\"mif-body\">\n    <div class=\"mif-left\">\n      <div class=\"mif-col-container\">\n        <div class=\"mif-col\" id=\"mif-en-col\"></div>\n        <div class=\"mif-col\" id=\"mif-vi-col\"></div>\n      </div>\n    </div>\n    <div class=\"mif-right\">\n      <div id=\"mif-qs-container\" style=\"flex:1; overflow-y:auto; padding-bottom:20px;\"></div>\n      <div style=\"display:flex; justify-content:space-between; border-top:2px solid #cbd5e1; padding-top:15px; margin-top:10px;\">\n        <button class=\"mif-nav-btn\" id=\"mif-prev\" onclick=\"navMif(-1)\">⬅ Back</button>\n        <button class=\"mif-nav-btn\" id=\"mif-next\" onclick=\"navMif(1)\">Next ➡</button>\n      </div>\n    </div>\n  </div>\n</div>\n\n<div id=\"popup\"></div>\n<div class=\"confetti\" id=\"confetti\"></div>\n\n<script>\n// --- MULTI-LESSON DATA INJECTION ---\nconst lessonsData = [{\"name\":\"Passage 1\",\"articleHtml\":\"\\u003cdiv class=\\\"reading-content\\\">\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph A\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s0\\\">The automotive sector is well used to \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v0\\\">adapting\\u003c/span> to automation in manufacturing. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s1\\\">The \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v1\\\">implementation\\u003c/span> of robotic car manufacture from the 1970s onwards led to significant \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v2\\\">cost savings\\u003c/span> and improvements in the \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v3\\\">reliability\\u003c/span> and \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v4\\\">flexibility\\u003c/span> of vehicle mass production. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s2\\\">A new challenge to vehicle production is now on the horizon and, again, it comes from automation. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s3\\\">However, this time it is not to do with the manufacturing process, but with the vehicles themselves. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s4\\\">Research projects on vehicle automation are not new. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s5\\\">Vehicles with limited self-driving \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v5\\\">capabilities\\u003c/span> have been around for more than 50 years, resulting in significant contributions towards driver assistance systems. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s6\\\">But since Google announced in 2010 that it had been \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v6\\\">trialling\\u003c/span> self-driving cars on the streets of California, progress in this field has quickly gathered pace. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t0')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t0\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p0s0\\\" class=\\\"vi-sent\\\">Lĩnh vực ô tô được sử dụng tốt để thích ứng với tự động hóa trong sản xuất. \\u003c/span>\\u003cspan id=\\\"p0s1\\\" class=\\\"vi-sent\\\">Việc triển khai sản xuất ô tô bằng robot từ những năm 1970 trở đi đã giúp tiết kiệm đáng kể chi phí và cải thiện độ tin cậy cũng như tính linh hoạt của quá trình sản xuất hàng loạt ô tô. \\u003c/span>\\u003cspan id=\\\"p0s2\\\" class=\\\"vi-sent\\\">Một thách thức mới đối với việc sản xuất ô tô hiện đang xuất hiện và một lần nữa, nó lại đến từ tự động hóa. \\u003c/span>\\u003cspan id=\\\"p0s3\\\" class=\\\"vi-sent\\\">Tuy nhiên, lần này nó không liên quan đến quá trình sản xuất mà liên quan đến bản thân các phương tiện. \\u003c/span>\\u003cspan id=\\\"p0s4\\\" class=\\\"vi-sent\\\">Các dự án nghiên cứu về tự động hóa phương tiện không phải là mới. \\u003c/span>\\u003cspan id=\\\"p0s5\\\" class=\\\"vi-sent\\\">Những phương tiện có khả năng tự lái hạn chế đã tồn tại hơn 50 năm, dẫn đến những đóng góp đáng kể cho hệ thống hỗ trợ người lái. \\u003c/span>\\u003cspan id=\\\"p0s6\\\" class=\\\"vi-sent\\\">Nhưng kể từ khi Google công bố vào năm 2010 rằng họ đã thử nghiệm xe tự lái trên đường phố California, tiến bộ trong lĩnh vực này đã nhanh chóng tăng tốc. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph B\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s0\\\">There are many reasons why technology is advancing so fast. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s1\\\">One frequently cited \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v7\\\">motive\\u003c/span> is safety; indeed, research at the UK’s Transport Research Laboratory has demonstrated that more than 90 percent of road \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v8\\\">collisions\\u003c/span> involve human error as a contributory factor, and it is the primary cause in the vast majority. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s2\\\">Automation may help to reduce the \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v9\\\">incidence\\u003c/span> of this. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s3\\\">Another aim is to free the time people spend driving for other purposes. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s4\\\">If the vehicle can do some or all of the driving, it may be possible to be productive, to \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v10\\\">socialise\\u003c/span> or simply to relax while automation systems have responsibility for safe control of the vehicle. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s5\\\">If the vehicle can do the driving, those who are challenged by existing \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v11\\\">mobility models\\u003c/span> – such as older or \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v12\\\">disabled travellers\\u003c/span> – may be able to enjoy significantly greater \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v13\\\">travel autonomy\\u003c/span>. \\u003c/span>\\u003c/p>\\u003cdiv class=\\\"mif-inline-box\\\" data-para=\\\"B\\\">\\n                            \\u003cdiv style=\\\"font-size:12px; font-weight:bold; color:#4338ca; margin-bottom:8px; text-transform:uppercase;\\\">Questions matching this paragraph:\\u003c/div>\\n                            \\u003cdiv style=\\\"display:flex; flex-direction:column; gap:6px;\\\">\\n                            \\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"14\\\" onclick=\\\"toggleInlineMif(14, 'B')\\\">\\u003cspan class=\\\"q-num-s\\\">14.\\u003c/span> \\u003cspan>reference to the amount of time when a car is not in use\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"15\\\" onclick=\\\"toggleInlineMif(15, 'B')\\\">\\u003cspan class=\\\"q-num-s\\\">15.\\u003c/span> \\u003cspan>mention of several advantages of driverless vehicles for individual road-users\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"16\\\" onclick=\\\"toggleInlineMif(16, 'B')\\\">\\u003cspan class=\\\"q-num-s\\\">16.\\u003c/span> \\u003cspan>reference to the opportunity of choosing the most appropriate vehicle for each trip\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"17\\\" onclick=\\\"toggleInlineMif(17, 'B')\\\">\\u003cspan class=\\\"q-num-s\\\">17.\\u003c/span> \\u003cspan>an estimate of how long it will take to overcome a number of problems\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"18\\\" onclick=\\\"toggleInlineMif(18, 'B')\\\">\\u003cspan class=\\\"q-num-s\\\">18.\\u003c/span> \\u003cspan>a suggestion that the use of driverless cars may have no effect on the number of vehicles manufactured\\u003c/span>\\u003c/div>\\n                            \\u003c/div>\\n                        \\u003c/div>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t1')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t1\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p1s0\\\" class=\\\"vi-sent\\\">Có nhiều lý do tại sao công nghệ tiến bộ nhanh thế. \\u003c/span>\\u003cspan id=\\\"p1s1\\\" class=\\\"vi-sent\\\">Một động cơ thường được trích dẫn là sự an toàn; quả thực, nghiên cứu tại Phòng thí nghiệm Nghiên cứu Giao thông Vận tải của Vương quốc Anh đã chứng minh rằng hơn 90% các vụ va chạm trên đường đều liên quan đến lỗi của con người như một yếu tố góp phần và đó là nguyên nhân chính trong đại đa số. \\u003c/span>\\u003cspan id=\\\"p1s2\\\" class=\\\"vi-sent\\\">Tự động hóa có thể giúp giảm tỷ lệ này. \\u003c/span>\\u003cspan id=\\\"p1s3\\\" class=\\\"vi-sent\\\">Một mục đích khác là giải phóng thời gian mọi người dành cho việc lái xe cho các mục đích khác. \\u003c/span>\\u003cspan id=\\\"p1s4\\\" class=\\\"vi-sent\\\">Nếu chiếc xe có thể thực hiện một số hoặc tất cả việc lái xe, nó có thể hoạt động hiệu quả, hòa nhập xã hội hoặc đơn giản là thư giãn trong khi hệ thống tự động hóa chịu trách nhiệm kiểm soát phương tiện một cách an toàn. \\u003c/span>\\u003cspan id=\\\"p1s5\\\" class=\\\"vi-sent\\\">Nếu phương tiện có thể tự lái, những người gặp khó khăn với các mô hình di chuyển hiện tại – chẳng hạn như khách du lịch lớn tuổi hoặc khuyết tật – có thể được hưởng quyền tự chủ di chuyển lớn hơn đáng kể. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph C\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s0\\\">Beyond these direct benefits, we can consider the wider implications for transport and society, and how manufacturing processes might need to respond as a result. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s1\\\">At present, the average car spends more than 90 percent of its life parked. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s2\\\">Automation means that \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v14\\\">initiatives\\u003c/span> for car-sharing become much more viable, particularly in urban areas with significant travel demand. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s3\\\">If a significant proportion of the population choose to use shared automated vehicles, \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v15\\\">mobility demand\\u003c/span> can be met by far fewer vehicles. \\u003c/span>\\u003c/p>\\u003cdiv class=\\\"mif-inline-box\\\" data-para=\\\"C\\\">\\n                            \\u003cdiv style=\\\"font-size:12px; font-weight:bold; color:#4338ca; margin-bottom:8px; text-transform:uppercase;\\\">Questions matching this paragraph:\\u003c/div>\\n                            \\u003cdiv style=\\\"display:flex; flex-direction:column; gap:6px;\\\">\\n                            \\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"14\\\" onclick=\\\"toggleInlineMif(14, 'C')\\\">\\u003cspan class=\\\"q-num-s\\\">14.\\u003c/span> \\u003cspan>reference to the amount of time when a car is not in use\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"15\\\" onclick=\\\"toggleInlineMif(15, 'C')\\\">\\u003cspan class=\\\"q-num-s\\\">15.\\u003c/span> \\u003cspan>mention of several advantages of driverless vehicles for individual road-users\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"16\\\" onclick=\\\"toggleInlineMif(16, 'C')\\\">\\u003cspan class=\\\"q-num-s\\\">16.\\u003c/span> \\u003cspan>reference to the opportunity of choosing the most appropriate vehicle for each trip\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"17\\\" onclick=\\\"toggleInlineMif(17, 'C')\\\">\\u003cspan class=\\\"q-num-s\\\">17.\\u003c/span> \\u003cspan>an estimate of how long it will take to overcome a number of problems\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"18\\\" onclick=\\\"toggleInlineMif(18, 'C')\\\">\\u003cspan class=\\\"q-num-s\\\">18.\\u003c/span> \\u003cspan>a suggestion that the use of driverless cars may have no effect on the number of vehicles manufactured\\u003c/span>\\u003c/div>\\n                            \\u003c/div>\\n                        \\u003c/div>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t2')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t2\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p2s0\\\" class=\\\"vi-sent\\\">Ngoài những lợi ích trực tiếp này, chúng ta có thể xem xét những tác động rộng hơn đối với giao thông và xã hội, cũng như kết quả là các quy trình sản xuất có thể cần phải đáp ứng như thế nào. \\u003c/span>\\u003cspan id=\\\"p2s1\\\" class=\\\"vi-sent\\\">Hiện tại, một chiếc ô tô trung bình dành hơn 90% thời gian trong đời của nó để đỗ. \\u003c/span>\\u003cspan id=\\\"p2s2\\\" class=\\\"vi-sent\\\">Tự động hóa có nghĩa là các sáng kiến ​​chia sẻ ô tô trở nên khả thi hơn nhiều, đặc biệt là ở các khu vực thành thị có nhu cầu đi lại đáng kể. \\u003c/span>\\u003cspan id=\\\"p2s3\\\" class=\\\"vi-sent\\\">Nếu một tỷ lệ đáng kể dân số chọn sử dụng phương tiện tự động dùng chung thì nhu cầu di chuyển có thể được đáp ứng bởi ít phương tiện hơn rất nhiều. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph D\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p3s0\\\">The Massachusetts Institute of Technology investigated automated mobility in Singapore, finding that fewer than 30 percent of the vehicles currently used would be required if fully automated car sharing could be implemented. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p3s1\\\">If this is the case, it might mean that we need to manufacture far fewer vehicles to meet demand. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p3s2\\\">However, the number of trips being taken would probably increase, partly because empty vehicles would have to be moved from one customer to the next. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p3s3\\\">Modelling work by the University of Michigan Transportation Research Institute suggests automated vehicles might reduce vehicle ownership by 43 percent, but that vehicles’ average annual mileage double as a result. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p3s4\\\">As a consequence, each vehicle would be used more intensively, and might need replacing sooner. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p3s5\\\">This faster \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v16\\\">rate of turnover\\u003c/span> may mean that vehicle production will not necessarily decrease \\u003c/span>\\u003c/p>\\u003cdiv class=\\\"mif-inline-box\\\" data-para=\\\"D\\\">\\n                            \\u003cdiv style=\\\"font-size:12px; font-weight:bold; color:#4338ca; margin-bottom:8px; text-transform:uppercase;\\\">Questions matching this paragraph:\\u003c/div>\\n                            \\u003cdiv style=\\\"display:flex; flex-direction:column; gap:6px;\\\">\\n                            \\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"14\\\" onclick=\\\"toggleInlineMif(14, 'D')\\\">\\u003cspan class=\\\"q-num-s\\\">14.\\u003c/span> \\u003cspan>reference to the amount of time when a car is not in use\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"15\\\" onclick=\\\"toggleInlineMif(15, 'D')\\\">\\u003cspan class=\\\"q-num-s\\\">15.\\u003c/span> \\u003cspan>mention of several advantages of driverless vehicles for individual road-users\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"16\\\" onclick=\\\"toggleInlineMif(16, 'D')\\\">\\u003cspan class=\\\"q-num-s\\\">16.\\u003c/span> \\u003cspan>reference to the opportunity of choosing the most appropriate vehicle for each trip\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"17\\\" onclick=\\\"toggleInlineMif(17, 'D')\\\">\\u003cspan class=\\\"q-num-s\\\">17.\\u003c/span> \\u003cspan>an estimate of how long it will take to overcome a number of problems\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"18\\\" onclick=\\\"toggleInlineMif(18, 'D')\\\">\\u003cspan class=\\\"q-num-s\\\">18.\\u003c/span> \\u003cspan>a suggestion that the use of driverless cars may have no effect on the number of vehicles manufactured\\u003c/span>\\u003c/div>\\n                            \\u003c/div>\\n                        \\u003c/div>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t3')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t3\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p3s0\\\" class=\\\"vi-sent\\\">Viện Công nghệ Massachusetts đã điều tra khả năng di chuyển tự động ở Singapore và nhận thấy rằng cần ít hơn 30% số phương tiện hiện đang được sử dụng nếu việc chia sẻ ô tô hoàn toàn tự động có thể được triển khai. \\u003c/span>\\u003cspan id=\\\"p3s1\\\" class=\\\"vi-sent\\\">Nếu đúng như vậy, điều đó có nghĩa là chúng ta cần sản xuất ít xe hơn để đáp ứng nhu cầu. \\u003c/span>\\u003cspan id=\\\"p3s2\\\" class=\\\"vi-sent\\\">Tuy nhiên, số lượng chuyến đi có thể sẽ tăng lên, một phần vì xe trống sẽ phải chuyển từ khách hàng này sang khách hàng khác. \\u003c/span>\\u003cspan id=\\\"p3s3\\\" class=\\\"vi-sent\\\">Công việc lập mô hình của Viện Nghiên cứu Giao thông Vận tải Đại học Michigan cho thấy phương tiện tự động có thể giảm tỷ lệ sở hữu phương tiện xuống 43%, nhưng kết quả là quãng đường đi được trung bình hàng năm của phương tiện đó sẽ tăng gấp đôi. \\u003c/span>\\u003cspan id=\\\"p3s4\\\" class=\\\"vi-sent\\\">Kết quả là mỗi chiếc xe sẽ được sử dụng với cường độ cao hơn và có thể cần thay thế sớm hơn. \\u003c/span>\\u003cspan id=\\\"p3s5\\\" class=\\\"vi-sent\\\">Tốc độ quay vòng nhanh hơn này có thể có nghĩa là sản lượng xe sẽ không nhất thiết giảm \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph E\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p4s0\\\">Automation may prompt other changes in vehicle manufacture. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p4s1\\\">If we move to a model where consumers are tending not to own a single vehicle but to purchase access to a range of vehicle through a mobility provider, drivers will have the freedom to select one that best suits their needs for a particular journey, rather than making a compromise across all their requirements. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p4s2\\\">Since, for most of the time, most of the seats in most cars are \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v17\\\">unoccupied\\u003c/span>, this may boost production of a smaller, more efficient range of vehicles that suit the needs of individuals. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p4s3\\\">Specialised vehicles may then be available for exceptional journeys, such as going on a family camping trip or helping a son or daughter move to university. \\u003c/span>\\u003c/p>\\u003cdiv class=\\\"mif-inline-box\\\" data-para=\\\"E\\\">\\n                            \\u003cdiv style=\\\"font-size:12px; font-weight:bold; color:#4338ca; margin-bottom:8px; text-transform:uppercase;\\\">Questions matching this paragraph:\\u003c/div>\\n                            \\u003cdiv style=\\\"display:flex; flex-direction:column; gap:6px;\\\">\\n                            \\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"14\\\" onclick=\\\"toggleInlineMif(14, 'E')\\\">\\u003cspan class=\\\"q-num-s\\\">14.\\u003c/span> \\u003cspan>reference to the amount of time when a car is not in use\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"15\\\" onclick=\\\"toggleInlineMif(15, 'E')\\\">\\u003cspan class=\\\"q-num-s\\\">15.\\u003c/span> \\u003cspan>mention of several advantages of driverless vehicles for individual road-users\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"16\\\" onclick=\\\"toggleInlineMif(16, 'E')\\\">\\u003cspan class=\\\"q-num-s\\\">16.\\u003c/span> \\u003cspan>reference to the opportunity of choosing the most appropriate vehicle for each trip\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"17\\\" onclick=\\\"toggleInlineMif(17, 'E')\\\">\\u003cspan class=\\\"q-num-s\\\">17.\\u003c/span> \\u003cspan>an estimate of how long it will take to overcome a number of problems\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"18\\\" onclick=\\\"toggleInlineMif(18, 'E')\\\">\\u003cspan class=\\\"q-num-s\\\">18.\\u003c/span> \\u003cspan>a suggestion that the use of driverless cars may have no effect on the number of vehicles manufactured\\u003c/span>\\u003c/div>\\n                            \\u003c/div>\\n                        \\u003c/div>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t4')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t4\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p4s0\\\" class=\\\"vi-sent\\\">Tự động hóa có thể thúc đẩy những thay đổi khác trong sản xuất ô tô. \\u003c/span>\\u003cspan id=\\\"p4s1\\\" class=\\\"vi-sent\\\">Nếu chúng ta chuyển sang một mô hình mà người tiêu dùng có xu hướng không sở hữu một phương tiện duy nhất mà mua quyền sử dụng nhiều loại phương tiện thông qua nhà cung cấp phương tiện di chuyển, thì người lái xe sẽ có quyền tự do lựa chọn phương tiện phù hợp nhất với nhu cầu của họ cho một hành trình cụ thể, thay vì phải thỏa hiệp với tất cả các yêu cầu của họ. \\u003c/span>\\u003cspan id=\\\"p4s2\\\" class=\\\"vi-sent\\\">Vì trong hầu hết thời gian, hầu hết chỗ ngồi trên hầu hết các ô tô đều không có người sử dụng, điều này có thể thúc đẩy việc sản xuất các loại phương tiện nhỏ hơn, hiệu quả hơn phù hợp với nhu cầu của từng cá nhân. \\u003c/span>\\u003cspan id=\\\"p4s3\\\" class=\\\"vi-sent\\\">Sau đó, các phương tiện chuyên dụng có thể được cung cấp cho những chuyến đi đặc biệt, chẳng hạn như đi cắm trại cùng gia đình hoặc giúp con cái chuyển đến trường đại học. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph F\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p5s0\\\">There are a number of \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v18\\\">hurdles\\u003c/span> to overcome in delivering automated vehicles to our roads. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p5s1\\\">These include the \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v19\\\">technical difficulties\\u003c/span> in ensuring that the vehicle works reliably in the infinite range of traffic, weather and road situations it might encounter; the regulatory challenges in understanding how liability and \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v20\\\">enforcement\\u003c/span> might change when drivers are no longer essential for vehicle operation; and the societal changes that may be required for communities to trust and accept automated vehicles as being a valuable part of the mobility landscape. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t5')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t5\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p5s0\\\" class=\\\"vi-sent\\\">Có một số trở ngại cần vượt qua trong việc cung cấp phương tiện tự động trên đường của chúng ta. \\u003c/span>\\u003cspan id=\\\"p5s1\\\" class=\\\"vi-sent\\\">Chúng bao gồm những khó khăn về mặt kỹ thuật trong việc đảm bảo rằng phương tiện hoạt động đáng tin cậy trong vô số tình huống giao thông, thời tiết và đường sá mà nó có thể gặp phải; những thách thức pháp lý trong việc tìm hiểu trách nhiệm pháp lý và việc thực thi có thể thay đổi như thế nào khi người lái xe không còn cần thiết cho việc vận hành phương tiện nữa; và những thay đổi xã hội có thể cần thiết để cộng đồng tin tưởng và chấp nhận phương tiện tự động hóa như một phần có giá trị trong bối cảnh di chuyển. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph G\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p6s0\\\">It’s clear that there are many challenges that need to be addressed but, through \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v21\\\">robust\\u003c/span> and targeted research, these can most probably be \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v22\\\">conquered\\u003c/span> within the next 10 years. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p6s1\\\">Mobility will change in such potentially significant ways and in association with so many other technological developments, such as telepresence and virtual reality, that it is hard to make \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v23\\\">concrete predictions\\u003c/span> about the future. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p6s2\\\">However, one thing is certain: change is coming, and the need to be flexible in response to this will be vital for those involved in manufacturing the vehicles that will deliver \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v24\\\">future mobility\\u003c/span>. \\u003c/span>\\u003c/p>\\u003cdiv class=\\\"mif-inline-box\\\" data-para=\\\"G\\\">\\n                            \\u003cdiv style=\\\"font-size:12px; font-weight:bold; color:#4338ca; margin-bottom:8px; text-transform:uppercase;\\\">Questions matching this paragraph:\\u003c/div>\\n                            \\u003cdiv style=\\\"display:flex; flex-direction:column; gap:6px;\\\">\\n                            \\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"14\\\" onclick=\\\"toggleInlineMif(14, 'G')\\\">\\u003cspan class=\\\"q-num-s\\\">14.\\u003c/span> \\u003cspan>reference to the amount of time when a car is not in use\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"15\\\" onclick=\\\"toggleInlineMif(15, 'G')\\\">\\u003cspan class=\\\"q-num-s\\\">15.\\u003c/span> \\u003cspan>mention of several advantages of driverless vehicles for individual road-users\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"16\\\" onclick=\\\"toggleInlineMif(16, 'G')\\\">\\u003cspan class=\\\"q-num-s\\\">16.\\u003c/span> \\u003cspan>reference to the opportunity of choosing the most appropriate vehicle for each trip\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"17\\\" onclick=\\\"toggleInlineMif(17, 'G')\\\">\\u003cspan class=\\\"q-num-s\\\">17.\\u003c/span> \\u003cspan>an estimate of how long it will take to overcome a number of problems\\u003c/span>\\u003c/div>\\u003cdiv class=\\\"mif-inline-btn\\\" data-qid=\\\"18\\\" onclick=\\\"toggleInlineMif(18, 'G')\\\">\\u003cspan class=\\\"q-num-s\\\">18.\\u003c/span> \\u003cspan>a suggestion that the use of driverless cars may have no effect on the number of vehicles manufactured\\u003c/span>\\u003c/div>\\n                            \\u003c/div>\\n                        \\u003c/div>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t6')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t6\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p6s0\\\" class=\\\"vi-sent\\\">Rõ ràng là có rất nhiều thách thức cần được giải quyết, nhưng thông qua nghiên cứu mạnh mẽ và có mục tiêu, những thách thức này hầu như có thể được giải quyết trong vòng 10 năm tới. \\u003c/span>\\u003cspan id=\\\"p6s1\\\" class=\\\"vi-sent\\\">Khả năng di chuyển sẽ thay đổi theo những cách có thể có ý nghĩa quan trọng và gắn liền với rất nhiều sự phát triển công nghệ khác, chẳng hạn như khả năng ngoại cảm và thực tế ảo, đến mức khó có thể đưa ra dự đoán cụ thể về tương lai. \\u003c/span>\\u003cspan id=\\\"p6s2\\\" class=\\\"vi-sent\\\">Tuy nhiên, có một điều chắc chắn: sự thay đổi đang đến và nhu cầu phải linh hoạt để ứng phó với điều này sẽ rất quan trọng đối với những người tham gia sản xuất các phương tiện mang lại khả năng di chuyển trong tương lai. \\u003c/span>\\u003c/div>\\u003c/div>\\u003c/div>\",\"headingsHtml\":\"\",\"qs\":[{\"id\":14,\"type\":\"mif\",\"text\":\"reference to the amount of time when a car is not in use\",\"options\":[],\"correctAnswer\":\"C\",\"location\":\"\",\"_orderId\":14,\"mifTargets\":[\"C\",\"B\",\"E\",\"D\",\"G\"]},{\"id\":15,\"type\":\"mif\",\"text\":\"mention of several advantages of driverless vehicles for individual road-users\",\"options\":[],\"correctAnswer\":\"B\",\"location\":\"\",\"_orderId\":15,\"mifTargets\":[\"C\",\"B\",\"E\",\"D\",\"G\"]},{\"id\":16,\"type\":\"mif\",\"text\":\"reference to the opportunity of choosing the most appropriate vehicle for each trip\",\"options\":[],\"correctAnswer\":\"E\",\"location\":\"\",\"_orderId\":16,\"mifTargets\":[\"C\",\"B\",\"E\",\"D\",\"G\"]},{\"id\":17,\"type\":\"mif\",\"text\":\"an estimate of how long it will take to overcome a number of problems\",\"options\":[],\"correctAnswer\":\"G\",\"location\":\"\",\"_orderId\":17,\"mifTargets\":[\"C\",\"B\",\"E\",\"D\",\"G\"]},{\"id\":18,\"type\":\"mif\",\"text\":\"a suggestion that the use of driverless cars may have no effect on the number of vehicles manufactured\",\"options\":[],\"correctAnswer\":\"D\",\"location\":\"\",\"_orderId\":18,\"mifTargets\":[\"C\",\"B\",\"E\",\"D\",\"G\"]},{\"type\":\"gap-fill-block\",\"id\":19,\"text\":\"Complete the summary below.\\nChoose <b>NO MORE THAN TWO WORDS</b> from the passage for each answer.\\nWrite your answers in boxes 19-22 on your answer sheet.\\n<b>The impact of driverless cars</b>\\nFigures from the Transport Research Laboratory indicate that most motor accidents are partly due to 19……………………., so the introduction of driverless vehicles will result in greater safety. In addition to the direct benefits of automation, it may bring other advantages. For example, schemes for 20………………………. will be more workable, especially in towns and cities, resulting in fewer cars on the road.\\nAccording to the University of Michigan Transportation Research Institute, there could be a 43 percent drop in 21…………………….. of cars. However, this would mean that the yearly 22…………………….. of each car would, on average, be twice as high as it currently is. this would lead to a higher turnover of vehicles, and therefore no reduction in automotive manufacturing.\",\"gapIds\":[19,20,21,22],\"answers\":{\"19\":\"human error\",\"20\":\"car-sharing\",\"21\":\"ownership\",\"22\":\"mileage\"},\"locations\":{\"19\":\"One frequently cited motive is safety\",\"20\":\"means that initiatives for\",\"21\":\"suggests automated vehicles might reduce vehicle ownership by 43 percent\",\"22\":\"average annual mileage double as a result\"},\"_orderId\":19}],\"vocab\":[{\"id\":\"v0\",\"word\":\"adapting\",\"meaning\":\"thích nghi, điều chỉnh (adjusting, modifying)\",\"synonym\":\"He is adapting to the new environment. (Anh ấy đang thích nghi với môi trường mới.)\",\"example\":\"\"},{\"id\":\"v1\",\"word\":\"implementation\",\"meaning\":\"sự thực hiện, triển khai (execution, application)\",\"synonym\":\"The implementation of new policies improved safety. (Việc triển khai chính sách mới cải thiện an toàn.)\",\"example\":\"\"},{\"id\":\"v2\",\"word\":\"cost savings\",\"meaning\":\"tiết kiệm chi phí (reduction of expenses)\",\"synonym\":\"Automation leads to cost savings. (Tự động hóa giúp tiết kiệm chi phí.)\",\"example\":\"\"},{\"id\":\"v3\",\"word\":\"reliability\",\"meaning\":\"độ tin cậy (dependability, trustworthiness)\",\"synonym\":\"The system shows high reliability. (Hệ thống có độ tin cậy cao.)\",\"example\":\"\"},{\"id\":\"v4\",\"word\":\"flexibility\",\"meaning\":\"sự linh hoạt (adaptability, versatility)\",\"synonym\":\"The schedule offers flexibility. (Lịch trình mang lại sự linh hoạt.)\",\"example\":\"\"},{\"id\":\"v5\",\"word\":\"capabilities\",\"meaning\":\"năng lực, khả năng (abilities, skills)\",\"synonym\":\"The robot has advanced capabilities. (Robot có năng lực tiên tiến.)\",\"example\":\"\"},{\"id\":\"v6\",\"word\":\"trialling\",\"meaning\":\"thử nghiệm (testing, piloting)\",\"synonym\":\"The company is trialling new software. (Công ty đang thử nghiệm phần mềm mới.)\",\"example\":\"\"},{\"id\":\"v7\",\"word\":\"motive\",\"meaning\":\"động cơ, lý do (reason, purpose)\",\"synonym\":\"His motive was unclear. (Động cơ của anh ấy không rõ ràng.)\",\"example\":\"\"},{\"id\":\"v8\",\"word\":\"collisions\",\"meaning\":\"va chạm (crashes, impacts)\",\"synonym\":\"The car avoided collisions. (Chiếc xe tránh được va chạm.)\",\"example\":\"\"},{\"id\":\"v9\",\"word\":\"incidence\",\"meaning\":\"tỷ lệ xảy ra (occurrence, frequency)\",\"synonym\":\"The incidence of disease is rising. (Tỷ lệ mắc bệnh đang tăng.)\",\"example\":\"\"},{\"id\":\"v10\",\"word\":\"socialise\",\"meaning\":\"giao lưu, hòa nhập (interact, mingle)\",\"synonym\":\"He likes to socialise with friends. (Anh ấy thích giao lưu với bạn bè.)\",\"example\":\"\"},{\"id\":\"v11\",\"word\":\"mobility models\",\"meaning\":\"mô hình di chuyển (transportation frameworks)\",\"synonym\":\"Researchers study mobility models in cities. (Các nhà nghiên cứu nghiên cứu mô hình di chuyển trong thành phố.)\",\"example\":\"\"},{\"id\":\"v12\",\"word\":\"disabled travellers\",\"meaning\":\"khách du lịch khuyết tật (handicapped tourists)\",\"synonym\":\"Airports provide support for disabled travellers. (Sân bay hỗ trợ khách du lịch khuyết tật.)\",\"example\":\"\"},{\"id\":\"v13\",\"word\":\"travel autonomy\",\"meaning\":\"quyền tự chủ trong di chuyển (independence in travel)\",\"synonym\":\"Technology increases travel autonomy for disabled people. (Công nghệ tăng quyền tự chủ di chuyển cho người khuyết tật.)\",\"example\":\"\"},{\"id\":\"v14\",\"word\":\"initiatives\",\"meaning\":\"sáng kiến (projects, proposals)\",\"synonym\":\"The government launched new initiatives. (Chính phủ khởi động sáng kiến mới.)\",\"example\":\"\"},{\"id\":\"v15\",\"word\":\"mobility demand\",\"meaning\":\"nhu cầu di chuyển (transportation needs)\",\"synonym\":\"Cities face rising mobility demand. (Các thành phố đối mặt với nhu cầu di chuyển tăng cao.)\",\"example\":\"\"},{\"id\":\"v16\",\"word\":\"rate of turnover\",\"meaning\":\"tỷ lệ thay đổi nhân sự (employee replacement rate)\",\"synonym\":\"The company has a high rate of turnover. (Công ty có tỷ lệ thay đổi nhân sự cao.)\",\"example\":\"\"},{\"id\":\"v17\",\"word\":\"unoccupied\",\"meaning\":\"bỏ trống, không có người (vacant, empty)\",\"synonym\":\"The house was unoccupied for years. (Ngôi nhà bị bỏ trống nhiều năm.)\",\"example\":\"\"},{\"id\":\"v18\",\"word\":\"hurdles\",\"meaning\":\"rào cản, khó khăn (obstacles, challenges)\",\"synonym\":\"He overcame many hurdles in life. (Anh ấy vượt qua nhiều khó khăn trong cuộc sống.)\",\"example\":\"\"},{\"id\":\"v19\",\"word\":\"technical difficulties\",\"meaning\":\"khó khăn kỹ thuật (problems, malfunctions)\",\"synonym\":\"The flight was delayed due to technical difficulties. (Chuyến bay bị hoãn vì khó khăn kỹ thuật.)\",\"example\":\"\"},{\"id\":\"v20\",\"word\":\"enforcement\",\"meaning\":\"sự thực thi (implementation, imposition)\",\"synonym\":\"Strict enforcement of laws is necessary. (Cần thực thi nghiêm ngặt luật pháp.)\",\"example\":\"\"},{\"id\":\"v21\",\"word\":\"robust\",\"meaning\":\"mạnh mẽ, bền chắc (strong, sturdy)\",\"synonym\":\"The system is robust against failures. (Hệ thống bền chắc trước sự cố.)\",\"example\":\"\"},{\"id\":\"v22\",\"word\":\"conquered\",\"meaning\":\"chinh phục (defeated, mastered)\",\"synonym\":\"The army conquered new lands. (Quân đội chinh phục vùng đất mới.)\",\"example\":\"\"},{\"id\":\"v23\",\"word\":\"concrete predictions\",\"meaning\":\"dự đoán cụ thể (definite forecasts)\",\"synonym\":\"Experts made concrete predictions about climate change. (Các chuyên gia đưa ra dự đoán cụ thể về biến đổi khí hậu.)\",\"example\":\"\"},{\"id\":\"v24\",\"word\":\"future mobility\",\"meaning\":\"sự di chuyển trong tương lai (transportation of the future)\",\"synonym\":\"Future mobility will rely on smart technology. (Sự di chuyển trong tương lai sẽ dựa vào công nghệ thông minh.)\",\"example\":\"\"}],\"headings\":[],\"headingKey\":{},\"mifRange\":\"ABCDEFG\",\"removeOpt\":false,\"removeFeatureOpt\":false,\"pairs\":[{\"eng\":\"adapting\",\"vie\":\"thích nghi, điều chỉnh (adjusting, modifying)\"},{\"eng\":\"implementation\",\"vie\":\"sự thực hiện, triển khai (execution, application)\"},{\"eng\":\"cost savings\",\"vie\":\"tiết kiệm chi phí (reduction of expenses)\"},{\"eng\":\"reliability\",\"vie\":\"độ tin cậy (dependability, trustworthiness)\"},{\"eng\":\"flexibility\",\"vie\":\"sự linh hoạt (adaptability, versatility)\"},{\"eng\":\"capabilities\",\"vie\":\"năng lực, khả năng (abilities, skills)\"},{\"eng\":\"trialling\",\"vie\":\"thử nghiệm (testing, piloting)\"},{\"eng\":\"motive\",\"vie\":\"động cơ, lý do (reason, purpose)\"},{\"eng\":\"collisions\",\"vie\":\"va chạm (crashes, impacts)\"},{\"eng\":\"incidence\",\"vie\":\"tỷ lệ xảy ra (occurrence, frequency)\"},{\"eng\":\"socialise\",\"vie\":\"giao lưu, hòa nhập (interact, mingle)\"},{\"eng\":\"mobility models\",\"vie\":\"mô hình di chuyển (transportation frameworks)\"},{\"eng\":\"disabled travellers\",\"vie\":\"khách du lịch khuyết tật (handicapped tourists)\"},{\"eng\":\"travel autonomy\",\"vie\":\"quyền tự chủ trong di chuyển (independence in travel)\"},{\"eng\":\"initiatives\",\"vie\":\"sáng kiến (projects, proposals)\"},{\"eng\":\"mobility demand\",\"vie\":\"nhu cầu di chuyển (transportation needs)\"},{\"eng\":\"rate of turnover\",\"vie\":\"tỷ lệ thay đổi nhân sự (employee replacement rate)\"},{\"eng\":\"unoccupied\",\"vie\":\"bỏ trống, không có người (vacant, empty)\"},{\"eng\":\"hurdles\",\"vie\":\"rào cản, khó khăn (obstacles, challenges)\"},{\"eng\":\"technical difficulties\",\"vie\":\"khó khăn kỹ thuật (problems, malfunctions)\"},{\"eng\":\"enforcement\",\"vie\":\"sự thực thi (implementation, imposition)\"},{\"eng\":\"robust\",\"vie\":\"mạnh mẽ, bền chắc (strong, sturdy)\"},{\"eng\":\"conquered\",\"vie\":\"chinh phục (defeated, mastered)\"},{\"eng\":\"concrete predictions\",\"vie\":\"dự đoán cụ thể (definite forecasts)\"},{\"eng\":\"future mobility\",\"vie\":\"sự di chuyển trong tương lai (transportation of the future)\"}],\"pData\":[{\"en\":[\"The automotive sector is well used to adapting to automation in manufacturing.\",\"The implementation of robotic car manufacture from the 1970s onwards led to significant cost savings and improvements in the reliability and flexibility of vehicle mass production.\",\"A new challenge to vehicle production is now on the horizon and, again, it comes from automation.\",\"However, this time it is not to do with the manufacturing process, but with the vehicles themselves.\",\"Research projects on vehicle automation are not new.\",\"Vehicles with limited self-driving capabilities have been around for more than 50 years, resulting in significant contributions towards driver assistance systems.\",\"But since Google announced in 2010 that it had been trialling self-driving cars on the streets of California, progress in this field has quickly gathered pace.\"],\"vi\":[\"Lĩnh vực ô tô được sử dụng tốt để thích ứng với tự động hóa trong sản xuất.\",\"Việc triển khai sản xuất ô tô bằng robot từ những năm 1970 trở đi đã giúp tiết kiệm đáng kể chi phí và cải thiện độ tin cậy cũng như tính linh hoạt của quá trình sản xuất hàng loạt ô tô.\",\"Một thách thức mới đối với việc sản xuất ô tô hiện đang xuất hiện và một lần nữa, nó lại đến từ tự động hóa.\",\"Tuy nhiên, lần này nó không liên quan đến quá trình sản xuất mà liên quan đến bản thân các phương tiện.\",\"Các dự án nghiên cứu về tự động hóa phương tiện không phải là mới.\",\"Những phương tiện có khả năng tự lái hạn chế đã tồn tại hơn 50 năm, dẫn đến những đóng góp đáng kể cho hệ thống hỗ trợ người lái.\",\"Nhưng kể từ khi Google công bố vào năm 2010 rằng họ đã thử nghiệm xe tự lái trên đường phố California, tiến bộ trong lĩnh vực này đã nhanh chóng tăng tốc.\"]},{\"en\":[\"There are many reasons why technology is advancing so fast.\",\"One frequently cited motive is safety; indeed, research at the UK’s Transport Research Laboratory has demonstrated that more than 90 percent of road collisions involve human error as a contributory factor, and it is the primary cause in the vast majority.\",\"Automation may help to reduce the incidence of this.\",\"Another aim is to free the time people spend driving for other purposes.\",\"If the vehicle can do some or all of the driving, it may be possible to be productive, to socialise or simply to relax while automation systems have responsibility for safe control of the vehicle.\",\"If the vehicle can do the driving, those who are challenged by existing mobility models – such as older or disabled travellers – may be able to enjoy significantly greater travel autonomy.\"],\"vi\":[\"Có nhiều lý do tại sao công nghệ tiến bộ nhanh thế.\",\"Một động cơ thường được trích dẫn là sự an toàn; quả thực, nghiên cứu tại Phòng thí nghiệm Nghiên cứu Giao thông Vận tải của Vương quốc Anh đã chứng minh rằng hơn 90% các vụ va chạm trên đường đều liên quan đến lỗi của con người như một yếu tố góp phần và đó là nguyên nhân chính trong đại đa số.\",\"Tự động hóa có thể giúp giảm tỷ lệ này.\",\"Một mục đích khác là giải phóng thời gian mọi người dành cho việc lái xe cho các mục đích khác.\",\"Nếu chiếc xe có thể thực hiện một số hoặc tất cả việc lái xe, nó có thể hoạt động hiệu quả, hòa nhập xã hội hoặc đơn giản là thư giãn trong khi hệ thống tự động hóa chịu trách nhiệm kiểm soát phương tiện một cách an toàn.\",\"Nếu phương tiện có thể tự lái, những người gặp khó khăn với các mô hình di chuyển hiện tại – chẳng hạn như khách du lịch lớn tuổi hoặc khuyết tật – có thể được hưởng quyền tự chủ di chuyển lớn hơn đáng kể.\"]},{\"en\":[\"Beyond these direct benefits, we can consider the wider implications for transport and society, and how manufacturing processes might need to respond as a result.\",\"At present, the average car spends more than 90 percent of its life parked.\",\"Automation means that initiatives for car-sharing become much more viable, particularly in urban areas with significant travel demand.\",\"If a significant proportion of the population choose to use shared automated vehicles, mobility demand can be met by far fewer vehicles.\"],\"vi\":[\"Ngoài những lợi ích trực tiếp này, chúng ta có thể xem xét những tác động rộng hơn đối với giao thông và xã hội, cũng như kết quả là các quy trình sản xuất có thể cần phải đáp ứng như thế nào.\",\"Hiện tại, một chiếc ô tô trung bình dành hơn 90% thời gian trong đời của nó để đỗ.\",\"Tự động hóa có nghĩa là các sáng kiến ​​chia sẻ ô tô trở nên khả thi hơn nhiều, đặc biệt là ở các khu vực thành thị có nhu cầu đi lại đáng kể.\",\"Nếu một tỷ lệ đáng kể dân số chọn sử dụng phương tiện tự động dùng chung thì nhu cầu di chuyển có thể được đáp ứng bởi ít phương tiện hơn rất nhiều.\"]},{\"en\":[\"The Massachusetts Institute of Technology investigated automated mobility in Singapore, finding that fewer than 30 percent of the vehicles currently used would be required if fully automated car sharing could be implemented.\",\"If this is the case, it might mean that we need to manufacture far fewer vehicles to meet demand.\",\"However, the number of trips being taken would probably increase, partly because empty vehicles would have to be moved from one customer to the next.\",\"Modelling work by the University of Michigan Transportation Research Institute suggests automated vehicles might reduce vehicle ownership by 43 percent, but that vehicles’ average annual mileage double as a result.\",\"As a consequence, each vehicle would be used more intensively, and might need replacing sooner.\",\"This faster rate of turnover may mean that vehicle production will not necessarily decrease\"],\"vi\":[\"Viện Công nghệ Massachusetts đã điều tra khả năng di chuyển tự động ở Singapore và nhận thấy rằng cần ít hơn 30% số phương tiện hiện đang được sử dụng nếu việc chia sẻ ô tô hoàn toàn tự động có thể được triển khai.\",\"Nếu đúng như vậy, điều đó có nghĩa là chúng ta cần sản xuất ít xe hơn để đáp ứng nhu cầu.\",\"Tuy nhiên, số lượng chuyến đi có thể sẽ tăng lên, một phần vì xe trống sẽ phải chuyển từ khách hàng này sang khách hàng khác.\",\"Công việc lập mô hình của Viện Nghiên cứu Giao thông Vận tải Đại học Michigan cho thấy phương tiện tự động có thể giảm tỷ lệ sở hữu phương tiện xuống 43%, nhưng kết quả là quãng đường đi được trung bình hàng năm của phương tiện đó sẽ tăng gấp đôi.\",\"Kết quả là mỗi chiếc xe sẽ được sử dụng với cường độ cao hơn và có thể cần thay thế sớm hơn.\",\"Tốc độ quay vòng nhanh hơn này có thể có nghĩa là sản lượng xe sẽ không nhất thiết giảm\"]},{\"en\":[\"Automation may prompt other changes in vehicle manufacture.\",\"If we move to a model where consumers are tending not to own a single vehicle but to purchase access to a range of vehicle through a mobility provider, drivers will have the freedom to select one that best suits their needs for a particular journey, rather than making a compromise across all their requirements.\",\"Since, for most of the time, most of the seats in most cars are unoccupied, this may boost production of a smaller, more efficient range of vehicles that suit the needs of individuals.\",\"Specialised vehicles may then be available for exceptional journeys, such as going on a family camping trip or helping a son or daughter move to university.\"],\"vi\":[\"Tự động hóa có thể thúc đẩy những thay đổi khác trong sản xuất ô tô.\",\"Nếu chúng ta chuyển sang một mô hình mà người tiêu dùng có xu hướng không sở hữu một phương tiện duy nhất mà mua quyền sử dụng nhiều loại phương tiện thông qua nhà cung cấp phương tiện di chuyển, thì người lái xe sẽ có quyền tự do lựa chọn phương tiện phù hợp nhất với nhu cầu của họ cho một hành trình cụ thể, thay vì phải thỏa hiệp với tất cả các yêu cầu của họ.\",\"Vì trong hầu hết thời gian, hầu hết chỗ ngồi trên hầu hết các ô tô đều không có người sử dụng, điều này có thể thúc đẩy việc sản xuất các loại phương tiện nhỏ hơn, hiệu quả hơn phù hợp với nhu cầu của từng cá nhân.\",\"Sau đó, các phương tiện chuyên dụng có thể được cung cấp cho những chuyến đi đặc biệt, chẳng hạn như đi cắm trại cùng gia đình hoặc giúp con cái chuyển đến trường đại học.\"]},{\"en\":[\"There are a number of hurdles to overcome in delivering automated vehicles to our roads.\",\"These include the technical difficulties in ensuring that the vehicle works reliably in the infinite range of traffic, weather and road situations it might encounter; the regulatory challenges in understanding how liability and enforcement might change when drivers are no longer essential for vehicle operation; and the societal changes that may be required for communities to trust and accept automated vehicles as being a valuable part of the mobility landscape.\"],\"vi\":[\"Có một số trở ngại cần vượt qua trong việc cung cấp phương tiện tự động trên đường của chúng ta.\",\"Chúng bao gồm những khó khăn về mặt kỹ thuật trong việc đảm bảo rằng phương tiện hoạt động đáng tin cậy trong vô số tình huống giao thông, thời tiết và đường sá mà nó có thể gặp phải; những thách thức pháp lý trong việc tìm hiểu trách nhiệm pháp lý và việc thực thi có thể thay đổi như thế nào khi người lái xe không còn cần thiết cho việc vận hành phương tiện nữa; và những thay đổi xã hội có thể cần thiết để cộng đồng tin tưởng và chấp nhận phương tiện tự động hóa như một phần có giá trị trong bối cảnh di chuyển.\"]},{\"en\":[\"It’s clear that there are many challenges that need to be addressed but, through robust and targeted research, these can most probably be conquered within the next 10 years.\",\"Mobility will change in such potentially significant ways and in association with so many other technological developments, such as telepresence and virtual reality, that it is hard to make concrete predictions about the future.\",\"However, one thing is certain: change is coming, and the need to be flexible in response to this will be vital for those involved in manufacturing the vehicles that will deliver future mobility.\"],\"vi\":[\"Rõ ràng là có rất nhiều thách thức cần được giải quyết, nhưng thông qua nghiên cứu mạnh mẽ và có mục tiêu, những thách thức này hầu như có thể được giải quyết trong vòng 10 năm tới.\",\"Khả năng di chuyển sẽ thay đổi theo những cách có thể có ý nghĩa quan trọng và gắn liền với rất nhiều sự phát triển công nghệ khác, chẳng hạn như khả năng ngoại cảm và thực tế ảo, đến mức khó có thể đưa ra dự đoán cụ thể về tương lai.\",\"Tuy nhiên, có một điều chắc chắn: sự thay đổi đang đến và nhu cầu phải linh hoạt để ứng phó với điều này sẽ rất quan trọng đối với những người tham gia sản xuất các phương tiện mang lại khả năng di chuyển trong tương lai.\"]}],\"timeLimit\":20}];\n\nlet currentLessonIndex = 0;\nlet qs, vocab, headings, headingKey, mifRange, removeOpt, removeFeatureOpt, pairs, pData;\n\nlet timeLeft = 0;\nlet timerInterval;\nconst timerEl = document.getElementById('timer');\n\nfunction startTimer() {\n    timerInterval = setInterval(() => {\n        if(timeLeft <= 0) {\n            clearInterval(timerInterval);\n            timerEl.innerText = \"00:00\";\n            alert(\"Time is up!\");\n            return;\n        }\n        timeLeft--;\n        const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');\n        const s = (timeLeft % 60).toString().padStart(2, '0');\n        timerEl.innerText = `${m}:${s}`;\n    }, 1000);\n}\n\nfunction switchLesson(idx) {\n    currentLessonIndex = parseInt(idx);\n    const l = lessonsData[currentLessonIndex];\n    qs = l.qs; vocab = l.vocab; headings = l.headings; headingKey = l.headingKey;\n    mifRange = l.mifRange; removeOpt = l.removeOpt; removeFeatureOpt = l.removeFeatureOpt;\n    pairs = l.pairs; pData = l.pData;\n\n    // Reset UI\n    document.getElementById('articleArea').innerHTML = l.articleHtml;\n    document.getElementById('headingsArea').innerHTML = l.headingsHtml;\n    document.getElementById('qs').innerHTML = '';\n    document.getElementById('progressBar').innerHTML = '';\n    document.getElementById('saveBtn').style.display = 'none';\n    \n    // Reset Timer\n    clearInterval(timerInterval);\n    timeLeft = l.timeLimit * 60;\n    timerEl.innerText = \"--:--\";\n    startTimer();\n\n    // Render Questions & Attach Events\n    renderStudentQuestions();\n    attachEvents();\n\n    // Manage Views\n    if(document.getElementById('game-view').style.display === 'block') initGame();\n    if(document.getElementById('mif-view').style.display === 'flex') {\n        document.getElementById('mif-view').style.display = 'none';\n    }\n}\n\n// --- RENDERING QUESTIONS ---\nfunction renderStudentQuestions() {\n    const qDiv=document.getElementById('qs');\n    qDiv.innerHTML = '';\n    \n    qs.forEach(q=>{\n      if(q.type==='text-only'){ qDiv.innerHTML+=`<div class=\"text-only\">${q.text}</div>`; }\n      else if(q.type==='summary') { \n          let h = `<div class=\"q-block\" id=\"q-card-${q.id}\">`;\n          let txt = q.text.replace(/\\n/g, '<br>');\n          q.gapIds.forEach(gid => {\n              const isFeat = q.isFeature ? 'true' : 'false';\n              const dz = `<span class=\"drop-zone\" id=\"dz-${gid}\" data-gid=\"${gid}\" data-isfeat=\"${isFeat}\" ondragover=\"allowDrop(event)\" ondrop=\"drop(event)\" onclick=\"clearDrop(${gid})\"></span><span class=\"q-num\" style=\"vertical-align:super;font-size:10px\">${gid}</span>&nbsp;`;\n              let replaced = txt.replace(new RegExp(`${gid}\\\\s*([._…-]{2,}|_{2,}|…+)`), dz);\n              if(replaced === txt) replaced = txt.replace(new RegExp(`${gid}[.]\\\\s+`), dz + ' ');\n              txt = replaced;\n              const d=document.createElement('div'); d.className='progress-circle'; d.id='prog-'+gid; d.innerText=gid;\n              d.onclick=()=>document.getElementById('q-card-'+q.id).scrollIntoView({behavior:'smooth',block:'center'});\n              document.getElementById('progressBar').appendChild(d);\n          });\n          h += `<div style=\"line-height:2;font-size:15px\">${txt}</div><div style=\"margin-top:15px;display:flex;flex-wrap:wrap;gap:8px;padding-top:10px;border-top:1px dashed #e2e8f0\">`;\n          q.options.forEach(optLine => {\n              const m = optLine.match(/^([A-Z])\\s*[.)]?\\s*(.+)/);\n              if(m) h += `<div class=\"heading-item\" id=\"opt-${q.id}-${m[1]}\" style=\"display:inline-flex;width:auto;margin:0\" draggable=\"true\" ondragstart=\"drag(event)\" data-val=\"${m[1]}\"><span style=\"font-weight:bold;color:#2563eb\">${m[1]}</span> ${m[2]}</div>`;\n          });\n          h += `</div><div id=\"fb-${q.id}\" style=\"margin-top:10px; font-size:13px\"></div></div>`;\n          qDiv.innerHTML += h;\n      } \n      else if(q.type==='gap-fill-block') { \n          let h = `<div class=\"q-block\" id=\"q-card-${q.id}\">`;\n          let txt = q.text.replace(/\\n/g, '<br>'); \n          q.gapIds.forEach(gid => {\n              const loc = (q.locations && q.locations[gid]) ? q.locations[gid] : \"\";\n              const locBtn = loc ? `<button class=\"loc-btn\" onclick=\"showLoc(${q.id}, ${gid})\">📍</button>` : \"\";\n              const inp = `<span class=\"q-num\">${gid}</span><input type=\"text\" class=\"gap-input\" data-gid=\"${gid}\" oninput=\"upd(${gid})\">${locBtn}&nbsp;`;\t\n              txt = txt.replace(new RegExp(`${gid}[\\\\s:.)]*(?:[_….\\\\-]\\\\s*){2,}`), inp);\n              const d=document.createElement('div'); d.className='progress-circle'; d.id='prog-'+gid; d.innerText=gid;\n              d.onclick=()=>document.getElementById('q-card-'+q.id).scrollIntoView({behavior:'smooth',block:'center'});\n              document.getElementById('progressBar').appendChild(d);\n          });\n          h += `<div style=\"line-height:2.2;font-size:16px\">${txt}</div><div id=\"fb-${q.id}\" style=\"margin-top:10px; font-size:13px\"></div></div>`;\n          qDiv.innerHTML += h;\n      }\n      else if(q.type==='mcq-multi') {\n          let h = `<div class=\"q-block\" id=\"q-card-${q.id}\">`;\n          const locBtn1 = (q.locations && q.locations[q.gapIds[0]]) ? `<button class=\"loc-btn\" onclick=\"showLoc(${q.id}, ${q.gapIds[0]})\">📍</button>` : \"\";\n          h += `<div style=\"display:flex;align-items:baseline;margin-bottom:8px;\"><span class=\"q-num\">${q.gapIds[0]}-${q.gapIds[q.gapIds.length-1]}</span> <span>${q.text}</span> ${locBtn1}</div>`;\n          q.options.forEach((o, i) => {\n              const optLetterMatch = o.match(/^([A-Z])/i);\n              const optLetter = optLetterMatch ? optLetterMatch[1].toUpperCase() : o.trim()[0].toUpperCase();\n              h += `<label style=\"display:block;margin:5px 0;cursor:pointer;transition:all 0.2s;\">\n                      <input type=\"checkbox\" name=\"mcq_${q.id}\" value=\"${optLetter}\" onchange=\"updMcqMulti(${q.id}, '${q.gapIds.join(',')}', event)\"> ${o} <span id=\"mcq-mark-${q.id}-${i}\" class=\"mcq-mark\"></span>\n                    </label>`;\n          });\n          h += `<div id=\"fb-${q.id}\" class=\"feedback\" style=\"margin-top:8px;font-size:13px\"></div></div>`;\n          qDiv.innerHTML += h;\n          q.gapIds.forEach(gid => {\n              const d=document.createElement('div'); d.className='progress-circle'; d.id='prog-'+gid; d.innerText=gid;\n              d.onclick=()=>document.getElementById('q-card-'+q.id).scrollIntoView({behavior:'smooth',block:'center'});\n              document.getElementById('progressBar').appendChild(d);\n          });\n      }\n      else { \n        let h=`<div class=\"q-block\" id=\"q-card-${q.id}\">`;\n        const loc = q.location || \"\";\n        const locBtn = loc ? `<button class=\"loc-btn\" onclick=\"showLoc(${q.id})\">📍</button>` : \"\";\n        \n        if(q.type==='gap-fill'){\n           let t=q.text.replace(/(\\d+)[\\s:.)]*(?:[_….\\-]\\s*){2,}/g, '<span class=\"q-num\">$1</span><input type=\"text\" class=\"gap-input\" data-id=\"'+q.id+'\" oninput=\"upd('+q.id+')\">'+locBtn+'&nbsp;');\n           h+=`<div>${t}</div>`;\n        } else {\n           h+=`<div style=\"display:flex;align-items:baseline\"><span class=\"q-num\">${q.id}.</span> <span>${q.text}</span> ${locBtn}</div>`;\n           if(q.type==='mcq') q.options.forEach((o, i) => { h += `<label class=\"mcq-label\" style=\"display:block;margin:5px 0;cursor:pointer\"><input type=\"radio\" name=\"q${q.id}\" value=\"${o.trim()[0]}\" onchange=\"upd(${q.id})\"> ${o} <span id=\"mcq-mark-${q.id}-${i}\" class=\"mcq-mark\"></span></label>`; });\n           if(q.type==='tfng') {\n               h+='<div class=\"tfng-container\">';\n               ['TRUE', 'FALSE', 'NOT GIVEN'].forEach(opt => {\n                   h+=`<label class=\"tfng-label\"><input type=\"radio\" name=\"tfng${q.id}\" value=\"${opt}\" onchange=\"upd(${q.id})\"><span class=\"tfng-btn\">${opt}</span></label>`;\n               });\n               h+='</div>';\n           }\n           if(q.type==='ynng') {\n               h+='<div class=\"tfng-container\">';\n               ['YES', 'NO', 'NOT GIVEN'].forEach(opt => {\n                   h+=`<label class=\"tfng-label\"><input type=\"radio\" name=\"ynng${q.id}\" value=\"${opt}\" onchange=\"upd(${q.id})\"><span class=\"tfng-btn\">${opt}</span></label>`;\n               });\n               h+='</div>';\n           }\n           if(q.type==='mif') {\n               h+='<div class=\"mif-container\">';\n               mifRange.split('').forEach(char => {\n                   h+=`<label class=\"mif-label\"><input type=\"radio\" name=\"mif${q.id}\" value=\"${char}\" onchange=\"upd(${q.id})\"><span class=\"mif-circle\">${char}</span></label>`;\n               });\n               h+='</div>';\n           }\n        }\n        h+=`<div id=\"fb-${q.id}\" class=\"feedback\" style=\"margin-top:8px;font-size:13px\"></div></div>`;\n        qDiv.innerHTML+=h;\n        const d=document.createElement('div'); d.className='progress-circle'; d.id='prog-'+q.id; d.innerText=q.id;\n        d.onclick=()=>document.getElementById('q-card-'+q.id).scrollIntoView({behavior:'smooth',block:'center'});\n        document.getElementById('progressBar').appendChild(d);\n      }\n    });\n\n    document.querySelectorAll('input[type=\"radio\"][name^=\"mif\"]').forEach(radio => {\n        radio.addEventListener('change', (e) => {\n            const qId = radio.name.replace('mif', '');\n            const pChar = radio.value;\n            document.querySelectorAll(`.mif-inline-btn[data-qid=\"${qId}\"]`).forEach(btn => {\n                const btnPara = btn.closest('.mif-inline-box').dataset.para;\n                if(btnPara === pChar) {\n                    btn.classList.remove('hidden-by-other');\n                    btn.classList.add('selected');\n                } else {\n                    btn.classList.remove('selected');\n                    btn.classList.add('hidden-by-other');\n                }\n            });\n        });\n    });\n}\n\nfunction attachEvents() {\n    const pp = document.getElementById('popup');\n    document.querySelectorAll('.vocab').forEach(s => {\n      s.onclick = e => {\n        const v = vocab.find(x => x.id === s.dataset.vid); if(!v) return;\n        pp.innerHTML = `<div style=\"background:#1e293b;color:#fff;padding:12px;font-weight:700;display:flex;justify-content:space-between;align-items:center\"><span>${v.word}</span><span onclick=\"speak('${v.word}')\" style=\"cursor:pointer;background:#334155;padding:4px;border-radius:50%\">🔊</span></div><div style=\"padding:16px;font-size:14px;color:#334155\"><p style=\"margin-bottom:8px\"><b style=\"color:#0f172a\">Meaning:</b> ${v.meaning}</p><p style=\"margin-bottom:8px\"><b style=\"color:#0f172a\">Synonyms:</b> ${v.synonym}</p><div style=\"background:#f1f5f9;padding:8px;border-radius:6px;margin-top:8px;color:#475569;font-style:italic\">\"${v.example}\"</div></div>`;\n        pp.style.display = 'block'; pp.style.top = (e.clientY+10) + 'px'; pp.style.left = Math.min(e.clientX, window.innerWidth-330) + 'px';\n        e.stopPropagation();\n      }\n    });\n\n    document.querySelectorAll('.sent').forEach(el => {\n        el.addEventListener('mouseenter', () => {\n            const tid = el.getAttribute('data-target'); const t = document.getElementById(tid);\n            if(t) t.style.backgroundColor = '#fef08a'; \n        });\n        el.addEventListener('mouseleave', () => {\n            const tid = el.getAttribute('data-target'); const t = document.getElementById(tid);\n            if(t) t.style.backgroundColor = 'transparent';\n        });\n    });\n}\n\nfunction allowDrop(ev) { ev.preventDefault(); }\nfunction drag(ev) { \n    const el = ev.target.closest('[draggable=\"true\"]') || ev.target;\n    const val = el.dataset.val || el.innerText.split('.')[0].trim();\n    ev.dataTransfer.setData(\"text\", val); \n    ev.dataTransfer.setData(\"srcId\", el.id); \n}\nfunction dragHeading(ev) { \n    const el = ev.target.closest('.heading-item');\n    ev.dataTransfer.setData(\"hid\", el.dataset.hid); \n    ev.dataTransfer.setData(\"srcId\", el.id); \n}\nfunction drop(ev) {\n    ev.preventDefault();\n    const zone = ev.target.closest('.drop-zone');\n    if(!zone) return
