<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />

  <title>Preview bài tập</title>
  <style>
    :root{--bg:#f6f8fb;--card:#fff;--accent1:#6a11cb;--accent2:#2575fc;--muted:#6b7280;--btn-text:#fff}
    html, body { height: 100%; margin: 0; }
    body{font-family:Inter,system-ui,Arial;background:var(--bg);color:#111}
    .wrap{
      max-width:100%;
      width:100%;
      height:100vh;
      margin:0;
      padding:18px;
      box-sizing:border-box;
      display:flex;
      flex-direction:column;
      gap:12px;
      background:linear-gradient(180deg,rgba(255,255,255,0.7),#fff);
    }
    h2{margin:0 0 6px 0}
    .controls{flex:0 0 auto; display:flex; gap:10px; align-items:center; flex-wrap:wrap}
    select{padding:10px 12px;border-radius:10px;border:1px solid #e6e9ef;background:#fff;min-width:220px}
    .btn{display:inline-flex;align-items:center;gap:8px;padding:10px 14px;border-radius:10px;border:0;color:var(--btn-text);font-weight:700;cursor:pointer;transition:transform .12s ease,box-shadow .12s ease}
    .btn-primary{background:linear-gradient(90deg,var(--accent1),var(--accent2));box-shadow:0 8px 24px rgba(37,117,252,0.12)}
    .btn-ghost{background:transparent;color:var(--accent2);border:1px solid rgba(37,117,252,0.12);color:var(--accent2);border-radius:10px;padding:8px 12px}
    .btn:hover{transform:translateY(-2px)}
    /* iframe chiếm phần còn lại */
    #frame{flex:1 1 auto;width:100%;min-height:0;border-radius:10px;border:1px solid #e6eef8;background:#fff}
    .meta{color:var(--muted);font-size:13px;margin-top:6px}
    /* fullscreen styles */
    .fullscreen-frame {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      z-index: 9998 !important;
      border-radius: 0 !important;
      border: none !important;
      box-shadow: none !important;
    }
    .hidden { display: none !important; }
    #closeFullscreen {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 10000;
      padding: 10px 14px;
      border-radius: 10px;
      border: 0;
      background: rgba(255,255,255,0.95);
      color: #111;
      font-weight:700;
      box-shadow: 0 6px 18px rgba(16,24,40,0.12);
      cursor: pointer;
    }
    @media (max-width:640px){ .controls{flex-direction:column;align-items:stretch} select{width:100%} }
  </style>
</head>

x; border-radius:12px; background:rgba(255,255,255,0.01); border:2px dashed rgba(255,255,255,0.03); min-height:56px; transition:all 220ms ease; cursor:pointer; position:relative; overflow:visible; }\n  .g-slot .inner{position:relative; z-index:3;}\n  .g-slot.correct{padding-left:12px; font-size:15px; display:flex; align-items:center; border-style:solid; border-width:2px; background:linear-gradient(180deg, rgba(16,185,129,0.03), rgba(16,185,129,0.01));}\n  .g-slot::before{ content:\"\"; position:absolute; inset:-4px; border-radius:16px; z-index:1; background: linear-gradient(90deg, var(--neon-primary), var(--neon-secondary), var(--neon-warm)); filter: blur(8px); opacity:0; transform:scale(0.98); transition:opacity 220ms ease, transform 220ms ease; pointer-events:none; mix-blend-mode:screen; }\n  .g-slot::after{ content:\"\"; position:absolute; inset:-2px; border-radius:14px; z-index:2; background: linear-gradient(90deg, var(--neon-primary), var(--neon-secondary), var(--neon-warm)); background-size:200% 100%; opacity:0; transform:translateZ(0); -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0); -webkit-mask-composite: xor; mask-composite: exclude; padding:2px; transition:opacity 220ms ease; pointer-events:none; }\n  .g-slot:hover::before, .g-slot:focus::before, .g-slot.active::before, .g-slot.highlight::before{ opacity:0.55; transform:scale(1); animation: neonPulse 2.6s linear infinite; }\n  .g-slot:hover::after, .g-slot:focus::after, .g-slot.active::after, .g-slot.highlight::after{ opacity:1; animation: neonMove 2.2s linear infinite; }\n  .g-slot.correct::before{ background: linear-gradient(90deg, rgba(16,185,129,0.9), rgba(96,165,250,0.06)); opacity:0.6; filter:blur(10px); }\n  .g-slot.correct::after{ background: linear-gradient(90deg, rgba(16,185,129,0.95), rgba(6,182,212,0.06)); opacity:1; }\n\n  @keyframes neonMove{ 0%{background-position:0% 50%} 100%{background-position:200% 50%} }\n  @keyframes neonPulse{ 0%{filter:blur(6px); opacity:0.45} 50%{filter:blur(12px); opacity:0.7} 100%{filter:blur(6px); opacity:0.45} }\n\n  .g-vie-list{display:flex; flex-wrap:wrap; gap:10px; padding-top:6px;}\n  .g-vie-item{cursor:grab; user-select:none; padding:8px 12px; border-radius:10px; background:linear-gradient(90deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01)); border:1px solid rgba(255,255,255,0.03);}\n  .g-vie-item.dragging{opacity:0.5; transform:scale(0.98);}\n  .g-wrong{animation:shake 300ms; border-color:rgba(239,68,68,0.6);}\n  @keyframes shake{0%{transform:translateX(0)} 25%{transform:translateX(-6px)} 50%{transform:translateX(6px)} 75%{transform:translateX(-4px)} 100%{transform:translateX(0)}}\n  \n  .g-badge{display:inline-flex; align-items:center; gap:8px; padding:6px 10px; border-radius:999px; background:rgba(255,255,255,0.02); color:var(--muted); font-weight:600;}\n  .confetti{position:fixed; left:0; top:0; width:100%; height:100%; pointer-events:none; overflow:hidden; z-index: 3000;}\n  .confetti .piece{position:absolute; width:10px; height:14px; opacity:0; transform:translateY(-20px) rotate(0deg); animation:fall 1200ms linear forwards;}\n  @keyframes fall{0%{opacity:1; transform:translateY(-10vh) rotate(0deg)} 100%{opacity:1; transform:translateY(110vh) rotate(720deg)}}\n  \n  .flash-wrap{perspective:1200px; width:100%; max-width:520px;}\n  .flashcard{width:100%; height:140px; position:relative; transform-style:preserve-3d; transition:transform 600ms cubic-bezier(.2,.9,.3,1); border-radius:12px; cursor:pointer;}\n  .flashcard.flipped{transform:rotateY(180deg);}\n  .flash-face{position:absolute; inset:0; backface-visibility:hidden; border-radius:12px; display:flex; align-items:center; justify-content:center; padding:18px; font-size:18px; text-align:center; box-shadow: 0 6px 18px rgba(2,6,23,0.6); border:1px solid rgba(255,255,255,0.03);}\n  .flash-face.front{background:linear-gradient(180deg, rgba(6,182,212,0.08), rgba(96,165,250,0.03)); color:#e6f9fb;}\n  .flash-face.back{transform:rotateY(180deg); background:linear-gradient(180deg, rgba(16,185,129,0.06), rgba(96,165,250,0.02)); color:#eafff0;}\n\n  .fill-list{display:flex; flex-direction:column; gap:10px;}\n  .fill-row{display:flex; gap:12px; align-items:center;}\n  .fill-row .vie{flex:0 0 48%; min-width:160px; color:var(--muted);}\n  .fill-row input{ flex:1; padding:10px 12px; border-radius:10px; border:1px solid var(--input-muted-border); background: var(--input-muted-bg); color:var(--input-muted-text); transition:box-shadow 180ms, border-color 180ms, background-color 180ms; caret-color: var(--neon-primary); }\n  .fill-row input:focus{ outline:none; border-color: rgba(6,182,212,0.45); box-shadow: 0 6px 18px rgba(6,182,212,0.06); background: rgba(255,255,255,0.025); }\n  .fill-row input.correct{ border-color: rgba(16,185,129,0.7); box-shadow: 0 6px 18px rgba(16,185,129,0.04); background: rgba(16,185,129,0.02); }\n  .fill-row input.wrong{ border-color: rgba(244,63,94,0.7); box-shadow: 0 6px 18px rgba(244,63,94,0.03); background: rgba(244,63,94,0.01); }\n  .correct-answer{color: #10b981; font-size:12px; font-weight:700}\n  .wrong-answer{color: #ef4444; font-size:12px; font-weight:700}\n  \n  @media (max-width:880px){ .g-layout{grid-template-columns:1fr; flex-direction: column;} .g-card{flex-basis:100%; width:100%;} }\n  \n  .mif-inline-box { margin-top: 15px; padding: 12px; background: #eef2ff; border: 1px dashed #a5b4fc; border-radius: 8px; }\n  .mif-inline-btn { display: flex; align-items: flex-start; gap: 8px; background: #fff; border: 1px solid #cbd5e1; padding: 8px 12px; border-radius: 6px; font-size: 13px; cursor: pointer; transition: 0.2s; color: #475569; line-height: 1.4; }\n  .mif-inline-btn:hover { border-color: #6366f1; background: #fafafa; }\n  .mif-inline-btn.selected { background: #6366f1; color: #fff; border-color: #6366f1; box-shadow: 0 2px 4px rgba(99,102,241,0.3); }\n  .mif-inline-btn.selected .q-num-s { color: #fff; }\n  .mif-inline-btn.hidden-by-other { display: none !important; }\n\n</style></head>\n<body>\n<div id=\"hl-toolbar\">\n  <button class=\"hl-btn-item\" onmousedown=\"applyHighlight(event)\">Highlight</button>\n  <button class=\"hl-btn-item\" onmousedown=\"applyNote(event)\">Note</button>\n</div>\n\n<div class=\"top-bar\">\n    <div style=\"display:flex;align-items:center;gap:15px;\">\n        <select id=\"lesson-selector\" onchange=\"switchLesson(this.value)\" style=\"padding:6px 12px; border-radius:6px; font-weight:bold; border:1px solid #cbd5e1; outline:none; cursor:pointer; background:#f8fafc; color:#334155;\"></select>\n        <div class=\"timer\" id=\"timer\">--:--</div>\n        <button class=\"game-btn\" onclick=\"toggleGame()\">🎮 Play Vocab Game</button>\n\t\t<button class=\"game-btn\" onclick=\"toggleMifMode()\" style=\"background:#8b5cf6;color:#fff\">🎯 Luyện Mif</button>\n    </div>\n    <div class=\"progress-container\" id=\"progressBar\"></div>\n    <div style=\"display:flex; align-items:center;\">\n        <button class=\"check-btn\" id=\"saveBtn\" onclick=\"saveResult()\" style=\"display:none; background:#f59e0b; margin-right:8px;\">SAVE RESULT</button>\n        <button class=\"check-btn\" onclick=\"check()\" id=\"submitBtn\">SUBMIT</button>\n    </div>\n</div>\n\n<div id=\"reading-view\" class=\"container\">\n  <div class=\"pane left\" id=\"lp\"><h2 style=\"font-size:18px; font-weight:700; color:#334155; margin-bottom:15px\">Reading Passage</h2><div id=\"articleArea\"></div></div>\n  <div class=\"resizer\" id=\"rs\"></div>\n  <div class=\"pane right\"><h2 style=\"font-size:18px; font-weight:700; color:#334155; margin-bottom:15px\">Questions</h2><div id=\"headingsArea\"></div><div id=\"qs\"></div></div>\n</div>\n\n<div id=\"game-view\">\n  <div class=\"g-container\">\n    <header class=\"g-header\">\n      <h1 class=\"g-h1\">Vocabulary Matching Game</h1>\n      <div class=\"g-controls\">\n        <div class=\"g-badge\" id=\"score\">Đúng: 0 / 0</div>\n        <button class=\"g-btn\" id=\"shuffleBtn\">Trộn</button>\n        <button class=\"g-btn\" id=\"resetBtn\">Làm lại</button>\n        <button class=\"g-btn\" style=\"background:linear-gradient(90deg,#ef4444,#dc2626);color:#fff\" onclick=\"toggleGame()\">Close Game</button>\n      </div>\n    </header>\n\n    <section class=\"g-card\" style=\"margin-bottom:12px;\">\n      <h3 style=\"margin-top:0; color:var(--accent)\">Flashcards Ôn Tập</h3>\n      <div style=\"display:flex; gap:12px; align-items:center; flex-wrap:wrap;\">\n        <div class=\"flash-wrap\">\n          <div id=\"flashcard\" class=\"flashcard\" tabindex=\"0\" role=\"button\" aria-pressed=\"false\">\n            <div class=\"flash-face front\" id=\"flashFront\">Nhấn Next để bắt đầu</div>\n            <div class=\"flash-face back\" id=\"flashBack\">Back</div>\n          </div>\n        </div>\n        <div style=\"display:flex; flex-direction:column; gap:8px;\">\n          <div style=\"display:flex; gap:8px;\">\n            <button class=\"g-btn\" id=\"prevCard\">Prev</button>\n            <button class=\"g-btn\" id=\"flipCard\">Flip</button>\n            <button class=\"g-btn\" id=\"nextCard\">Next</button>\n          </div>\n          <div style=\"display:flex; gap:8px;\">\n            <button class=\"g-btn\" id=\"autoPlay\">Auto</button>\n            <button class=\"g-btn\" id=\"showBoth\">Show Both</button>\n          </div>\n        </div>\n      </div>\n      <div class=\"small\" style=\"margin-top:8px; color:var(--muted); font-size:13px\">Nhấn flashcard để lật. Auto sẽ tự chuyển sau 2s. Show Both hiển thị cả 2 mặt tạm thời.</div>\n    </section>\n\n    <section class=\"g-layout\">\n      <div class=\"g-card\">\n        <h3 style=\"margin-top:0; color:var(--accent)\">Phần 1 Matching</h3>\n        <div class=\"small\" style=\"color:var(--muted); font-size:13px\">Kéo nghĩa vào ô tương ứng. Hoặc chạm để chọn rồi chạm vào ô.</div>\n        <div class=\"g-list\" id=\"engList\" style=\"margin-top:12px;\"></div>\n      </div>\n      <div class=\"g-card\">\n        <h3 style=\"margin-top:0; color:var(--accent)\">Phần 2 Vietnamese</h3>\n        <div class=\"g-vie-list\" id=\"vieList\" style=\"margin-top:12px;\"></div>\n      </div>\n    </section>\n\n    <section class=\"g-card\" style=\"margin-top:12px; margin-bottom: 50px;\">\n      <h3 style=\"margin-top:0; color:var(--accent)\">Bài Điền Chữ</h3>\n      <div class=\"small\" style=\"color:var(--muted); font-size:13px\">Bên trái là tiếng Việt, bên phải học sinh điền tiếng Anh. Nhấn Kiểm tra để chấm.</div>\n      <div style=\"margin-top:10px;\">\n        <div class=\"fill-list\" id=\"fillList\"></div>\n        <div style=\"margin-top:10px; display:flex; gap:8px; align-items:center;\">\n          <button class=\"g-btn\" id=\"checkFill\">Kiểm tra</button>\n          <button class=\"g-btn\" id=\"showAnswers\">Hiện đáp án</button>\n          <button class=\"g-btn\" id=\"resetFill\">Làm lại</button>\n          <div class=\"small\" id=\"fillScore\" style=\"align-self:center; color:var(--muted); font-size:13px\">Điểm: 0 / 0</div>\n        </div>\n      </div>\n    </section>\n  </div>\n</div>\n\n<div id=\"mif-view\">\n  <div class=\"mif-header\">\n    <h2 id=\"mif-title\" style=\"margin:0;color:#4338ca;font-size:18px\">Luyện Mif: Đoạn ...</h2>\n    <button class=\"mif-nav-btn\" style=\"background:#ef4444\" onclick=\"toggleMifMode()\">Đóng</button>\n  </div>\n  <div class=\"mif-body\">\n    <div class=\"mif-left\">\n      <div class=\"mif-col-container\">\n        <div class=\"mif-col\" id=\"mif-en-col\"></div>\n        <div class=\"mif-col\" id=\"mif-vi-col\"></div>\n      </div>\n    </div>\n    <div class=\"mif-right\">\n      <div id=\"mif-qs-container\" style=\"flex:1; overflow-y:auto; padding-bottom:20px;\"></div>\n      <div style=\"display:flex; justify-content:space-between; border-top:2px solid #cbd5e1; padding-top:15px; margin-top:10px;\">\n        <button class=\"mif-nav-btn\" id=\"mif-prev\" onclick=\"navMif(-1)\">⬅ Back</button>\n        <button class=\"mif-nav-btn\" id=\"mif-next\" onclick=\"navMif(1)\">Next ➡</button>\n      </div>\n    </div>\n  </div>\n</div>\n\n<div id=\"popup\"></div>\n<div class=\"confetti\" id=\"confetti\"></div>\n\n<script>\n// --- MULTI-LESSON DATA INJECTION ---\nconst lessonsData = [{\"name\":\"Passage 1\",\"articleHtml\":\"\\u003cdiv class=\\\"reading-content\\\">\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph A\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s0\\\">Fishbourne Roman Palace is in the village of Fishbourne in West Sussex, England. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s1\\\">This large palace was built in the 1st century AD, around thirty years after the Roman \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v0\\\">conquest\\u003c/span> of Britain, on the site of Roman army grain stores which had been established after the \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v1\\\">invasion\\u003c/span>, during the reign of the Roman Emperor Claudius in 43 AD. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s2\\\">The rectangular palace was built around formal gardens, the northern half of which has been \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v2\\\">reconstructed\\u003c/span>. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s3\\\">There were extensive \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v4\\\">alterations\\u003c/span> in the 2nd and 3rd centuries AD, with many of the original black and white mosaic floors being overlaid with more \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v3\\\">sophisticated\\u003c/span> colored ones, including a perfectly preserved mosaic of a dolphin in the north wing. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p0s4\\\">More \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v4\\\">alterations\\u003c/span> were in progress when the palace burned down around 270 AD, after which it was \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v5\\\">abandoned\\u003c/span>. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t0')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t0\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p0s0\\\" class=\\\"vi-sent\\\">Cung điện La Mã Fishbourne nằm ở làng Fishbourne ở Tây Sussex, Anh. \\u003c/span>\\u003cspan id=\\\"p0s1\\\" class=\\\"vi-sent\\\">Cung điện lớn này được xây dựng vào thế kỷ 1 sau Công nguyên, khoảng ba mươi năm sau cuộc chinh phục của người La Mã ở Anh, trên địa điểm là kho chứa ngũ cốc của quân đội La Mã được thành lập sau cuộc xâm lược, dưới thời trị vì của Hoàng đế La Mã Claudius vào năm 43 sau Công nguyên. \\u003c/span>\\u003cspan id=\\\"p0s2\\\" class=\\\"vi-sent\\\">Cung điện hình chữ nhật được xây dựng xung quanh các khu vườn trang trọng, nửa phía bắc đã được xây dựng lại. \\u003c/span>\\u003cspan id=\\\"p0s3\\\" class=\\\"vi-sent\\\">Đã có những thay đổi lớn vào thế kỷ thứ 2 và thứ 3 sau Công Nguyên, với nhiều sàn khảm đen trắng nguyên bản được phủ lên những sàn có màu sắc phức tạp hơn, bao gồm cả bức tranh khảm cá heo được bảo quản hoàn hảo ở cánh phía bắc. \\u003c/span>\\u003cspan id=\\\"p0s4\\\" class=\\\"vi-sent\\\">Nhiều thay đổi đang diễn ra khi cung điện bị thiêu rụi vào khoảng năm 270 sau Công Nguyên, sau đó nó bị bỏ hoang. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph B\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s0\\\">Local people had long believed that a Roman palace once existed in the area. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s1\\\">However, it was not until 1960 that the \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v6\\\">archaeologist\\u003c/span> Barry Cunliffe, of Oxford University, first systematically \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v7\\\">excavated\\u003c/span> the site, after workmen accidentally uncovered a wall while laying a water main. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s2\\\">The Roman villa \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v7\\\">excavated\\u003c/span> by Cunliffe’s team was so grand that it became known as Fishbourne Roman Palace, and a museum was \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v8\\\">erected\\u003c/span> to preserve some of the remains. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p1s3\\\">This is administered by the Sussex Archaeological Society. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t1')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t1\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p1s0\\\" class=\\\"vi-sent\\\">Người dân địa phương từ lâu đã tin rằng một cung điện La Mã từng tồn tại trong khu vực. \\u003c/span>\\u003cspan id=\\\"p1s1\\\" class=\\\"vi-sent\\\">Tuy nhiên, phải đến năm 1960, nhà khảo cổ học Barry Cunliffe, thuộc Đại học Oxford, mới lần đầu tiên khai quật một cách có hệ thống địa điểm này, sau khi các công nhân vô tình phát hiện ra một bức tường khi đang đặt đường ống dẫn nước chính. \\u003c/span>\\u003cspan id=\\\"p1s2\\\" class=\\\"vi-sent\\\">Biệt thự La Mã do nhóm của Cunliffe khai quật lớn đến mức nó được gọi là Cung điện La Mã Fishbourne, và một bảo tàng đã được dựng lên để bảo tồn một số di tích. \\u003c/span>\\u003cspan id=\\\"p1s3\\\" class=\\\"vi-sent\\\">Việc này được quản lý bởi Hiệp hội Khảo cổ học Sussex. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph C\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s0\\\">In its day, the completed palace would have comprised four large wings with colonnaded fronts. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s1\\\">The north and east wings consisted of suites of private rooms built around courtyards, with a \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v9\\\">monumental entrance\\u003c/span> in the middle of the east wing. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s2\\\">In the north-east corner, there was an \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v10\\\">assembly hall\\u003c/span>. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s3\\\">The west wing contained state rooms, a large \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v11\\\">ceremonial reception\\u003c/span> room, and a gallery. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s4\\\">The south wing contained the owner’s private apartments. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s5\\\">The palace included as many as 50 mosaic floors, under-floor central heating, and a bathhouse. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s6\\\">In size, Fishbourne Palace would have been approximately \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v12\\\">equivalent\\u003c/span> to some of the great Roman palaces of Italy and was by far the largest known Roman residence north of the European Alps, measuring about 500 feet (150 m) square. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p2s7\\\">A team of volunteers and professional archaeologists are involved in \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v13\\\">ongoing\\u003c/span> archaeological excavation on the site of nearby, possibly military, buildings. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t2')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t2\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p2s0\\\" class=\\\"vi-sent\\\">Vào thời đó, cung điện đã hoàn thành sẽ bao gồm bốn cánh lớn với mặt trước có hàng cột. \\u003c/span>\\u003cspan id=\\\"p2s1\\\" class=\\\"vi-sent\\\">Cánh phía bắc và phía đông bao gồm các dãy phòng riêng được xây dựng xung quanh sân, với một lối vào hoành tráng ở giữa cánh phía đông. \\u003c/span>\\u003cspan id=\\\"p2s2\\\" class=\\\"vi-sent\\\">Ở góc đông bắc có một hội trường. \\u003c/span>\\u003cspan id=\\\"p2s3\\\" class=\\\"vi-sent\\\">Cánh phía tây có các phòng khánh tiết, một phòng tiếp tân nghi lễ lớn và một phòng trưng bày. \\u003c/span>\\u003cspan id=\\\"p2s4\\\" class=\\\"vi-sent\\\">Cánh phía nam chứa các căn hộ riêng của chủ sở hữu. \\u003c/span>\\u003cspan id=\\\"p2s5\\\" class=\\\"vi-sent\\\">Cung điện có tới 50 tầng khảm, hệ thống sưởi trung tâm dưới sàn và một nhà tắm. \\u003c/span>\\u003cspan id=\\\"p2s6\\\" class=\\\"vi-sent\\\">Về kích thước, Cung điện Fishbourne có thể xấp xỉ tương đương với một số cung điện La Mã vĩ đại của Ý và cho đến nay là dinh thự La Mã lớn nhất được biết đến ở phía bắc dãy Alps châu Âu, rộng khoảng 500 feet (150 m) vuông. \\u003c/span>\\u003cspan id=\\\"p2s7\\\" class=\\\"vi-sent\\\">Một nhóm tình nguyện viên và các nhà khảo cổ học chuyên nghiệp tham gia vào quá trình khai quật khảo cổ đang diễn ra tại địa điểm của các tòa nhà gần đó, có thể là quân sự. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph D\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p3s0\\\">The first buildings to be \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v8\\\">erected\\u003c/span> on the site were constructed in the early part of the \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v0\\\">conquest\\u003c/span> in 43 AD. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p3s1\\\">Later, two timber buildings were constructed, one with clay and mortar floors and plaster walls, which appears to have been a house of some comfort. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p3s2\\\">These buildings were \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v14\\\">demolished\\u003c/span> in the 60s AD and replaced by a substantial stone house, which included colonnades and a bath suite. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p3s3\\\">It has been suggested that the palace itself, \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v21\\\">incorporating\\u003c/span> the previous house in its south-east corner, was constructed around 73–75 AD. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p3s4\\\">However, Dr. Miles Russell, of Bournemouth University, reinterpreted the ground plan and the collection of objects found and suggested that, given the extremely close \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v15\\\">parallels\\u003c/span> with the imperial palace of Domitian in Rome, its construction may more plausibly date to after 92 AD. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t3')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t3\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p3s0\\\" class=\\\"vi-sent\\\">Những tòa nhà đầu tiên được xây dựng trên địa điểm này được xây dựng vào giai đoạn đầu của cuộc chinh phục vào năm 43 sau Công Nguyên. \\u003c/span>\\u003cspan id=\\\"p3s1\\\" class=\\\"vi-sent\\\">Sau đó, hai tòa nhà bằng gỗ được xây dựng, một tòa nhà có sàn bằng đất sét, vữa và tường thạch cao, dường như là một ngôi nhà tiện nghi. \\u003c/span>\\u003cspan id=\\\"p3s2\\\" class=\\\"vi-sent\\\">Những tòa nhà này đã bị phá bỏ vào những năm 60 sau Công Nguyên và được thay thế bằng một ngôi nhà bằng đá kiên cố, có hàng cột và phòng tắm. \\u003c/span>\\u003cspan id=\\\"p3s3\\\" class=\\\"vi-sent\\\">Có ý kiến ​​​​cho rằng chính cung điện, kết hợp với ngôi nhà trước đó ở góc đông nam, được xây dựng vào khoảng năm 73–75 sau Công nguyên. \\u003c/span>\\u003cspan id=\\\"p3s4\\\" class=\\\"vi-sent\\\">Tuy nhiên, Tiến sĩ Miles Russell, thuộc Đại học Bournemouth, đã giải thích lại sơ đồ mặt bằng và bộ sưu tập các đồ vật được tìm thấy và cho rằng, do có sự tương đồng cực kỳ gần gũi với cung điện hoàng gia Domitian ở Rome, nên việc xây dựng nó có thể có niên đại hợp lý hơn là sau năm 92 sau Công Nguyên. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph E\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p4s0\\\">With regard to who lived in Fishbourne Palace, there are a number of theories. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p4s1\\\">For example, one proposed by Professor Cunliffe is that, in its early phase, the palace was the residence of Tiberius Claudius Cogidubnus, a local chieftain who supported the Romans and may have been installed as king of a number of \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v16\\\">territories\\u003c/span> following the first stage of the \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v0\\\">conquest\\u003c/span>. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p4s2\\\">Cogidubnus is known from a reference to his loyalty in Agricola, a work by the Roman writer Tacitus, and from an inscription \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v17\\\">commemorating\\u003c/span> a temple dedicated to the gods Neptune and Minerva found in the nearby city of Chichester. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p4s3\\\">Another theory is that it was built for Sallustius Lucullus, a Roman governor of Britain in the late 1st century, who may have been the son of the British prince Adminius. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p4s4\\\">Two inscriptions recording the presence of Lucullus have been found in Chichester, and the redating by Miles Russell suggests that if the palace was designed for Lucullus, it may have only been in use for a few years, as the Roman historian Suetonius records that Lucullus was \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v18\\\">executed\\u003c/span> by the Emperor Domitian in or shortly after 93 AD. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t4')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t4\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p4s0\\\" class=\\\"vi-sent\\\">Về người sống trong Cung điện Fishbourne, có một số giả thuyết. \\u003c/span>\\u003cspan id=\\\"p4s1\\\" class=\\\"vi-sent\\\">Ví dụ, một đề xuất được Giáo sư Cunliffe đề xuất là, trong giai đoạn đầu, cung điện là nơi ở của Tiberius Claudius Cogidubnus, một thủ lĩnh địa phương ủng hộ người La Mã và có thể đã được phong làm vua của một số vùng lãnh thổ sau giai đoạn đầu của cuộc chinh phục. \\u003c/span>\\u003cspan id=\\\"p4s2\\\" class=\\\"vi-sent\\\">Cogidubnus được biết đến nhờ nhắc đến lòng trung thành của ông với Agricola, một tác phẩm của nhà văn La Mã Tacitus, và từ một dòng chữ kỷ niệm ngôi đền dành riêng cho các vị thần Neptune và Minerva được tìm thấy ở thành phố Chichester gần đó. \\u003c/span>\\u003cspan id=\\\"p4s3\\\" class=\\\"vi-sent\\\">Một giả thuyết khác cho rằng nó được xây dựng cho Sallustius Lucullus, một thống đốc La Mã của Anh vào cuối thế kỷ 1, người có thể là con trai của hoàng tử Anh Adminius. \\u003c/span>\\u003cspan id=\\\"p4s4\\\" class=\\\"vi-sent\\\">Hai dòng chữ khắc ghi lại sự hiện diện của Lucullus đã được tìm thấy ở Chichester, và việc Miles Russell đánh giá lại cho thấy rằng nếu cung điện được thiết kế cho Lucullus thì nó có thể chỉ được sử dụng trong một vài năm, như nhà sử học La Mã Suetonius ghi lại rằng Lucullus đã bị Hoàng đế Domitian hành quyết vào hoặc ngay sau năm 93 sau Công nguyên. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph F\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p5s0\\\">Additional theories suggest that either Verica, a British king of the Roman Empire in the years preceding the Claudian \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v1\\\">invasion\\u003c/span>, was the owner of the palace, or Tiberius Claudius Catuarus, following the recent discovery of a gold ring belonging to him. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p5s1\\\">The palace \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v19\\\">outlasted\\u003c/span> the original owner, whoever he was, and was extensively re-planned early in the 2nd century AD and subdivided into a series of lesser apartments. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p5s2\\\">Further redevelopment was begun in the late 3rd century AD, but these \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v4\\\">alterations\\u003c/span> were incomplete when the north wing was destroyed in a fire around 270 AD. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p5s3\\\">The damage was too great to repair, and the palace was \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v5\\\">abandoned\\u003c/span> and later \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v20\\\">dismantled\\u003c/span>. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t5')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t5\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p5s0\\\" class=\\\"vi-sent\\\">Các giả thuyết bổ sung cho rằng Verica, một vị vua người Anh của Đế chế La Mã trong những năm trước cuộc xâm lược của Claudian, là chủ sở hữu của cung điện, hoặc Tiberius Claudius Catuarus, sau khi người ta phát hiện ra chiếc nhẫn vàng gần đây của ông ta. \\u003c/span>\\u003cspan id=\\\"p5s1\\\" class=\\\"vi-sent\\\">Cung điện tồn tại lâu hơn chủ sở hữu ban đầu, bất kể ông ta là ai, và đã được quy hoạch lại rộng rãi vào đầu thế kỷ thứ 2 sau Công Nguyên và được chia thành một loạt căn hộ nhỏ hơn. \\u003c/span>\\u003cspan id=\\\"p5s2\\\" class=\\\"vi-sent\\\">Việc tái phát triển hơn nữa đã được bắt đầu vào cuối thế kỷ thứ 3 sau Công nguyên, nhưng những thay đổi này chưa hoàn thiện khi cánh phía bắc bị phá hủy trong một trận hỏa hoạn vào khoảng năm 270 sau Công nguyên. \\u003c/span>\\u003cspan id=\\\"p5s3\\\" class=\\\"vi-sent\\\">Thiệt hại quá lớn không thể sửa chữa được, cung điện bị bỏ hoang và sau đó bị tháo dỡ. \\u003c/span>\\u003c/div>\\u003c/div>\\u003cdiv class=\\\"para-box\\\">\\u003cdiv class=\\\"para-header-row\\\">\\u003cdiv class=\\\"para-header\\\">Paragraph G\\u003c/div>\\u003c/div>\\u003cp class=\\\"en-text\\\">\\u003cspan class=\\\"sent\\\" data-target=\\\"p6s0\\\">A modern museum has been built by the Sussex Archaeological Society, \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v21\\\">incorporating\\u003c/span> most of the visible remains, including one wing of the palace. \\u003c/span>\\u003cspan class=\\\"sent\\\" data-target=\\\"p6s1\\\">The gardens have been re-planted using \\u003cspan class=\\\"vocab\\\" data-vid=\\\"v22\\\">authentic\\u003c/span> plants from the Roman period. \\u003c/span>\\u003c/p>\\u003cbutton class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t6')\\\">Show Translation\\u003c/button>\\u003cdiv id=\\\"t6\\\" class=\\\"vi-text hidden\\\">\\u003cspan id=\\\"p6s0\\\" class=\\\"vi-sent\\\">Một bảo tàng hiện đại đã được Hiệp hội Khảo cổ học Sussex xây dựng, kết hợp hầu hết những di tích có thể nhìn thấy được, bao gồm một cánh của cung điện. \\u003c/span>\\u003cspan id=\\\"p6s1\\\" class=\\\"vi-sent\\\">Các khu vườn đã được trồng lại bằng các loại cây đích thực từ thời La Mã. \\u003c/span>\\u003c/div>\\u003c/div>\\u003c/div>\",\"headingsHtml\":\"\",\"qs\":[{\"id\":1,\"type\":\"tfng\",\"text\":\"Fishbourne Palace was the first structure to be built on its site.\",\"options\":[],\"correctAnswer\":\"FALSE\",\"location\":\"is in the village of Fishbourne in West Sussex\",\"_orderId\":1},{\"id\":2,\"type\":\"tfng\",\"text\":\"Fishbourne Palace was renovated more than once.\",\"options\":[],\"correctAnswer\":\"TRUE\",\"location\":\"were extensive alterations in the\",\"_orderId\":2},{\"id\":3,\"type\":\"tfng\",\"text\":\"Fishbourne Palace was large in comparison with Roman palaces in Italy.\",\"options\":[],\"correctAnswer\":\"FALSE\",\"location\":\"would have been approximately equivalent\",\"_orderId\":3},{\"id\":4,\"type\":\"tfng\",\"text\":\"Research is continuing in the area close to Fishbourne Palace.\",\"options\":[],\"correctAnswer\":\"TRUE\",\"location\":\"volunteers and professional archaeologists\",\"_orderId\":4},{\"id\":5,\"type\":\"tfng\",\"text\":\"Researchers agree on the identity of the person for whom Fishbourne Palace was constructed.\",\"options\":[],\"correctAnswer\":\"FALSE\",\"location\":\"regard to who lived in\",\"_orderId\":5},{\"id\":6,\"type\":\"tfng\",\"text\":\"Fishbourne Palace was burnt down by local people.\",\"options\":[],\"correctAnswer\":\"NOT GIVEN\",\"location\":\"\",\"_orderId\":6},{\"type\":\"gap-fill-block\",\"id\":7,\"text\":\"Choose \\u003cb>NO MORE THAN TWO WORDS AND/OR A NUMBER\\u003c/b> from the passage for each answer.\\n\\u003cb>Fishbourne Palace\\u003c/b>\\n\\u003cb>Construction\\u003c/b>\\nThe first buildings on the site contained food for the 7 ...\\nThe palace building surrounded 8 ...\\nIn the 2nd and 3rd centuries, color was added to the 9 ... of the palace.\\n\\u003cb>Discovery\\u003c/b>\\nThe first part of the palace to be found was part of a 10 ...\\n\\u003cb>Possible Inhabitants\\u003c/b>\\nCongidubnus - he is named in several writings\\nSallustius Lucullus - he may have lived there until approximately 11 ... AD\\nVerica - a British king\\nCatuarus - his 12 ... was found there\\n\\u003cb>Present Day\\u003c/b>\\n13 ... has been built on the site to help protect it.\",\"gapIds\":[7,8,9,10,11,12,13],\"answers\":{\"7\":\"Roman army\",\"8\":\"formal gardens\",\"9\":\"mosaic floors\",\"10\":\"Wall\",\"11\":\"93\",\"12\":\"Gold ring\",\"13\":\"Modern museum\"},\"locations\":{\"7\":\"large palace was built in the\",\"8\":\"rectangular palace was built around\",\"9\":\"many of the original black and white\",\"10\":\"systematically excavated the site\",\"11\":\"Roman historian Suetonius records that Lucullus\",\"12\":\"theories suggest that either Verica\",\"13\":\"A modern museum has been built by the Sussex Archaeological Society\"},\"_orderId\":7}],\"vocab\":[{\"id\":\"v0\",\"word\":\"conquest\",\"meaning\":\"sự chinh phục (victory, takeover)\",\"synonym\":\"The army celebrated its conquest. (Quân đội ăn mừng sự chinh phục.)\",\"example\":\"\"},{\"id\":\"v1\",\"word\":\"invasion\",\"meaning\":\"cuộc xâm lược (attack, incursion)\",\"synonym\":\"The country resisted the invasion. (Đất nước chống lại cuộc xâm lược.)\",\"example\":\"\"},{\"id\":\"v2\",\"word\":\"reconstructed\",\"meaning\":\"được tái dựng (rebuilt, restored)\",\"synonym\":\"The temple was reconstructed after the war. (Ngôi đền được tái dựng sau chiến tranh.)\",\"example\":\"\"},{\"id\":\"v3\",\"word\":\"sophisticated\",\"meaning\":\"tinh vi, phức tạp (advanced, complex)\",\"synonym\":\"The machine is highly sophisticated. (Máy móc rất tinh vi.)\",\"example\":\"\"},{\"id\":\"v4\",\"word\":\"alterations\",\"meaning\":\"sự thay đổi, chỉnh sửa (modifications, adjustments)\",\"synonym\":\"The dress needed some alterations. (Chiếc váy cần chỉnh sửa.)\",\"example\":\"\"},{\"id\":\"v5\",\"word\":\"abandoned\",\"meaning\":\"bị bỏ hoang (deserted, neglected)\",\"synonym\":\"The house was abandoned for years. (Ngôi nhà bị bỏ hoang nhiều năm.)\",\"example\":\"\"},{\"id\":\"v6\",\"word\":\"archaeologist\",\"meaning\":\"nhà khảo cổ học (researcher, excavator)\",\"synonym\":\"The archaeologist discovered ancient ruins. (Nhà khảo cổ phát hiện tàn tích cổ.)\",\"example\":\"\"},{\"id\":\"v7\",\"word\":\"excavated\",\"meaning\":\"được khai quật (dug up, unearthed)\",\"synonym\":\"The site was excavated by experts. (Khu vực được khai quật bởi các chuyên gia.)\",\"example\":\"\"},{\"id\":\"v8\",\"word\":\"erected\",\"meaning\":\"được dựng lên (built, raised)\",\"synonym\":\"A monument was erected in his honor. (Một tượng đài được dựng lên để vinh danh ông.)\",\"example\":\"\"},{\"id\":\"v9\",\"word\":\"monumental entrance\",\"meaning\":\"cổng vào hoành tráng (grand gateway)\",\"synonym\":\"The palace has a monumental entrance. (Cung điện có cổng vào hoành tráng.)\",\"example\":\"\"},{\"id\":\"v10\",\"word\":\"assembly hall\",\"meaning\":\"hội trường (meeting hall)\",\"synonym\":\"The ceremony took place in the assembly hall. (Buổi lễ diễn ra trong hội trường.)\",\"example\":\"\"},{\"id\":\"v11\",\"word\":\"ceremonial reception\",\"meaning\":\"buổi tiếp đón nghi lễ (formal welcome)\",\"synonym\":\"The king held a ceremonial reception. (Nhà vua tổ chức buổi tiếp đón nghi lễ.)\",\"example\":\"\"},{\"id\":\"v12\",\"word\":\"equivalent\",\"meaning\":\"tương đương (equal, comparable)\",\"synonym\":\"Ten euros is equivalent to about 250,000 VND. (Mười euro tương đương khoảng 250,000 đồng.)\",\"example\":\"\"},{\"id\":\"v13\",\"word\":\"ongoing\",\"meaning\":\"đang diễn ra (continuing, in progress)\",\"synonym\":\"The project is ongoing. (Dự án đang diễn ra.)\",\"example\":\"\"},{\"id\":\"v14\",\"word\":\"demolished\",\"meaning\":\"bị phá hủy (destroyed, torn down)\",\"synonym\":\"The building was demolished last year. (Tòa nhà bị phá hủy năm ngoái.)\",\"example\":\"\"},{\"id\":\"v15\",\"word\":\"parallels\",\"meaning\":\"sự tương đồng (similarities, analogies)\",\"synonym\":\"There are parallels between the two cultures. (Có sự tương đồng giữa hai nền văn hóa.)\",\"example\":\"\"},{\"id\":\"v16\",\"word\":\"territories\",\"meaning\":\"lãnh thổ (regions, domains)\",\"synonym\":\"The empire expanded its territories. (Đế chế mở rộng lãnh thổ.)\",\"example\":\"\"},{\"id\":\"v17\",\"word\":\"commemorating\",\"meaning\":\"tưởng niệm (honoring, remembering)\",\"synonym\":\"A statue was built commemorating the heroes. (Một bức tượng được dựng để tưởng niệm anh hùng.)\",\"example\":\"\"},{\"id\":\"v18\",\"word\":\"executed\",\"meaning\":\"bị xử tử; thực hiện (carried out, performed)\",\"synonym\":\"The plan was executed perfectly. (Kế hoạch được thực hiện hoàn hảo.)\",\"example\":\"\"},{\"id\":\"v19\",\"word\":\"outlasted\",\"meaning\":\"tồn tại lâu hơn (survived, endured)\",\"synonym\":\"The dynasty outlasted its rivals. (Triều đại tồn tại lâu hơn đối thủ.)\",\"example\":\"\"},{\"id\":\"v20\",\"word\":\"dismantled\",\"meaning\":\"bị tháo dỡ (taken apart, disassembled)\",\"synonym\":\"The factory was dismantled after closure. (Nhà máy bị tháo dỡ sau khi đóng cửa.)\",\"example\":\"\"},{\"id\":\"v21\",\"word\":\"incorporating\",\"meaning\":\"kết hợp, bao gồm (integrating, including)\",\"synonym\":\"The design is incorporating modern elements. (Thiết kế kết hợp yếu tố hiện đại.)\",\"example\":\"\"},{\"id\":\"v22\",\"word\":\"authentic\",\"meaning\":\"xác thực, thật (genuine, real)\",\"synonym\":\"The museum displays authentic artifacts. (Bảo tàng trưng bày hiện vật xác thực.)\",\"example\":\"\"}],\"headings\":[],\"headingKey\":{},\"mifRange\":\"ABCDEFG\",\"removeOpt\":false,\"removeFeatureOpt\":false,\"pairs\":[{\"eng\":\"conquest\",\"vie\":\"sự chinh phục (victory, takeover)\"},{\"eng\":\"invasion\",\"vie\":\"cuộc xâm lược (attack, incursion)\"},{\"eng\":\"reconstructed\",\"vie\":\"được tái dựng (rebuilt, restored)\"},{\"eng\":\"sophisticated\",\"vie\":\"tinh vi, phức tạp (advanced, complex)\"},{\"eng\":\"alterations\",\"vie\":\"sự thay đổi, chỉnh sửa (modifications, adjustments)\"},{\"eng\":\"abandoned\",\"vie\":\"bị bỏ hoang (deserted, neglected)\"},{\"eng\":\"archaeologist\",\"vie\":\"nhà khảo cổ học (researcher, excavator)\"},{\"eng\":\"excavated\",\"vie\":\"được khai quật (dug up, unearthed)\"},{\"eng\":\"erected\",\"vie\":\"được dựng lên (built, raised)\"},{\"eng\":\"monumental entrance\",\"vie\":\"cổng vào hoành tráng (grand gateway)\"},{\"eng\":\"assembly hall\",\"vie\":\"hội trường (meeting hall)\"},{\"eng\":\"ceremonial reception\",\"vie\":\"buổi tiếp đón nghi lễ (formal welcome)\"},{\"eng\":\"equivalent\",\"vie\":\"tương đương (equal, comparable)\"},{\"eng\":\"ongoing\",\"vie\":\"đang diễn ra (continuing, in progress)\"},{\"eng\":\"demolished\",\"vie\":\"bị phá hủy (destroyed, torn down)\"},{\"eng\":\"parallels\",\"vie\":\"sự tương đồng (similarities, analogies)\"},{\"eng\":\"territories\",\"vie\":\"lãnh thổ (regions, domains)\"},{\"eng\":\"commemorating\",\"vie\":\"tưởng niệm (honoring, remembering)\"},{\"eng\":\"executed\",\"vie\":\"bị xử tử; thực hiện (carried out, performed)\"},{\"eng\":\"outlasted\",\"vie\":\"tồn tại lâu hơn (survived, endured)\"},{\"eng\":\"dismantled\",\"vie\":\"bị tháo dỡ (taken apart, disassembled)\"},{\"eng\":\"incorporating\",\"vie\":\"kết hợp, bao gồm (integrating, including)\"},{\"eng\":\"authentic\",\"vie\":\"xác thực, thật (genuine, real)\"}],\"pData\":[{\"en\":[\"Fishbourne Roman Palace is in the village of Fishbourne in West Sussex, England.\",\"This large palace was built in the 1st century AD, around thirty years after the Roman conquest of Britain, on the site of Roman army grain stores which had been established after the invasion, during the reign of the Roman Emperor Claudius in 43 AD.\",\"The rectangular palace was built around formal gardens, the northern half of which has been reconstructed.\",\"There were extensive alterations in the 2nd and 3rd centuries AD, with many of the original black and white mosaic floors being overlaid with more sophisticated colored ones, including a perfectly preserved mosaic of a dolphin in the north wing.\",\"More alterations were in progress when the palace burned down around 270 AD, after which it was abandoned.\"],\"vi\":[\"Cung điện La Mã Fishbourne nằm ở làng Fishbourne ở Tây Sussex, Anh.\",\"Cung điện lớn này được xây dựng vào thế kỷ 1 sau Công nguyên, khoảng ba mươi năm sau cuộc chinh phục của người La Mã ở Anh, trên địa điểm là kho chứa ngũ cốc của quân đội La Mã được thành lập sau cuộc xâm lược, dưới thời trị vì của Hoàng đế La Mã Claudius vào năm 43 sau Công nguyên.\",\"Cung điện hình chữ nhật được xây dựng xung quanh các khu vườn trang trọng, nửa phía bắc đã được xây dựng lại.\",\"Đã có những thay đổi lớn vào thế kỷ thứ 2 và thứ 3 sau Công Nguyên, với nhiều sàn khảm đen trắng nguyên bản được phủ lên những sàn có màu sắc phức tạp hơn, bao gồm cả bức tranh khảm cá heo được bảo quản hoàn hảo ở cánh phía bắc.\",\"Nhiều thay đổi đang diễn ra khi cung điện bị thiêu rụi vào khoảng năm 270 sau Công Nguyên, sau đó nó bị bỏ hoang.\"]},{\"en\":[\"Local people had long believed that a Roman palace once existed in the area.\",\"However, it was not until 1960 that the archaeologist Barry Cunliffe, of Oxford University, first systematically excavated the site, after workmen accidentally uncovered a wall while laying a water main.\",\"The Roman villa excavated by Cunliffe’s team was so grand that it became known as Fishbourne Roman Palace, and a museum was erected to preserve some of the remains.\",\"This is administered by the Sussex Archaeological Society.\"],\"vi\":[\"Người dân địa phương từ lâu đã tin rằng một cung điện La Mã từng tồn tại trong khu vực.\",\"Tuy nhiên, phải đến năm 1960, nhà khảo cổ học Barry Cunliffe, thuộc Đại học Oxford, mới lần đầu tiên khai quật một cách có hệ thống địa điểm này, sau khi các công nhân vô tình phát hiện ra một bức tường khi đang đặt đường ống dẫn nước chính.\",\"Biệt thự La Mã do nhóm của Cunliffe khai quật lớn đến mức nó được gọi là Cung điện La Mã Fishbourne, và một bảo tàng đã được dựng lên để bảo tồn một số di tích.\",\"Việc này được quản lý bởi Hiệp hội Khảo cổ học Sussex.\"]},{\"en\":[\"In its day, the completed palace would have comprised four large wings with colonnaded fronts.\",\"The north and east wings consisted of suites of private rooms built around courtyards, with a monumental entrance in the middle of the east wing.\",\"In the north-east corner, there was an assembly hall.\",\"The west wing contained state rooms, a large ceremonial reception room, and a gallery.\",\"The south wing contained the owner’s private apartments.\",\"The palace included as many as 50 mosaic floors, under-floor central heating, and a bathhouse.\",\"In size, Fishbourne Palace would have been approximately equivalent to some of the great Roman palaces of Italy and was by far the largest known Roman residence north of the European Alps, measuring about 500 feet (150 m) square.\",\"A team of volunteers and professional archaeologists are involved in ongoing archaeological excavation on the site of nearby, possibly military, buildings.\"],\"vi\":[\"Vào thời đó, cung điện đã hoàn thành sẽ bao gồm bốn cánh lớn với mặt trước có hàng cột.\",\"Cánh phía bắc và phía đông bao gồm các dãy phòng riêng được xây dựng xung quanh sân, với một lối vào hoành tráng ở giữa cánh phía đông.\",\"Ở góc đông bắc có một hội trường.\",\"Cánh phía tây có các phòng khánh tiết, một phòng tiếp tân nghi lễ lớn và một phòng trưng bày.\",\"Cánh phía nam chứa các căn hộ riêng của chủ sở hữu.\",\"Cung điện có tới 50 tầng khảm, hệ thống sưởi trung tâm dưới sàn và một nhà tắm.\",\"Về kích thước, Cung điện Fishbourne có thể xấp xỉ tương đương với một số cung điện La Mã vĩ đại của Ý và cho đến nay là dinh thự La Mã lớn nhất được biết đến ở phía bắc dãy Alps châu Âu, rộng khoảng 500 feet (150 m) vuông.\",\"Một nhóm tình nguyện viên và các nhà khảo cổ học chuyên nghiệp tham gia vào quá trình khai quật khảo cổ đang diễn ra tại địa điểm của các tòa nhà gần đó, có thể là quân sự.\"]},{\"en\":[\"The first buildings to be erected on the site were constructed in the early part of the conquest in 43 AD.\",\"Later, two timber buildings were constructed, one with clay and mortar floors and plaster walls, which appears to have been a house of some comfort.\",\"These buildings were demolished in the 60s AD and replaced by a substantial stone house, which included colonnades and a bath suite.\",\"It has been suggested that the palace itself, incorporating the previous house in its south-east corner, was constructed around 73–75 AD.\",\"However, Dr. Miles Russell, of Bournemouth University, reinterpreted the ground plan and the collection of objects found and suggested that, given the extremely close parallels with the imperial palace of Domitian in Rome, its construction may more plausibly date to after 92 AD.\"],\"vi\":[\"Những tòa nhà đầu tiên được xây dựng trên địa điểm này được xây dựng vào giai đoạn đầu của cuộc chinh phục vào năm 43 sau Công Nguyên.\",\"Sau đó, hai tòa nhà bằng gỗ được xây dựng, một tòa nhà có sàn bằng đất sét, vữa và tường thạch cao, dường như là một ngôi nhà tiện nghi.\",\"Những tòa nhà này đã bị phá bỏ vào những năm 60 sau Công Nguyên và được thay thế bằng một ngôi nhà bằng đá kiên cố, có hàng cột và phòng tắm.\",\"Có ý kiến ​​​​cho rằng chính cung điện, kết hợp với ngôi nhà trước đó ở góc đông nam, được xây dựng vào khoảng năm 73–75 sau Công nguyên.\",\"Tuy nhiên, Tiến sĩ Miles Russell, thuộc Đại học Bournemouth, đã giải thích lại sơ đồ mặt bằng và bộ sưu tập các đồ vật được tìm thấy và cho rằng, do có sự tương đồng cực kỳ gần gũi với cung điện hoàng gia Domitian ở Rome, nên việc xây dựng nó có thể có niên đại hợp lý hơn là sau năm 92 sau Công Nguyên.\"]},{\"en\":[\"With regard to who lived in Fishbourne Palace, there are a number of theories.\",\"For example, one proposed by Professor Cunliffe is that, in its early phase, the palace was the residence of Tiberius Claudius Cogidubnus, a local chieftain who supported the Romans and may have been installed as king of a number of territories following the first stage of the conquest.\",\"Cogidubnus is known from a reference to his loyalty in Agricola, a work by the Roman writer Tacitus, and from an inscription commemorating a temple dedicated to the gods Neptune and Minerva found in the nearby city of Chichester.\",\"Another theory is that it was built for Sallustius Lucullus, a Roman governor of Britain in the late 1st century, who may have been the son of the British prince Adminius.\",\"Two inscriptions recording the presence of Lucullus have been found in Chichester, and the redating by Miles Russell suggests that if the palace was designed for Lucullus, it may have only been in use for a few years, as the Roman historian Suetonius records that Lucullus was executed by the Emperor Domitian in or shortly after 93 AD.\"],\"vi\":[\"Về người sống trong Cung điện Fishbourne, có một số giả thuyết.\",\"Ví dụ, một đề xuất được Giáo sư Cunliffe đề xuất là, trong giai đoạn đầu, cung điện là nơi ở của Tiberius Claudius Cogidubnus, một thủ lĩnh địa phương ủng hộ người La Mã và có thể đã được phong làm vua của một số vùng lãnh thổ sau giai đoạn đầu của cuộc chinh phục.\",\"Cogidubnus được biết đến nhờ nhắc đến lòng trung thành của ông với Agricola, một tác phẩm của nhà văn La Mã Tacitus, và từ một dòng chữ kỷ niệm ngôi đền dành riêng cho các vị thần Neptune và Minerva được tìm thấy ở thành phố Chichester gần đó.\",\"Một giả thuyết khác cho rằng nó được xây dựng cho Sallustius Lucullus, một thống đốc La Mã của Anh vào cuối thế kỷ 1, người có thể là con trai của hoàng tử Anh Adminius.\",\"Hai dòng chữ khắc ghi lại sự hiện diện của Lucullus đã được tìm thấy ở Chichester, và việc Miles Russell đánh giá lại cho thấy rằng nếu cung điện được thiết kế cho Lucullus thì nó có thể chỉ được sử dụng trong một vài năm, như nhà sử học La Mã Suetonius ghi lại rằng Lucullus đã bị Hoàng đế Domitian hành quyết vào hoặc ngay sau năm 93 sau Công nguyên.\"]},{\"en\":[\"Additional theories suggest that either Verica, a British king of the Roman Empire in the years preceding the Claudian invasion, was the owner of the palace, or Tiberius Claudius Catuarus, following the recent discovery of a gold ring belonging to him.\",\"The palace outlasted the original owner, whoever he was, and was extensively re-planned early in the 2nd century AD and subdivided into a series of lesser apartments.\",\"Further redevelopment was begun in the late 3rd century AD, but these alterations were incomplete when the north wing was destroyed in a fire around 270 AD.\",\"The damage was too great to repair, and the palace was abandoned and later dismantled.\"],\"vi\":[\"Các giả thuyết bổ sung cho rằng Verica, một vị vua người Anh của Đế chế La Mã trong những năm trước cuộc xâm lược của Claudian, là chủ sở hữu của cung điện, hoặc Tiberius Claudius Catuarus, sau khi người ta phát hiện ra chiếc nhẫn vàng gần đây của ông ta.\",\"Cung điện tồn tại lâu hơn chủ sở hữu ban đầu, bất kể ông ta là ai, và đã được quy hoạch lại rộng rãi vào đầu thế kỷ thứ 2 sau Công Nguyên và được chia thành một loạt căn hộ nhỏ hơn.\",\"Việc tái phát triển hơn nữa đã được bắt đầu vào cuối thế kỷ thứ 3 sau Công nguyên, nhưng những thay đổi này chưa hoàn thiện khi cánh phía bắc bị phá hủy trong một trận hỏa hoạn vào khoảng năm 270 sau Công nguyên.\",\"Thiệt hại quá lớn không thể sửa chữa được, cung điện bị bỏ hoang và sau đó bị tháo dỡ.\"]},{\"en\":[\"A modern museum has been built by the Sussex Archaeological Society, incorporating most of the visible remains, including one wing of the palace.\",\"The gardens have been re-planted using authentic plants from the Roman period.\"],\"vi\":[\"Một bảo tàng hiện đại đã được Hiệp hội Khảo cổ học Sussex xây dựng, kết hợp hầu hết những di tích có thể nhìn thấy được, bao gồm một cánh của cung điện.\",\"Các khu vườn đã được trồng lại bằng các loại cây đích thực từ thời La Mã.\"]}],\"timeLimit\":20}];\n\nlet currentLessonIndex = 0;\nlet qs, vocab, headings, headingKey, mifRange, removeOpt, removeFeatureOpt, pairs, pData;\n\nlet timeLeft = 0;\nlet timerInterval;\nconst timerEl = document.getElementById('timer');\n\nfunction startTimer() {\n    timerInterval = setInterval(() => {\n        if(timeLeft <= 0) {\n            clearInterval(timerInterval);\n            timerEl.innerText = \"00:00\";\n            alert(\"Time is up!\");\n            return;\n        }\n        timeLeft--;\n        const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');\n        const s = (timeLeft % 60).toString().padStart(2, '0');\n        timerEl.innerText = `${m}:${s}`;\n    }, 1000);\n}\n\nfunction switchLesson(idx) {\n    currentLessonIndex = parseInt(idx);\n    const l = lessonsData[currentLessonIndex];\n    qs = l.qs; vocab = l.vocab; headings = l.headings; headingKey = l.headingKey;\n    mifRange = l.mifRange; removeOpt = l.removeOpt; removeFeatureOpt = l.removeFeatureOpt;\n    pairs = l.pairs; pData = l.pData;\n\n    // Reset UI\n    document.getElementById('articleArea').innerHTML = l.articleHtml;\n    document.getElementById('headingsArea').innerHTML = l.headingsHtml;\n    document.getElementById('qs').innerHTML = '';\n    document.getElementById('progressBar').innerHTML = '';\n    document.getElementById('saveBtn').style.display = 'none';\n    \n    // Reset Timer\n    clearInterval(timerInterval);\n    timeLeft = l.timeLimit * 60;\n    timerEl.innerText = \"--:--\";\n    startTimer();\n\n    // Render Questions & Attach Events\n    renderStudentQuestions();\n    attachEvents();\n\n    // Manage Views\n    if(document.getElementById('game-view').style.display === 'block') initGame();\n    if(document.getElementById('mif-view').style.display === 'flex') {\n        document.getElementById('mif-view').style.display = 'none';\n    }\n}\n\n// --- RENDERING QUESTIONS ---\nfunction renderStudentQuestions() {\n    const qDiv=document.getElementById('qs');\n    qDiv.innerHTML = '';\n    \n    qs.forEach(q=>{\n      if(q.type==='text-only'){ qDiv.innerHTML+=`<div class=\"text-only\">${q.text}</div>`; }\n      else if(q.type==='summary') { \n          let h = `<div class=\"q-block\" id=\"q-card-${q.id}\">`;\n          let txt = q.text.replace(/\\n/g, '<br>');\n          q.gapIds.forEach(gid => {\n              const isFeat = q.isFeature ? 'true' : 'false';\n              const dz = `<span class=\"drop-zone\" id=\"dz-${gid}\" data-gid=\"${gid}\" data-isfeat=\"${isFeat}\" ondragover=\"allowDrop(event)\" ondrop=\"drop(event)\" onclick=\"clearDrop(${gid})\"></span><span class=\"q-num\" style=\"vertical-align:super;font-size:10px\">${gid}</span>&nbsp;`;\n              let replaced = txt.replace(new RegExp(`${gid}\\\\s*([._…-]{2,}|_{2,}|…+)`), dz);\n              if(replaced === txt) replaced = txt.replace(new RegExp(`${gid}[.]\\\\s+`), dz + ' ');\n              txt = replaced;\n              const d=document.createElement('div'); d.className='progress-circle'; d.id='prog-'+gid; d.innerText=gid;\n              d.onclick=()=>document.getElementById('q-card-'+q.id).scrollIntoView({behavior:'smooth',block:'center'});\n              document.getElementById('progressBar').appendChild(d);\n          });\n          h += `<div style=\"line-height:2;font-size:15px\">${txt}</div><div style=\"margin-top:15px;display:flex;flex-wrap:wrap;gap:8px;padding-top:10px;border-top:1px dashed #e2e8f0\">`;\n          q.options.forEach(optLine => {\n              const m = optLine.match(/^([A-Z])\\s*[.)]?\\s*(.+)/);\n              if(m) h += `<div class=\"heading-item\" id=\"opt-${q.id}-${m[1]}\" style=\"display:inline-flex;width:auto;margin:0\" draggable=\"true\" ondragstart=\"drag(event)\" data-val=\"${m[1]}\"><span style=\"font-weight:bold;color:#2563eb\">${m[1]}</span> ${m[2]}</div>`;\n          });\n          h += `</div><div id=\"fb-${q.id}\" style=\"margin-top:10px; font-size:13px\"></div></div>`;\n          qDiv.innerHTML += h;\n      } \n      else if(q.type==='gap-fill-block') { \n          let h = `<div class=\"q-block\" id=\"q-card-${q.id}\">`;\n          let txt = q.text.replace(/\\n/g, '<br>'); \n          q.gapIds.forEach(gid => {\n              const loc = (q.locations && q.locations[gid]) ? q.locations[gid] : \"\";\n              const locBtn = loc ? `<button class=\"loc-btn\" onclick=\"showLoc(${q.id}, ${gid})\">📍</button>` : \"\";\n              const inp = `<span class=\"q-num\">${gid}</span><input type=\"text\" class=\"gap-input\" data-gid=\"${gid}\" oninput=\"upd(${gid})\">${locBtn}&nbsp;`;\t\n              txt = txt.replace(new RegExp(`${gid}[\\\\s:.)]*(?:[_….\\\\-]\\\\s*){2,}`), inp);\n              const d=document.createElement('div'); d.className='progress-circle'; d.id='prog-'+gid; d.innerText=gid;\n              d.onclick=()=>document.getElementById('q-card-'+q.id).scrollIntoView({behavior:'smooth',block:'center'});\n              document.getElementById('progressBar').appendChild(d);\n          });\n          h += `<div style=\"line-height:2.2;font-size:16px\">${txt}</div><div id=\"fb-${q.id}\" style=\"margin-top:10px; font-size:13px\"></div></div>`;\n          qDiv.innerHTML += h;\n      }\n      else if(q.type==='mcq-multi') {\n          let h = `<div class=\"q-block\" id=\"q-card-${q.id}\">`;\n          const locBtn1 = (q.locations && q.locations[q.gapIds[0]]) ? `<button class=\"loc-btn\" onclick=\"showLoc(${q.id}, ${q.gapIds[0]})\">📍</button>` : \"\";\n          h += `<div style=\"display:flex;align-items:baseline;margin-bottom:8px;\"><span class=\"q-num\">${q.gapIds[0]}-${q.gapIds[q.gapIds.length-1]}</span> <span>${q.text}</span> ${locBtn1}</div>`;\n          q.options.forEach((o, i) => {\n              const optLetterMatch = o.match(/^([A-Z])/i);\n              const optLetter = optLetterMatch ? optLetterMatch[1].toUpperCase() : o.trim()[0].toUpperCase();\n              h += `<label style=\"display:block;margin:5px 0;cursor:pointer;transition:all 0.2s;\">\n                      <input type=\"checkbox\" name=\"mcq_${q.id}\" value=\"${optLetter}\" onchange=\"updMcqMulti(${q.id}, '${q.gapIds.join(',')}', event)\"> ${o} <span id=\"mcq-mark-${q.id}-${i}\" class=\"mcq-mark\"></span>\n                    </label>`;\n          });\n          h += `<div id=\"fb-${q.id}\" class=\"feedback\" style=\"margin-top:8px;font-size:13px\"></div></div>`;\n          qDiv.innerHTML += h;\n          q.gapIds.forEach(gid => {\n              const d=document.createElement('div'); d.className='progress-circle'; d.id='prog-'+gid; d.innerText=gid;\n              d.onclick=()=>document.getElementById('q-card-'+q.id).scrollIntoView({behavior:'smooth',block:'center'});\n              document.getElementById('progressBar').appendChild(d);\n          });\n      }\n      else { \n        let h=`<div class=\"q-block\" id=\"q-card-${q.id}\">`;\n        const loc = q.location || \"\";\n        const locBtn = loc ? `<button class=\"loc-btn\" onclick=\"showLoc(${q.id})\">📍</button>` : \"\";\n        \n        if(q.type==='gap-fill'){\n           let t=q.text.replace(/(\\d+)[\\s:.)]*(?:[_….\\-]\\s*){2,}/g, '<span class=\"q-num\">$1</span><input type=\"text\" class=\"gap-input\" data-id=\"'+q.id+'\" oninput=\"upd('+q.id+')\">'+locBtn+'&nbsp;');\n           h+=`<div>${t}</div>`;\n        } else {\n           h+=`<div style=\"display:flex;align-items:baseline\"><span class=\"q-num\">${q.id}.</span> <span>${q.text}</span> ${locBtn}</div>`;\n           if(q.type==='mcq') q.options.forEach((o, i) => { h += `<label class=\"mcq-label\" style=\"display:block;margin:5px 0;cursor:pointer\"><input type=\"radio\" name=\"q${q.id}\" value=\"${o.trim()[0]}\" onchange=\"upd(${q.id})\"> ${o} <span id=\"mcq-mark-${q.id}-${i}\" class=\"mcq-mark\"></span></label>`; });\n           if(q.type==='tfng') {\n               h+='<div class=\"tfng-container\">';\n               ['TRUE', 'FALSE', 'NOT GIVEN'].forEach(opt => {\n                   h+=`<label class=\"tfng-label\"><input type=\"radio\" name=\"tfng${q.id}\" value=\"${opt}\" onchange=\"upd(${q.id})\"><span class=\"tfng-btn\">${opt}</span></label>`;\n               });\n               h+='</div>';\n           }\n           if(q.type==='ynng') {\n               h+='<div class=\"tfng-container\">';\n               ['YES', 'NO', 'NOT GIVEN'].forEach(opt => {\n                   h+=`<label class=\"tfng-label\"><input type=\"radio\" name=\"ynng${q.id}\" value=\"${opt}\" onchange=\"upd(${q.id})\"><span class=\"tfng-btn\">${opt}</span></label>`;\n               });\n               h+='</div>';\n           }\n           if(q.type==='mif') {\n               h+='<div class=\"mif-container\">';\n               mifRange.split('').forEach(char => {\n                   h+=`<label class=\"mif-label\"><input type=\"radio\" name=\"mif${q.id}\" value=\"${char}\" onchange=\"upd(${q.id})\"><span class=\"mif-circle\">${char}</span></label>`;\n               });\n               h+='</div>';\n           }\n        }\n        h+=`<div id=\"fb-${q.id}\" class=\"feedback\" style=\"margin-top:8px;font-size:13px\"></div></div>`;\n        qDiv.innerHTML+=h;\n        const d=document.createElement('div'); d.className='progress-circle'; d.id='prog-'+q.id; d.innerText=q.id;\n        d.onclick=()=>document.getElementById('q-card-'+q.id).scrollIntoView({behavior:'smooth',block:'center'});\n        document.getElementById('progressBar').appendChild(d);\n      }\n    });\n\n    document.querySelectorAll('input[type=\"radio\"][name^=\"mif\"]').forEach(radio => {\n        radio.addEventListener('change', (e) => {\n            const qId = radio.name.replace('mif', '');\n            const pChar = radio.value;\n            document.querySelectorAll(`.mif-inline-btn[data-qid=\"${qId}\"]`).forEach(btn => {\n                const btnPara = btn.closest('.mif-inline-box').dataset.para;\n                if(btnPara === pChar) {\n                    btn.classList.remove('hidden-by-other');\n                    btn.classList.add('selected');\n                } else {\n                    btn.classList.remove('selected');\n                    btn.classList.add('hidden-by-other');\n                }\n            });\n        });\n    });\n}\n\nfunction attachEvents() {\n    const pp = document.getElementById('popup');\n    document.querySelectorAll('.vocab').forEach(s => {\n      s.onclick = e => {\n        const v = vocab.find(x => x.id === s.dataset.vid); if(!v) return;\n        pp.innerHTML = `<div style=\"background:#1e293b;color:#fff;padding:12px;font-weight:700;display:flex;justify-content:space-between;align-items:center\"><span>${v.word}</span><span onclick=\"speak('${v.word}')\" style=\"cursor:pointer;background:#334155;padding:4px;border-radius:50%\">🔊</span></div><div style=\"padding:16px;font-size:14px;color:#334155\"><p style=\"margin-bottom:8px\"><b style=\"color:#0f172a\">Meaning:</b> ${v.meaning}</p><p style=\"margin-bottom:8px\"><b style=\"color:#0f172a\">Synonyms:</b> ${v.synonym}</p><div style=\"background:#f1f5f9;padding:8px;border-radius:6px;margin-top:8px;color:#475569;font-style:italic\">\"${v.example}\"</div></div>`;\n        pp.style.display = 'block'; pp.style.top = (e.clientY+10) + 'px'; pp.style.left = Math.min(e.clientX, window.innerWidth-330) + 'px';\n        e.stopPropagation();\n      }\n    });\n\n    document.querySelectorAll('.sent').forEach(el => {\n        el.addEventListener('mouseenter', () => {\n            const tid = el.getAttribute('data-target'); const t = document.getElementById(tid);\n            if(t) t.style.backgroundColor = '#fef08a'; \n        });\n        el.addEventListener('mouseleave', () => {\n            const tid = el.getAttribute('data-target'); const t = document.getElementById(tid);\n            if(t) t.style.backgroundColor = 'transparent';\n        });\n    });\n}\n\nfunction allowDrop(ev) { ev.preventDefault(); }\nfunction drag(ev) { \n    const el = ev.target.closest('[draggable=\"true\"]') || ev.target;\n    const val = el.dataset.val || el.innerText.split('.')[0].trim();\n    ev.dataTransfer.setData(\"text\", val); \n    ev.dataTransfer.setData(\"srcId\", el.id); \n}\nfunction dragHeading(ev) { \n    const el = ev.target.closest('.heading-item');\n    ev.dataTransfer.setData(\"hid\", el.dataset.hid); \n    ev.dataTransfer.setData(\"srcId\", el.id); \n}\nfunction drop(ev) {\n    ev.preventDefault();\n    const zone = ev.target.closest('.drop-zone');\n    if(!zone) return;\n    \n    const type = zone.dataset.type;\n    if (type === 'heading') {\n        const hid = ev.dataTransfer.getData(\"hid\");\n        if(!hid) return; \n        zone.innerHTML = hid.toUpperCase(); \n        zone.dataset.val = hid; \n        zone.classList.add('filled');\n        \n        const srcId = ev.dataTransfer.getData(\"srcId\");\n        document.getElementById(srcId).classList.add('used');\n        if(zone.dataset.prevSrc && zone.dataset.prevSrc !== srcId) document.getElementById(zone.dataset.prevSrc).classList.remove('used');\n        zone.dataset.prevSrc = srcId;\n        return;\n    }\n    const val = ev.dataTransfer.getData(\"text\");\n    if(val) {\n        zone.innerText = val; \n        zone.classList.add('filled');\n        const gid = zone.dataset.gid;\n        document.getElementById('prog-'+gid).classList.add('filled');\n        \n        const isFeat = zone.dataset.isfeat === 'true';\n        const doRemove = isFeat ? removeFeatureOpt : removeOpt;\n        \n        if(doRemove) {\n            const srcId = ev.dataTransfer.getData(\"srcId\");\n            if(srcId) {\n                const srcEl = document.getElementById(srcId);\n                if(srcEl) srcEl.classList.add('used');\n                if(zone.dataset.prevSrc && zone.dataset.prevSrc !== srcId) {\n                    const prevEl = document.getElementById(zone.dataset.prevSrc);\n                    if(prevEl) prevEl.classList.remove('used');\n                }\n                zone.dataset.prevSrc = srcId;\n            }\n        }\n    }\n}\n\nfunction clearHeading(idx) {\n    const el = document.querySelector(`.heading-drop[data-para=\"${idx}\"]`);\n    if(el.dataset.prevSrc) document.getElementById(el.dataset.prevSrc).classList.remove('used');\n    el.innerHTML = '<span class=\"placeholder\">Drop Heading Here</span>'; el.classList.remove('filled'); delete el.dataset.val;\n}\nfunction clearDrop(gid) {\n    const el = document.getElementById('dz-'+gid);\n    const isFeat = el.dataset.isfeat === 'true';\n    const doRemove = isFeat ? removeFeatureOpt : removeOpt;\n    \n    if(doRemove && el.dataset.prevSrc) {\n        const prevEl = document.getElementById(el.dataset.prevSrc);\n        if(prevEl) prevEl.classList.remove('used');\n        delete el.dataset.prevSrc;\n    }\n    \n    el.innerText=''; el.classList.remove('filled'); document.getElementById('prog-'+gid).classList.remove('filled');\n}\n\nconst hlToolbar = document.getElementById('hl-toolbar');\nlet currentRange = null;\ndocument.addEventListener('mouseup', (e) => {\n    if(e.target.closest('#hl-toolbar')) return;\n    if(e.target.closest('#game-view')) return;\n    setTimeout(() => {\n        const sel = window.getSelection();\n        if(sel.toString().trim().length > 0) {\n            const range = sel.getRangeAt(0);\n            const parent = range.commonAncestorContainer.parentElement;\n            if(parent.closest('.en-text') || parent.closest('.q-block') || parent.closest('.text-only')) {\n                currentRange = range;\n                const rect = range.getBoundingClientRect();\n                hlToolbar.style.display = 'flex'; \n                hlToolbar.style.top = (rect.top + window.scrollY - 40) + 'px'; \n                hlToolbar.style.left = (rect.left + (rect.width/2)) + 'px';\n                return;\n            }\n        }\n        hlToolbar.style.display = 'none';\n    }, 10);\n});\n\nwindow.applyHighlight = (e) => {\n    e.preventDefault(); e.stopPropagation();\n    if(currentRange) {\n        const span = document.createElement('span'); span.className = 'user-highlight'; span.setAttribute('onclick', 'removeHighlight(this, event)');\n        try { currentRange.surroundContents(span); window.getSelection().removeAllRanges(); } catch(err) { alert('Selection quá phức tạp, vui lòng bôi đen gọn hơn.'); }\n        hlToolbar.style.display = 'none';\n    }\n};\n\nwindow.applyNote = (e) => {\n    e.preventDefault(); e.stopPropagation();\n    if(currentRange) {\n        const noteText = prompt('Nhập ghi chú của bạn:');\n        if(noteText) {\n            const span = document.createElement('span'); \n            span.className = 'user-highlight has-note'; \n            span.setAttribut
